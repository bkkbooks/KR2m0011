body:
  text: 七國考卷五明董說撰楚國名楚荆吕覽荆平王得如黃之狗􅙪簬之矰以畋于雲夢檀弓襄公朝于荆國䇿有獻不死之藥于荆王者又荆宣王問羣臣曰吾聞北方之畏昭奚恤也越絶書荆平王傳韓非子齊荆攻魏魏王遺荆王美人亢倉子荆君熊圉問水旱理亂韓詩外傳越王勾踐使亷稽獻民于荆王尸子云荆者非無東西也而謂之南其南者分也說苑吳王欲伐荆又魯襄公朝荆新序田贊衣儒衣而見荆王通釋云荆自文王始見于春秋僖元年始稱楚莊十年荆敗蔡師于莘公羊曰荆者州名州不若國貶之若荆州之夷然也穀梁曰荆楚也何以謂之荆狄之也聖人立必後至天子弱必先叛左氏無此杜元凱曰荆楚本號也按詩云戎狄是膺荆舒是懲則荆為楚之本號亦明矣郢桓子新論郢王好細腰而宫人餓屈原哀郢曰顧龍門而不見孰兩東門之可蕪史記齊湣王謂其相曰不若留太子以求楚之淮北相曰不可郢中立王是吾抱空質而行不義于天下也尸子郢王問于羣臣曰吾國治乎按此楚荆郢並稱趙國名趙邯鄲竹書紀年周顯王十三年邯鄲成侯㑹燕成侯於安邑十四年邯鄲伐衛十六年邯鄲之師敗我于桂陵我言魏也三十三年鄭威侯與邯鄲圍襄陵二十七年十月邯鄲伐我北鄙隱王即赧王十三年邯鄲命吏大夫奴遷于九原將軍大夫適子代史皆貂服桓子新論云邯鄲立王是抱空質也戰國春秋云邯鄲王有吞天下之心皆指趙也晉韓魏趙號三晉詳見魏國名考魏國名魏梁魏惠王徙治大梁國號曰梁按魏世家惠王三十一年秦用商君東地至河而齊趙數破我安邑近秦于是徙大梁竹書紀年梁惠成王九年四月甲寅徙邦于大梁與史記不合今按孟軻至梁在惠王三十五年從史記徙梁已二年從紀年從梁已二十二年故其書曰梁惠梁襄不曰魏惠魏襄也又按魏世家惠王已後或稱魏如張耳見魏王張儀魏章皆歸于魏魏相田需死蘇秦謂魏王秦昭王謂左右今韓魏與始孰彊魏人有唐睢謂魏王秦昭王遽為發兵救魏趙使人謂魏王無忌謂魏王魏太子增質于秦皆稱魏也或稱梁如鄒衍淳于髠孟軻皆至梁楚相昭魚謂蘇代君其為梁王代請說臣遂北見梁王韓亡秦有鄭地與大梁鄰皆稱梁也晉趙岐孟子注韓魏趙本晉六卿當此時號三晉故梁惠王曰晉國天下莫強焉韓國名韓鄭戰國䇿襄王時周最使鄭立韓擾而廢公叔周最患之曰公叔之與周君交也今我使鄭立韓擾而廢公叔語曰怒于室者色于市今公叔怨齊無奈何也必絶周君而深怨我矣史舍曰公行矣請令公叔必重公周最行至鄭注云鄭韓也又釐王時或謂鄭王曰昭釐侯一世之明君也注云鄭王韓王也按竹書紀年周安王二十一年魏武侯六年韓滅鄭哀侯入于鄭烈王二年晉桓公邑哀侯于鄭曰韓山堅賊其君哀侯曰韓共侯趙成侯遷晉桓公于屯留是猶稱韓不稱鄭也顯王元年鄭城邢丘自是已後變韓為鄭三年曰公子景賈帥師伐鄭七年曰王㑹鄭釐侯于巫沙九年曰秦師伐鄭次于懷十年曰鄭取屯留尚子十一年曰鄭釐侯使許息來致地平丘户牖首垣諸邑及鄭馳地我取枳道與鄭鹿王及鄭釐侯盟于巫沙以釋它陽之圍歸釐于鄭十二年曰鄭釐侯來朝十四年曰秦公孫壯伐鄭十五年曰東周與鄭髙都十六年曰王以韓師二十四年曰魏敗韓馬陵二十六年曰穰疵帥師及鄭孔夜戰于梁赫鄭師敗逋三十一年曰秦蘇胡伐鄭三十三年曰鄭威侯與邯鄲圍襄陵三十八年曰王㑹鄭威侯于巫沙慎靚王六年曰鄭侯使韓辰歸晉陽及向隱王元年曰鄭宣王來朝梁七年曰翟章救鄭數十年間稱韓者二稱鄭者十四矣晉詳見魏國名考七國考卷五
