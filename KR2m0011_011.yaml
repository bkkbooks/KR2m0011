body:
  text: 七國攷卷十一明董說撰秦兵制三軍文獻通攷秦穆公覇西戎始作三軍殽三帥而車三百乗又置陷陣又商子載秦三軍之法三軍壯男為一軍壯女為一軍男女之老弱者為一軍壯男之軍使盛食勵兵陳而待敵壯女之軍使盛食負壘陳而待令客至而作土以為險阻及耕格阱發梁撤屋給從從之不給而熯之使客無得以助攻備老弱之軍使牧牛馬羊彘草木之可食者收而食之以獲其壯男女之食慎使三軍無相過壯男過壯女之軍則男貴女而姦民有從謀而國亡喜與其恐有蚤聞勇民不戰壯男壯女過老弱之軍則老使壯悲弱使強憐悲憐在心則使勇民更慮而怯民不戰是故秦之三軍無相過也陷陣詳見三軍又吳子云秦置陷陣三萬奮擊蘓秦說秦惠王曰奮擊百萬帯甲國䇿秦帯甲百餘萬車千乗騎萬匹虎鷙之人跿跔科頭跿跔跳躍也科頭不著兠也貫頥奮㦸者至不可勝計也秦馬之良戎兵之衆探前蹶後蹄前二尋者不可勝數也山東之卒被甲冒胄以㑹戰秦人捐甲徒程以趨敵左挈人頭右挾生虜步卒韓非子秦穆公起卒草車五百乗疇騎二千步卒五萬輔重耳入于晉正卒戍卒更卒馬端臨曰秦自非子為孝王養馬汧渭之間封為附庸至秦仲始大秦仲之孫襄公當平王初興兵討西戎以救周平王東遷遂有岐豐之地列為諸侯地與戎相錯襄公脩其車馬備其兵甲武事備矣至穆公覇西戎始作三軍殽三帥而車三百乗魯定公五年秦子蒲子虎帥車五百乗救楚兵力益以強盛及孝公用商鞅定變法之令令民為什伍而相收司連坐民有二男以上不分異者倍其賦有軍功者各以率受上爵宗室非有軍功論不得為屬藉行之十年民勇于公戰怯于私闘又以秦地曠而人寡晉地狹而人稠誘三晉之人耕秦地優其田宅而使秦人應敵于外大率百人則五十人為農五十人習戰凡民年二十三附之疇給郡縣一月而更謂更卒復給中都一歳謂正卒復屯邊一嵗謂之戍卒凡戰獲首賜爵一級皆以戰功相君長長平之役年十五以上悉發又非商鞅之舊矣桓寛鹽鐵論云商鞅之任秦也刑若刈菅芳用師若彈丸從軍旅者暴骨長城戍漕者輦車相望生而往死而還小子軍劉子别録云長平之役國中男子年十五者盡行號為小子軍銳士虎賁荀卿曰魏之武卒不可以直秦之銳士秦之銳士不可以當桓文之節制陳傅良云秦昭王時有銳士虎賁八百萬按周禮有虎賁書牧誓武王虎賁三百人疏若虎之賁走逐獸言其猛也軍内驍勇選而為之斥兵史記趙使亷頗將趙軍士卒犯秦斥兵索隠曰謂犯秦之斥候兵也小戎秦風小戎云小戎俴收五楘梁輈游環脅驅隂靷鋈續文茵暢轂駕我騏馵言念君子温其如玉在其板屋亂我心曲四牡孔阜六轡在手騏駵是中騧驪是驂龍盾之合鋈以觼軜言念君子温其在邑方何為期胡然我念之俴駟孔羣厹矛鋈錞䝉伐有苑虎韔鏤膺交韔二弓竹閉緄縢言念君子載寢載興厭厭良人秩秩徳音注小戎兵車也天子車戎謂之元戎諸侯謂之小戎韓詩内傳曰駟馬不著甲曰俴駟秦哀公三十一年吳伐楚楚王亡申包胥奔告秦子蒲子虎帥車五百乗救楚國䇿秦武王謂甘茂曰寡人欲車通三川以闚周室按車戰之法春秋如韓原之戰輅秦伯將止之鞌之戰韓厥中御而從齊侯鄢陵之戰卻至御楚子韓厥從鄭伯邲之戰楚子乗廣以逐趙㫋用車以戰而使敵人便得與我元帥相接則是環衛之車不設也盖古者車戰之法前後整齊必有䕶衛前後行列元帥未易動也至春秋列國用之􅉨􅉨軍伍不整而元帥每以車逐利混然左右卒無定法故敵人得以反之終春秋之世致敗者未有不由于車戰無法而輕動揺也惟繻葛之戰二拒用事若原繁髙渠彌以中軍奉公未嘗輕動深得古法菽園雜記云三代至春秋用兵率以車戰秦漢而後以騎兵為便故兵車之制車戰之法今皆不傳漢有武剛車晉有偏箱車然不過行載輜重止為營衛而已其出擊乃以騎兵故能制勝唐房琯擊出安禄山用春秋車戰之法卒以取敗盖春秋時敵國皆車戰又皆戰于平原廣野其兵將又皆素練車戰之人故冝之琯以車禄山以騎時異勢殊故用有利鈍非車之罪也革車戰車詳見步卒又蘓秦說秦曰戰車萬乗疇騎繆公有疇騎見步卒注疇等也言馬齊等太白船蜀王本紀云秦為太白船萬艘欲以攻楚余按周武王有蜂舟見拾遺記伍子胥制玉翼越人有船名須慮見越絶書相將史記張儀相秦四歳而立惠王為王居一嵗為秦將取陜築上郡塞自將史記秦繆公元年自將伐茅津五年秋繆公自將伐晉戰于河曲十五年晉興兵將攻秦繆公發兵使丕豹將自往擊之二十五年周使人告難于晉秦繆公將兵助晉文公入襄王上首功魯仲連曰彼秦者棄禮義而上首功之國譙周曰秦用衛鞅計制爵二十等以戰獲首級者計而受爵是以秦人每戰勝老弱婦人皆死計功賞至萬數天下謂之上首功之國皆以惡之也漢書觧語曰秦上首功之國首功者獲首也司馬貞曰秦法斬首多為上功謂斬一人首賜爵一級故謂秦為首功之國也荀子曰秦人其生民也陿阨其使民也酷烈刼之以勢隠之以阨狃之以賞慶道之以刑罸使民所以要利于上者非戰無繇也功令相長五甲首而𨽻五家能得著甲者五人首使得𨽻役五家是最為有數故能四世有勝于天下然皆干賞蹈利之兵庸徒鬻賣之道耳未有安制矜節之理也故雖地廣兵強鰓鰓然常恐天下之一合而共軌已也宗室軍功應劭云孝公變法有軍功者各以卒受上爵宗室非有軍功不得為屬藉角抵太白隂經云春秋末並為戰國増講武之禮以為戯樂共相誇視而秦更名為角抵故國雖大好戰必亡天下雖平亡戰必危祈戰左傳文十二年冬秦伐晉秦伯以璧祈戰于河杜預曰禱求勝也素服郊次殽之敗晉歸百里孟明視西乞術白乙丙于秦秦伯素服郊次鄉師而泣曰孤違蹇叔以辱二三子孤之罪也見左傳田獵史記秦文公三年以兵七百人東獵又按秦風駟鐵云駟鐵孔阜六轡在手公之媚子從公于狩奉時辰牡辰牡孔碩公曰左之舍拔則獲遊于北園四馬既閑輶車鸞鑣載獫歇驕傳云駟鐵美襄公也始命有田獵之事疏云襄公始受王命為諸侯有游田狩獵之事又韓詩外傳云秦繆公將田而夷具馬龍盾厹矛䝉伐虎韔詳見小戎龍盾畫龍于盾也厹三隅矛也厹矛鋈錞言三隅之矛以白金為其錞也錞鐏也䝉龎也畫雜羽之文于伐故曰龎伐也伐中干也韔弓室也虎虎皮也楚辭云帯長劍挾秦弓太阿工市秦劍有太阿工市見玉海鹿盧之劍詳見秦音樂攷白帖云古劍以玉刻鹿盧形誡劍刀劍録云秦昭王元年丙午鑄一劍長三尺銘曰誡定秦劍秦始皇三年採北祗銅鑄二劍名曰定秦長三尺六寸銘作小書見刀劍録水心劍白帖云秦昭王三月三日曲水晏有金人于水中捧水心劍以奉王玉海云金人奉水心之劍曰令君制有西夏乃伯諸侯西戎刀孔叢子秦王得西戎利刀割玉如割木田齊兵制帯甲五家兵蘓秦說齊宣王齊南有泰山東有琅邪西有清河北有渤海此所謂四塞之國也齊地方二千餘里帯甲數十萬粟如丘山三家之良五家之兵進如鋒矢戰如雷霆觧如風雨即有軍役未嘗倍泰山絶清河涉渤海也臨淄之中七萬戸臣竊度之不下戸三男子三七二十一萬不待發于逺縣而臨淄之卒固已二十一萬矣舊注五家之兵者五國之兵吕氏曰齊有五家之兵最強也作五國非技擊得首賜金荀卿曰齊人隆技擊其技也得一首者賜贖錙金無本賞矣事小敵毳則偷可用也事鉅敵堅則渙然離若飛鳥然領側反覆無日是亡國之兵也注云八兩曰錙其技擊之術斬得一首則賜錙金贖斬首雖戰敗亦賞不斬首雖戰勝亦不賞無本賞也典略曰湣王為技擊孫臏曰三晉之兵素悍勇而輕齊齊號為怯候者國䇿章子為變其徽章以雜秦軍候者言章子以齊入秦候者軍候也輜車史記齊以田忌為將而孫子為師居輜車中坐為計謀按輜車者軍中輜重之車也文騎孫子箋云齊宣王以文騎六百匹伐燕火牛田單守即墨先以計紿燕將燕軍多懈田單乃收城中得千餘牛為絳繒衣畫以五彩龍文束兵刄于其角而灌脂束葦于尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍燕軍夜大驚牛尾炬火光明炫耀燕軍視之皆龍文所觸盡死傷五千人因銜枚擊之而城中鼓噪從之老弱皆擊銅器為聲聲動天地燕軍大駭敗走先是單為臨淄市掾不見知及燕使樂毅伐破齊齊湣王出奔已而保莒城燕師長驅平齊而田單走安平令其宗人盡斷其車軸末而傅鐵籠已而燕軍攻安平城壞齊人走争塗以轊折車敗為燕所虜唯田單宗人以鐵籠故得脫見田單傳出獵說苑齊宣王出獵于社山威王兵法劉向别録齊威王用兵大放穰苴之法而諸侯朝昔齊景公時穰苴善用兵敗燕晉之師公尊為司馬之官由是子孫號司馬氏至齊威王追論古司馬法遂附穰苴謂之司馬法亦曰威王兵法書載武經不録宣王兵法漢志齊孫子八十九篇圗四卷劉子七畧云齊宣王兵法九十篇一曰孫臏法也吕氏春秋云孫臏貴勢司馬遷云孫子臏脚兵法脩列通典引孫臏云用騎有十利一曰迎敵始至二曰乗敵虚背三曰敵散亂擊四曰迎敵擊後使敵奔走五曰遮其糧食絶其軍道六曰敗其津闗發其橋梁七曰掩其不備卒擊其未整旅八曰攻其懈怠出其不意九曰燒其積聚虚其市里十曰掠其田野係累其子弟此十者騎戰利也又孫吳傳云孫臏使齊軍入魏地為十萬竈明日為五萬竈又明日為三萬竈龎涓行三日大喜曰吾固知齊軍怯入吾地三日士卒亡者過半矣乃棄其步軍與其輕銳倍日并行逐之孫臏度其行暮當至馬陵馬陵道狹而旁多阻隘可伏兵乃斫大樹白而書之曰龎涓死于此樹之下于是令齊軍善射者萬弩夾道而伏期日暮見火舉而俱發龎涓果夜至斫木下見白書乃鑚火燭之讀其書未畢齊軍萬弩俱發魏軍大亂相失龎涓乃自剄寳劍一統志齊王有寳劍磨于長興晏子鄉其水㣲赤似鐵汁徽章國䇿秦假道韓魏以攻齊齊威王使章子將而應之與秦交和而舍使者數相往來章子為變其徽章以雜秦軍注云兩軍相對曰交和徽幟也以絳帛著于背楚兵制三軍傳曰楚子北師次于郔沈尹將中軍子重將左軍子反將右軍此三軍者正軍也是時孫叔敖為令尹秉政不在三軍之數如南轅反斾軍進退皆由之故知令尹為兼統三軍矣九軍淮南子楚莊王曰陳為無道寡人起九軍以討之左右廣左傳欒武子言楚軍制曰其君之戎分為二廣右廣初駕數及日中左則受之至于昏内官序當其夜鄭氏曰廣者横陳之車杜預注二廣君之親兵按傳楚分左右廣雞鳴而駕日中而說左則受之日入而說許偃御右廣養由基為左彭名御左廣屈蕩為右王乗左廣以逐趙旃杜預注楚王更迭載之故各有御傳又曰王見右廣將從之乗屈蕩尸之曰君以此始亦必以終自是楚之乗廣先左盖左右二廣為王親軍右廣初駕以及日中左廣受之以及日入嘗在王側内官卒當其夜若今之當更循環衛敵安當掩襲親軍之制詳矣僖二十八年西廣從子玉時子玉專軍政故分西廣以屬之今邲之戰則二廣皆以候王迭載其曰楚之乗廣先左杜預雖云以乗左得勝其實楚人尚左故親軍分為二廣而王則乗左楚莊王能以其國覇其師之戎分為兩廣偏兩文獻通考楚兵制廣有一卒卒偏之兩一卒之外復有十五乗之偏并二十五人之兩盖防正軍有敗則以偏卒易之正卒有闕則以偏卒補之按楚子為乗廣三十乗分為左右司馬法百人為卒卒二十五人為兩車十五乗為大偏九乗為小偏其尤大者又有二十五乗之偏今一廣十五乗則古大偏之法而曰卒偏之兩者孔頴達謂兩廣之别各有一卒之兵者是也游闕左傳楚使潘黨率游闕三十乗從唐侯游闕盖游兵往來遊補闕者觀兵陳何處為薄則從而補之所謂竒軍以防敗失由正軍中逐旋分出不係步伍之數徒兵通攷云康王以蒍掩為司馬始井沃衍牧隰皋賦車籍馬而有車兵徒兵甲楯之數徒兵即武卒也許慎淮南注在車曰士步曰卒舟師左傳襄二十四年楚子為舟師以伐吳不為軍政無功而還昭十七年吳伐楚戰于長㟁大敗吳師獲其乗舟餘皇十九年楚子為舟師以伐濮二十四年楚子為舟師以畧吳疆二十七年與吳師遇于窮令尹子常以舟師及沙汭而還定二年楚囊瓦伐吳師吳人見舟于豫章敗之四年蔡吳唐伐楚舍舟于淮汭自豫章與楚夾漢左司馬戍謂子常曰子㳂漢而與之上下我悉方城外以毁其舟六年吳太子終纍敗楚舟師獲潘子臣小惟子及大夫七人注潘子臣小惟子二子者楚舟師之師也馬端臨曰楚用舟師自康王始攷之經傳吳舟成七年始入州來暨共王卒繼侵楚明年敗楚于皋舟之隘是吳利在舟師楚懼無以敵吳後十年康王始為舟師以畧吳疆昭王時救潜之役舟師及河汭而還其後囊瓦伐吳吳人敗楚師入郢之後吳太子終纍又敗楚舟師獲其師盖楚雖以備舟置舟師而實莫能用用亦不勝亦地形用便有不同耳陵師左傳子期以陵師敗于繁揚注陵師楚陸師也髙庫兵淮南子楚有髙庫之兵吕氏云荆葉公發太府之貨予衆出髙庫之兵以賦民上國之兵東國之兵通攷云楚平王簡上國東國之兵都外都師精練有法按昭十四年楚平王使然丹簡上國之兵于宗丘且撫其民使屈罷簡東國之兵亦如之好于邉疆息民五年而復用師杜預曰上國都在國都之西西方居上流故謂之上國按下云簡東國之兵亦如之知此是簡西國之兵也西國東國皆是楚人在國之東西者孔頴達曰西為上則東為下下言東則此是西互見也宫甲左傳文元年商臣以宫甲圍成王注是宫中兵也或曰楚有太子之兵曰宫甲環列文元年楚潘崇掌環列之尹注宫衛之官列兵而環王宫若敖六卒楚有若敖之六卒見左傳杜預曰六卒子玉宗人之兵申息子弟僖二十八年楚子入居于申子玉城濮之敗王使謂之曰大夫若入其若申息之老何杜預曰申息二邑子弟皆從子玉而死都君子昭二十七年楚左司馬戍帥都君子與王馬之屬以濟師杜預曰在都邑之士有復除者賈逵曰平常免其行役事急乃使之耳呉楚多有此事急則從如越有君子六千人是也王馬之屬王養馬官屬校人之類凡此皆以急調役非常法王馬之屬詳見上按王馬之屬楚官也然無專名故不入職官左右司馬國䇿齊韓魏共攻燕楚王使景陽將而救之暮舍使左右司馬各營壁地按此左右司馬者乃行軍之制故與職官並載五帥通攷云楚靈王斥地益大陳蔡不羮邑賦千乗于是有五帥左傳吳人敗諸豫章獲其五帥帯甲車騎蘓秦說楚威王曰楚地方五千餘里帯甲百萬車千乗騎萬匹粟有十年此伯王之資也陳傅良曰楚頃襄王失鄢郢北保于陳牧東地兵尚十餘萬戰車楚世家云楚王警四境之内興師言救韓命戰車滿道路春秋感精符云齊晉並争吳楚更謀不守諸侯之節兢行天子之事作衡車勵武將輪有刄衡有劍以相振懼宋均曰衡陷敵之車也淮南云晩世之時七國異族諸侯制法各殊習俗從横間之舉兵而相角攻城檻殺覆髙危安掘墳墓揚人骸大衝車髙重京除戰道便死路犯嚴敵殘不義百姓一反名聲苟盛也是故質壯輕足者為甲卒千里之外家老羸弱悽愴于内厮徒馬圉軵車奉饟道里遼逺霜雪亟集裋褐不完人羸車敝泥塗至膝相携于道奮首于路身枕格而死所謂兼國有地者伏尸數十萬破車以千百數傷弓弩矛㦸矢石之創者扶舉于路故世至于枕人頭食人肉葅人肝飲人血甘之于芻豢許慎注衝車大鐵著其轅端馬被甲車被兵所以衝于敵城也司馬彪續漢書輿服志云輕車右之戰車也不巾不盖孫吳兵法云車有巾有盖謂之武剛車武剛車者為先驅又為屬車輕車為后殿焉樓車左傳宣十五年觧楊登諸樓車注樓車上望櫓巢車成十六年楚子登巢車以望晉軍注巢車上為櫓說文作轈云兵車髙如巢以望敵也馹文十二年楚子乗馹㑹師于臨品注馹傳車也雲梯尸子云墨子自齊至郢見楚王楚王曰公輸般為我作雲梯髙可参浮雲駕白日此天下之先驅也將以攻宋矣舟戰之具墨子云公輸般自魯之楚為舟戰之具謂之鈎拒退則鈎之進則拒之也燧象左傳吳伐楚昭王執燧象以奔呉師武功略曰春秋楚王以燧象奔吳師戰國田單以火牛克騎刼後漢楊璇以火馬散滑賊晉江􅓉以火雞破姚襄宋趙遹以火猱攻卜漏輜重左傳乙夘王乗左廣以逐趙旃及昏楚師軍于邲晉之餘師不能軍丙辰楚重至于邲杜預曰輜重也楚輜重嘗後正軍一日盖楚軍有法輜重若與正軍過逺則有邀擊之患過近則重兵纔亂正兵亦潰後世用兵先擊輜重取勝者多盖以非太近則太逺以是知楚輜重逺大兵一日為得宜也柱國將楚世家懷王六年使柱國昭陽將兵而攻魏荆尸陳法通攷云楚自若敖蚡冐篳簬籃縷以啟山林武王始為軍政作荆尸以伐隨授師孑以立陳法案莊四年楚武王荆尸授師孑焉以伐隨杜預曰荆楚也尸陳也更為楚陳兵之法遂以為名孑鎗屬亦陳所利楊子方言云楚謂㦸為孑大抵陳中有利于長兵者有利于短兵者弓矢利逺是長兵孑是短兵盖楚參用孑為陳宣十二年楚子圍鄭晉師救鄭隨武子曰荆尸而舉軍行右轅左追蓐前茅慮無中權後勁百官象物而動軍政不戒而備注軍行右轅左追蓐凡兵車有甲士有步卒甲士在車不供碎役分步卒為前左右三處兵車一轅服馬夾之而言夾轅者步卒被主分左右者軍行時又分之在兩廂挾轅以為戰備傳曰令尹南轅又曰改乗轅楚陳以轅為主以轅為主以轅表車正是挾車嚴兵以備不虞其應左右者使之追步草蓐令離道求草不近兵車蓐謂卧止之草以為宿備豫定左右之别在道分使之故云軍行至于對陳則在車左右前茅慮無在前者明為思慮所無之事恐卒有非則預告軍衆使知而為備如今軍行使人逺在軍前斥度候望虞有伏兵使踰行人持以絳及白為幡與軍人與私號見騎賊舉絳幡見步賊舉白幡曲禮前有水則載青旌是也或曰時楚以茅為旌幟中權是中軍大將軍進退之權三軍之心在此權者謂謀之髙下輕重皆當後勁以精兵為殿後世勁兵多在前或被擊敗則後無應勁兵之後最為良法左右拒左傳楚工尹齊將右拒卒以逐下軍使潘黨率游闕三十乗從唐侯為左拒以從上軍亦猶鄭二拒盖楚子在中軍與晉中軍相對臨戰分此二拒右拒當晉下軍左拒當晉上軍故杜預謂為陳名文獻通攷楚于陳則分左右二拒二隊左傳楚子㑹師于臨品分為二隊杜預曰隊部也而兩道攻之田獵右盂左盂獵陳說苑楚莊王好獵大夫諫曰晉楚敵國也楚不謀晉晉必謀楚今王無乃躭于樂乎王曰吾獵將以求士也其披榛藂刺虎豹者吾是以知其勇也其攫犀搏兕者吾是以知其勁有力也罷田而分所得吾是以知其仁也又莊王獵于雲夢射科雉得之楚共王出獵而遺其弓湖廣志武王山在棗陽縣東五十里世傳武王嘗獵此左傳楚子田孟諸宋公為右盂鄭伯為左盂期思公復遂為右司馬子朱及文之無畏為左司馬命夙駕載燧杜預云盂田獵陳名泰阿龍泉工市越絶書楚王召風胡子而問之曰寡人聞吳有干將越有歐冶子寡人願請此二人作鐵劍乃令風胡子之吳見歐子干將使之作為鐵劍曰泰阿愽物志云寳劍名龍泉太阿工市三劍皆楚口王者蜀志云楚王作劍三枚曰龍泉曰太阿曰工市劉向孟子注云楚之鐵劍利而倡優泣相如賦云楚王建干將之雄㦸張恊七命云楚之陽劍歐冶所營邪溪之鋌赤山之精乃鍊乃鑠萬辟千灌豐隆奮椎飛亷扇炭張協太阿劍銘云太阿之劍世載其美淬以清波歛以越砥鮫革甲荀卿曰楚人鮫革犀兕以為甲鞈如金石宛鉅鐵鉇慘如蠭蠆輕利僄遫卒如飄風天下稱強兵莫如楚楊倞荀子注云以鮫魚皮及犀兕為甲堅如金石不可入孔融肉刑論云古聖作犀兕革鎧今有盆領鐵鎧國語云吳王夫差衣水犀之甲二千爾雅翼云鮫出南海狀如鼈而無足圓廣尺餘尾長尺許皮有珠文而堅勁可以飾物又云犀兕並有甲兕之革最堅故犀甲只夀百年而兕甲夀二百年腸夷甲越記云楚王身被腸夷之甲組甲被練左傳襄三年楚子重伐吳為簡之師使鄧廖帥組甲三百被練三千杜預注云組甲被練皆戰備也組甲漆甲成文被練之袍賈逵云組甲以組綴甲車士服之被練以帛綴甲步卒服之孔頴達曰甲貴牢固若不固宜能用組何當造不牢之甲令步甲服之杜言組甲漆甲成文今時漆甲有為文者被練文不言甲必非甲名被是被覆衣著之名故以練袍被于身上吕祖謙曰被練若今之軟綿之類桃弧棘矢楚世家析父曰先王熊繹桃弧棘矢以共禦王事吳越春秋云楚有弧父弧父者生于楚之荆山生不見父母為児之時習用弓矢所射無脫以其道傳于羿羿傳逢䝉逢䝉傳于楚琴氏琴氏以為弓矢不足以威天下當是之時諸侯相伐兵刄交錯弓矢之威不能制服琴氏乃横弓着臂施機設樞加之以力然後諸侯可服琴氏傳之楚三侯所謂句亶鄂章人號麋侯翼侯魏侯也自楚之三侯傳至靈王自稱之楚累世盖以桃弧棘矢而備鄰國也大屈弓左傳昭七年夏四月楚享公好以大屈注弓名也疏魯連書曰大屈之弓賈云寳金可以為劍出大屈地烏嘷弓家語楚共王出游忘烏嘷之弓注烏嘷弓名繁弱弓孔叢子楚王張繁弱之弓載忘歸之矢以射蛟兕于雲夢忘歸矢詳見上鐵矢弩國䇿蘓秦為楚合從元戎以鐵為矢長八寸一弩十矢俱發宛路矰吕覽荆文王得茹黄之狗宛路之矰以畋雲夢說苑作箘簬之矰鉤史記楚莊王觀兵于周郊周定王使王孫滿勞楚子楚子問鼎大小輕重對曰在徳不在鼎莊王曰子無阻九鼎楚國折鉤之喙足以為九鼎胡廣曰鉤楚兵器戈之屬正義曰凡㦸有鉤之喙鉤口之尖也宛鉅鐵鉇詳見鮫革甲楊倅荀子注云宛地名屬南陽徐廣曰大鋼曰鉅鉇與鍦同矛也方言曰自闗而西謂之矛吳揚之間謂之鍦言宛地出此剛鐵為矛鏚左傳昭十二年楚公尹路請曰君王命剥圭以為鏚柲故請命注鏚斧也秘柄也玉以飾斧柄也警鼓韓非子楚厲王有警為鼓以與百姓為戒飲酒醉過而擊之也民大驚使人止之曰吾醉而與左右戲過擊之也民皆罷居數月有警擊鼓而民不赴文獻通攷云傳曰嚴警鼓一十二面大將營前左右行列各六面在纛後故大周正樂謂凡鼓施于邉徼謂之警鼓趙兵制帯甲車騎蘓秦說趙肅侯曰當今之時山東之建國莫強于趙趙地方二千餘里帯甲數十萬車千乗騎萬匹粟支數年西有常山南有河漳東有清河北有燕國臣切以天下地圖按之諸侯之地五倍于秦料度諸侯之勢十倍于秦六國為一并力西向而攻秦破秦必矣陳傅良曰趙括長平之敗喪師四十五萬而破燕栗腹尚二十萬李牧敗匈奴亦車千三百乗騎萬三千匹百金之士五萬人榖者十五萬人劍士莊子云昔趙文王喜劍劍士夾門而客三千餘人百金之士榖者史記李牧具選車得千三百乗選騎得萬三千匹百金之士五萬人榖者十萬人選車選騎詳見上决水趙襄子時三國攻晉陽嵗餘引汾水灌城城不沒者三版城中懸釡而炊襄子使張孟談見韓魏之君日夜期殺守堤之吏而决水灌知伯軍智伯軍救水而亂韓魏翼而擊之見武經舊注又趙肅侯十八年齊魏伐我我决河水灌之兵去見趙世家余按兵法有决水灌城未聞决水灌軍王應麟通鑑答問曰或問水攻始于何時曰古有以水佐耕未聞以水佐攻春秋時未之有也其自智伯始歟劉子曰㣲禹吾其魚乎聖人思天下之溺由已溺之欲民之免為魚也争城而戰魚其民以逞不仁哉智伯甚于作俑者也三家之灌晉陽史記世家以為汾水戰國䇿以為晉水按郡縣志汾水在晉陽城東晉水在西二說未知孰是智伯之言纔脫諸口而魏駒韓虎之肘足已接于車上不言而喻如矢激駟奔吁可畏也安邑魏邑也平陽韓邑也皆百雉之城猶趙之晉陽也絺庇知韓魏之必反然未有善後之䇿張孟談一說而晉陽之水還以灌智氏智氏遂死于鑿䑓之上曽子曰戒之戒之出乎爾者反乎爾老子曰佳兵不祥之器其事好還豈不信夫智伯以不仁之資行不仁之事辯士遂以為口實流毒無窮齊魏伐趙而趙人决河水以灌之决榮口魏無大梁决白馬之口魏無外黄濟陽决宿胥之口魏無虚頓丘縱横之徒口之而弗置其後魏竟以水亡樊噲之灌廢丘韓信之壅濰水髙岳之浸潁川皆以水攻取勝莫􅉃乎梁武之淮堰十餘萬人淪胥于海若觀蟻之移穴漠焉不慼于心南唐之臣有獻瓦梁之議者謂不止魚三州海五百里不仁之禍甚于洪水言不之怍也湯武救民水火之中曷嘗有是哉胡服騎射史記趙武靈王十九年春正月大朝信宫召肥義與議天下五日而畢王北略中山之地至于房子遂之代北至無窮西至河登黄華之上召樓緩謀曰我先王因世之變以長南藩之地屬阻障滏之險立長城又取藺郭狼敗林人于荏而功未遂今中山在我腹心北有燕東有胡西有林胡樓煩秦韓之邉而無彊兵之救是亡社稷奈何夫有髙世之名必有遺俗之累吾欲胡服樓緩曰善羣臣皆不欲于是肥義侍王曰簡襄主之烈計胡翟之利為人臣者寵有孝悌長幼順明之節通有補民益主之業此兩者臣之分也今吾欲繼襄主之跡開于胡翟之鄉而卒世不見也為敵弱用力少而功多可以毋盡百姓之勞而序往古之勲夫有髙世之功者負遺俗之累有獨智之慮者任驁民之怨今吾將胡服騎射以教百姓而世必議寡人柰何肥義曰臣聞疑事無功疑行無名王既定負遺俗之慮殆無頋天下之議矣夫論至徳者不和于俗成大功者不謀于衆昔者舜舞有苗禹袒裸國非以養欲而樂志也務以論徳而約功也愚者闇成事智者覩未形則王何疑焉王曰吾不疑胡服也吾恐天下笑我也狂夫之樂智者哀焉愚者所笑賢者察焉世有順我者胡服之功未可知也雖驅世以笑我胡地中山吾必有之于是遂胡服矣使王緤告公子成曰寡人胡服將以朝也亦欲叔服之家聴于親而國聴于君古今之公行也子不反親臣不逆君兄弟之通義也今寡人作教易服而叔不服吾恐天下議之也制國有常利民為本從政有經令行為上明徳先論于賤而行政先信于貴今胡服之意非以養欲而樂志也事有所止而功有所出事成功立然後善也今寡人恐叔之逆從政之經以輔叔之議且寡人聞之事利國者行無邪因貴戚者名不累故願慕公叔之義以成胡服之功使緤謁之叔請服焉公子成再拜稽首曰臣固聞王之胡服也臣不佞寢疾未能趨走以滋進也王命之臣敢對因竭其愚忠曰臣聞中國者盖聰明徇智之所居也萬物財用之所聚也賢聖之所教也仁義之所施也詩書禮樂之所用也異敏技能之所試也逺方之所觀赴也蠻夷之所義行也今王舍此而襲逺方之服變古之教易古之道逆人之心而怫學者離中國故臣願王圗之也使者以報王曰吾固聞叔之疾也我將自往請之王遂往之公子成家因自請之曰夫服者所以便用也禮者所以便事也聖人觀鄉而順冝因事而制禮所以利其民而厚其國也夫翦髮文身錯臂左袵甌越之民也黑齒雕題却冠秫絀大吳之國也故禮服莫同其便一也鄉異而用變事異而禮易是以聖人果可以利其國不一其用果可以便其事不同其禮儒者一師而俗異中國同禮而教離况于山谷之便乎故去就之變智者不能一逺近之服聖賢不能同窮鄉多異曲學多辨不知而不疑異于已而不非者公焉而衆求盡善也今叔之所言者俗也吾所言者所以制俗也吾國東有河薄洛之水與齊中山同之無舟楫之用自常山以至代上黨東有燕東胡之境而西有樓煩及秦韓之邊今無騎射之備故寡人無舟楫之用夾水居之民將何以守河薄洛之水變服騎射以備燕三吳秦韓之邉且昔者簡主不塞晉陽以及上黨而襄主并戎取代以攘諸胡此愚智所明也先時中山負齊之彊兵侵暴吾地係累吾民引水圍鄗㣲社稷之神靈則鄗幾于不守也先王醜之而怨未能報也今騎射之備近可以便上黨之形而逺可以報中山之怨而叔順中國之俗以逆簡襄之意惡變服之名以忘鄗事之醜非寡人之所望也公子成再拜稽首曰臣愚不達於王之義敢道世俗之聞臣之辠也今王繼簡襄之意以順先王之志臣敢不拜命乎再拜稽首乃賜胡服明日服而朝于是始出胡服令也趙文趙造周祒趙俊皆諫止王毋胡服如故法便王曰先王不同俗何古之法帝王不相襲何禮之循虙戯神農教而不誅黄帝堯舜誅而不怒及至三王隨時制法因事制禮法度制令各順其宜衣服器械各便其用故禮也不必一道而便國不必古聖人之興也不相襲而王夏殷之衰也不易禮而滅然則反古未可非而循禮未足多也且服竒者志淫則是鄒魯無竒行也俗辟者民易則是吳越無秀士也且聖人利身謂之服便事謂之禮夫進退之節衣服之制者所以齊常民也非所以論賢者也故齊民與俗流賢者與變俱故諺曰以書御者不盡馬之情以古御今者不達事之變循法之功不足以髙世法古之學不足以制今子不及也遂胡服招騎射國䇿云王破原陽以為騎邑牛賛進諫曰國有固籍兵有常經變籍則亂失經則弱今王破原陽以為騎邑是變籍而棄經也且習其兵者輕其敵便其用者易其難今民便其用而王變之是損君而弱國也故利不百者不變俗功不什者不易器今王破卒散兵以奉騎射臣恐其攻獲之利不如所失之費也王曰古今異利逺近易用隂陽不同道四時不一冝故賢人觀時而不觀于時制兵而不制于兵子知官府之籍不知器械之利知甲兵之用不知隂陽之宜故兵不當于用何兵之不可易教不便于事何俗之不可變昔者先君襄主與代交地城境封之名曰無窮之門所以詔後而期逺也今重甲循兵不可以踰險義仁道徳不可以來朝吾聞信不棄功智不遺時今子以官府之籍亂寡人之事非子所知牛賛再拜稽首曰臣敢不聴令乎至遂胡服率騎入胡出于遺遺之門踰九限之固絶五徑之險至胡中辟地千里按禮大司馬師帥執提鄭司農云謂馬上鼓疏云鄭盖據當時已有單騎舉以况周其實周時皆乗車無輕騎法也春秋正義云古者馬以駕車六國時始有單騎司馬法孫子無騎戰吳起為武侯戰以車五百乗騎三千匹而破秦五十萬衆其書六篇往往皆言騎戰蘓秦說燕曰騎六千匹說趙曰騎萬匹說魏曰騎五千匹說齊曰騎不得比行說楚曰騎萬匹此戰國用騎戰之騐今六韜言騎射决非太公所作杜牧之注孫子曰黄帝險于蚩尤以中夏車徒制夷狄騎士乃知單騎之兵始于黄帝按春秋傳秦晉韓原之戰惠公乗小駟昭公元年晉中行穆子毁車崇卒敗戎大鹵而單騎自此始矣國䇿注曰武靈王破原陽以為騎邑者盖始教一邑然後行于境内漢劉向曰戰國有騎無騎射騎射胡兵也趙武靈王用之又按惠文王三十二年使趙奢將擊秦大破秦軍閼與下賜號馬服軍虞喜志林曰馬服者言能服馬也郭氏曰馬騎也服便也言便於騎射亷頗傳亷頗思復用趙見趙使者為之一飯斗米肉十斤被甲上馬郭氏曰趙尚騎射故被甲上馬李牧傳李牧居代雁門備匈奴日擊數牛饗士習騎射武靈以下世世勿失矣右軍左軍中軍史記武靈王二十一年攻中山趙祒為右軍許鈞為左軍公子章為中軍王并將之牛翦將車騎趙希并將胡代趙與之陘合軍曲陽太子將史記晉出公十一年智伯代鄭趙簡子疾使太子將而圍鄭武靈王十二年趙何攻魏按何武靈王之太子也即惠文王自將武靈王二十一年攻中山王自將之詳見前右軍左軍中軍武靈王二十七年傳國于何自號為主父主父身胡服將士大夫西北略胡地而欲從雲中九原直南襲秦于是詐自為使者入秦秦昭王不知已而怪其狀甚偉非人臣之度使人逐之而主父馳已脫闗矣審問之乃主父也秦人大驚主父所以入秦者欲自略地形因觀秦王之為人也惠文王二年主父行新地遂出代西遇樓煩王于西河而致其兵三年滅中山從代道大通還相將史記惠文王十四年相國樂毅將趙韓魏燕攻齊孝成王十五年封相國亷頗為信平君是年亷頗為趙將破殺栗腹虜卿秦樂間十六年亷頗圍燕十八年延陵鈞率師從相國信平君助魏攻燕二十一年亷頗將攻繁陽孝成王十七年假相大將武襄君攻燕圍其國余按戰國尚兵將相合而為一假相大將武襄君者盖當時將軍以相為重武襄未相故假而攻燕也借兵趙敬侯六年借兵于楚伐魏取棘蒲見史記按敬侯四年魏敗趙兎臺五年齊魏為衛攻趙取趙剛平困乏之後故借兵于楚也田獵信陵君傳魏公子與王博傳言趙冦至公子曰趙王田獵耳非為冦也居頃復從北方來傳言曰趙王獵耳非為冦也犀楯犀櫓韓非子云趙簡子圍衛之郊郭犀楯犀櫓立于矢口之所不及注以犀為脅櫓而自卧之櫓楯類也趙七首李詩袖中趙匕首買自徐夫人典論云楚國太阿徐氏匕首上世名器按史記燕太子丹將使荆軻刺秦王得趙人徐夫人匕首使工以藥焠之以弑人血濡縷無不立死者魏兵制武力蘓秦說魏襄王曰大王之卒武力二十餘萬蒼頭二十萬奮擊二十萬厮徒十萬車六百乗騎五千匹余按武力即荀卿所謂魏氏武卒也蒼頭奮擊厮徒詳見蘓秦說魏注云蒼頭者謂以青巾裹頭以異于衆唐王某河清頌云魏立蒼頭秦稱黔首厮徒者謂養馬賤者亦為兵陳傅良曰魏之兵盛矣至安釐王時秦圍大梁悉北縣勝兵以上為戌士三十萬步軍孫吳列傳龎涓棄其步軍革車魏革車掩戸縵輪籠轂見呉子騎車六百乗騎五千匹詳見蘓秦說魏立大將之制未學篇云魏制立大將君自布席夫人奉觴親醮于廟乃授斧鉞自立吳起始也太子將史記惠王九年與秦戰少梁虜我太子申見年表太子將而戰故為秦虜也又三十年魏伐趙趙告急齊齊宣王用孫子計救趙擊魏魏遂大興師使龎涓將而令太子申為上將軍見世家田獵國䇿魏文侯與虞人期獵具以飲酒樂天雨文侯將出左右曰今日飲酒樂天雨將焉之文侯曰吾與虞人期獵雖樂豈不一㑹期哉乃往自罷之魏于是始強惠王軍法未學篇引魏惠王軍法云將自千人以上有戰而北守而降離地逃衆命曰國賊身戮家殘去其籍發其墳墓暴其尸于市男女公于官自百人以上有戰而北守而降命曰軍賊身死家滅男女公于官五人為伍伍干令犯禁者掲之免于辠知而弗掲全伍有誅十人為什什干令犯禁者掲之免于罪知而弗掲全什有誅五十人為屬屬干令犯禁者知弗掲全屬有誅百人為閭閭干令犯禁者知弗掲全閭有誅自什以上至左右將于令犯禁者掲之免勿掲皆與同罪什長得誅十人伯長得誅什長千人得誅伯人之長萬人之將得誅千人之將左右將軍得誅萬人之將大將無不得誅虎符非有王命出户外者誅將兵而還者誅是北類也雖太子勿赦按魏世家云將兵而還與北同與此相合乃魏法也余按尉繚子同豈尉繚所定耶吳起戰法通典引吳起教戰法短者持矛㦸長者持弓弩強者持旌旗勇者持金鼓弱者給厮養智者為謀士鄉里相比什伍相保一鼓整兵二鼓習陳三鼓趨食四鼓嚴辨五鼓就行聞鼓聲合然後舉旗晝以旌旗旛旄為節夜以金鼓為節鼓之則進金之則止一吹而行再吹而聚不從令者誅按漢志吳起四十八篇又尉繚子引吳起與秦戰未合一夫不勝其勇前獲兩首而還吳起立斬之軍吏諫曰此材士也不可斬起曰材士則是也非吾令也斬之史記云吳起之為將與士卒最下者同衣食卧不設席行不騎乗親贏糧與士卒分勞魏公子兵法信陵君傳魏安釐王三十年公子使使遍告諸侯諸侯聞公子將各遣將將兵救魏公子率五國之兵破秦軍于河外走䝉驁遂乘勝逐秦軍至函谷闗抑秦兵秦兵不敢出當是時公子威振天下諸侯之客進兵法公子皆名之故世俗稱魏公子兵法劉歆七略有魏公子兵法二十一篇圖十卷又孔叢子云子髙適魏㑹秦兵將至信陵君懼造子髙之館而問祈勝之禮焉子髙曰命勇謀之將以禦敵先使之迎于敵所從來之方為壇祈克于五帝衣服隨其方色執事數從其方之數牲則用其方之牲祝史告于社稷宗廟邦域之内名山大川君親服誓于太廟曰某人不道侵犯大國二三子尚皆同心比力死守將帥稽首再拜受命既誓將帥勒士卒陳于廟之右君立太廟之庭祝史立于社百官各警其事御于君以待命乃大鼓于廟門詔將帥命卒習射三發擊刺三行告廟用兵于敵也五兵備効乃鼓而出以即敵此諸侯應敵之禮也三屬之甲荀子曰魏氏之武卒以度取之衣三屬之甲撡十二石之弩負服矢五十箇置戈其上冠䩜帯劍嬴三日之糧日中而趨百百中試則復其户利其田宅是數年而衰而未可奪也改造則不易周也是危國之兵不可以直秦之銳士楊倞曰度取之謂取其長短材力中度者復其户不徭役也利其田宅不征衆也三屬之甲者服䖍曰作大甲三屬竟人身也蘓林曰兠鍪也盆領也髀禈也如淳曰上身一髀禈一踁繳一凡三屬也屬聫也又吳子吳起見魏文侯曰今君斬離皮革掩以朱漆畫以丹青爍以犀象十二石之弩見上沈括曰鈞石之石五權之名石重百二十斤後人以一斛為一石自漢時已如此余按一斛為一石周時已然括言誤于定國飲酒一石不亂是也挽彊弓弩古人以鈞石率之今人乃以秔米一斛之重為一石凡石以九十二斤半為法乃漢稱三百四十斤也今之武卒蹶弩有及九石者計其力乃古二十五石比魏之武卒當二人有餘此乃近世教習所致又淮南子曰古之兵弓劍而已矣槽柔無擊脩㦸無刺晩世之兵隆衝以攻渠幨以守連弩以射銷車以闘許慎注連車弩通一弦以牛挽之以刄著左右為機開發之曰銷車䩜詳見荀子漢書作胄顔師古曰著兠牟也銅劍王隠晉書云汲郡冡有銅劍一枚長三尺五寸盖魏劍也山海經注云汲冡中得銅劍今所名干將劍明古者通以錫銅為兵器虎符信陵君傳侯生屏人間語曰嬴聞晉鄙之兵符常在王卧内而如姬最幸出入王卧内力能竊之嬴聞如姬父為人所殺如姬資之三年自王以下欲求報其父仇莫能得如姬為公子泣公子使客斬其仇頭敬進如姬如姬之欲為公子死無所辭顧未有路耳公子誠開口請如姬如姬必許諾則得虎符奪晉鄙軍北救趙而西却秦此五伯之伐也按虎威猛之獸故以為兵符漢有銅虎符雲烟過眼録云太史楊瑀所藏銅虎符一全體具存背上篆云某虎發兵待行腹下分書十千唯戊癸二字合全餘八字皆平腹内作牝牡五竅開合之則一全虎也烽信陵君傳公子與魏王愽而北境傳舉烽言趙冦至且入界文博曰作髙木櫓櫓上作桔橰桔橰兠零以薪置其中謂之烽常眠之有冦即火燃舉以相告韓兵制帯甲厮徒負養蘓秦說韓王曰韓地方千里帯甲數十萬天下之強弓勁弩皆自韓出谿子少府時力距來者皆射於六百步之外韓卒超足而射百發不暇止逺者達胸近者掩心韓卒之劍㦸皆出于冥山棠谿墨陽合賻國䇿作伯鄧師宛馮龍淵太阿皆陸斷牛馬水截鵠鴈甲楯鞮鍪音題矛鐵幕革抉㕹芮無不畢具以韓卒之勇被堅甲蹠勁弩帯利劍一人當百不足言也張儀為秦連衡說韓王曰料大王之卒悉之不過三十萬而厮徒負養在其中矣為除守徼亭障塞見卒不過二十萬而已蘓秦合從匿短舉長張儀連衡匿長舉短蘓秦知韓地惡不言食貨張儀知韓兵勁不論弓弩谿子弩見蘓秦說韓南方谿子蠻夷柘弩皆善材時力弩距來弩韓有谿子又有少府所造時力距來二種之弩按時力謂作之得時力倍于常故名時力距來者謂弩勢勁利足距來敵也見淮南鐵幕鞮鍪見蘓秦說韓注鐵幕以鐵為之臂衣也鞮鍪一作題鍪革抉㕹芮同上革抉射鞲也謂以革為射决㕹謂楯也芮謂繫楯之紛綬也棠谿墨楊合伯鄧師宛馮龍淵太阿莫邪干將晉太康地理記云天下寳劍韓為衆有曰棠谿曰墨楊曰合伯曰鄧師曰宛馮曰龍淵曰太阿曰莫邪曰干將按魏了翁經外雜抄云蘓秦說韓王曰韓有劍㦸出于棠谿蔡州西平縣西界棠谿村是也縣又有龍泉水可以淬劍九域志云蔡州有冶爐城韓國鑄劍之地又琴􅋵云聶政父為韓王治劍過期不成王殺之又桓寛鹽鐵論云世言強楚勁鄭有犀兕之甲棠谿之鋌也鄧師者龍魚河圖云鄧國有工善鑄劍因名宛馮者殷芸小說云宛人于馮地鑄因以為號燕兵制帯甲車騎蘓秦說燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有滹沱易水地方二千里帯甲數十萬車六百乗騎六千匹又王喜以車二千乘攻趙陳傅良曰栗腹之敗于趙也二軍六十萬車二千乗自將相將史記燕王喜四年王命相栗腹約歡趙以五百金為趙王酒還報燕王曰趙王壯者皆死長平其孤未壯可伐也王召昌國君樂間問之對曰趙四戰之國其民習兵不可伐王曰吾以五而伐一對曰不可燕王怒羣臣以為可卒起二軍車二千乗栗腹將而攻鄗卿秦攻代唯獨大夫將渠謂燕王曰與人通闗約交以五百金飲人之王使者報而反攻之不祥燕王不聽自將偏軍隨之二軍偏軍並詳上上功中功下功報坎戰國陽秋注云樂毅既破齊昭王親至濟上勞苦令軍中曰將軍得齊祭器謂之下功得齊城郭謂之中功得齊人民心謂之上功上功饗太牢受銳賞其次中功中功饗少牢受鈎賞其次下功下功饗鄉牢無功不饗賜之壺漿謂之報坎報坎報勞之謂也余按銳賞鈎賞義未詳易緯鄉牢四宋均注云鄉牢羽牢也謂雞鶩之屬樂毅列傳云昭王親至濟上勞軍行賞饗士七國攷卷十一
