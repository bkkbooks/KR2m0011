body:
  text: 七國攷卷四明董說撰秦宫室西垂宫秦文公元年居西垂宫見秦紀封宫一作平陽宫武公元年居平陽封宫正義曰封宫在岐州平陽城内也雍録云平陽宫在華山下徐廣云一云居平封宫大鄭宫秦紀徳公元年初居雍城大鄭宫括地志云岐州府雍縣南七里故雍城秦徳公大鄭宫城也陽宫秦别紀宣公享國十二年居陽宫左宫秦别紀夷公不享國死𦵏左宫覇宫三秦記云覇城秦穆公築為覇宫髙泉宫陜西志髙泉宫在扶風縣東美陽縣故城秦宣太后嘗居之甘泉宫史記齊人茅焦說秦王曰秦方以天下為事而大王有遷母太后之名恐諸侯聞之由此倍秦也秦王乃迎太后于雍而入咸陽復居甘泉宫按陜西淳化縣有甘泉山秦甘泉宫剏其上也劉歆曰秦王政二年起甘泉宫應劭曰甘泉宫名在雲陽一名林光薛瓉史記注云甘泉山名林光秦離宫名虢宫漢志虢宫宣太后起雍録云在岐州虢縣離宫史記范雎見秦王於離宫應劭曰離本卦體名秦以名宫秦有封宫離宫王律曰離宫别宫也二說不知孰正秦川宫郡國志秦川宫者昔非子到秦于此築宫室長安宫郭氏𤣥中記云秦文公造長安宫西面四百里南至終南山芷陽宫水經注襄王芷陽宫在覇上棫陽宫秦昭王起棫陽宫見鄭志雍録云棫陽宫在岐州扶風漢書文帝紀二年夏行幸雍棫陽宫張晏曰秦昭王所作萯陽宫三輔黄圖萯陽宫秦文王所起在今鄠縣西南二十三里一統志云萯陽宫秦惠文王建漢時猶存宣帝嘗幸之應劭曰萯音倍羽陽宫陳倉有羽陽宫秦武王起見鄭志又歐陽公研譜云相州真古瓦朽腐不可用世俗尚其名爾今人乃以澄泥如古瓦狀埋土中乆而研之然近有長安民獻秦武公羽陽宫瓦十餘枚若今人筩瓦然首有羽陽千歳萬歳字其瓦猶今舊瓦殊不朽腐研北雜志云秦羽陽宫在鳳翔寳雞縣界歳乆不知其處宋元祐六年正月直縣門之東百步居民權氏浚地得古筒瓦獨一尚完面徑四寸四分瓦面隠起四字曰羽陽千歳篆字隨勢為之不取方正始知即羽陽舊址也槖泉宫皇覽云秦繆公家在槖泉宫祈年觀下廟記云槖泉宫秦孝公造祈年觀徳公造漢書注作橐泉宫興樂宫三輔故事云咸陽宫在渭北興樂宫在渭南秦昭王通兩宫之間作渭橋長三百八十步咸陽宫刺客傳秦王朝服設九賓見燕使者咸陽宫劉向曰秦未兼天下即厚歛起咸陽宫華陽宫秦史秦太子妃曰華陽夫人華陽秦太子宫名在陜西西安府舊長安城内太子即秦孝文王柱也六英宫廣記云主父入秦直至昭王所居六英之宫而人不覺髙寢秦别紀康公享國十二年居雍髙寢共公享國五年居雍髙寢景公享國四十年居雍髙寢大寢秦别紀桓公享國二十七年居雍大寢愛寢秦别紀躁公享國十四年居愛寢冀闕史記孝公十二年作為咸陽築冀闕徙都之劉伯莊云冀猶記事闕即象魏也或曰人臣至此必思其所闕三輔黄圗云孝公改都咸陽築冀闕其曰闕必古象魏矣而何以標名為冀也按史記孝公十一年衛鞅圍安邑降之十二年作冀闕冀者冀州也安邑即冀州之邑也冀之為州堯舜禹皆嘗都焉今孝公已得冀州而築冀闕其必放古闕存者而剏立此名也秦殿荆軻傳秦法羣臣侍殿上者不得持尺寸之兵又燕丹子云荆軻至秦殿上展圗荆軻拔匕首擿秦王决耳入銅柱火出余又按各國宫室魏有丹衣柱趙晉陽宫銅柱秦殿銅柱並見本國宫室攷楚有鐵柱見列異傳章臺蘓秦說楚威王曰今欲西面而事秦則諸侯莫不南面而朝于章臺之下矣又楚懷王入秦朝章臺如藩臣禮見楚世家三休臺李善文選注云戎王使由余聘秦秦繆公示以宫室引之登三休臺由余曰臣國土階三尺茅茨不翦寡君猶謂作之者勞居之者淫此臺若鬼為之則神勞矣使人為之則人亦勞矣祀雞臺一統志陜西鳳翔府寳雞縣東二十里有祀雞臺秦文公立寳雞祠築此臺祀之白起臺長平城在郡之南秦壘在城西二軍共食流水澗相去五里秦坑趙衆收頭顱築臺于壘中因山為臺崔巍桀起號曰白起臺見上黨記㑹盟臺一統志㑹盟臺在河南河南府澠池縣西城外秦昭王與趙惠王㑹盟于此臺靈臺列女傳秦獲晉君以歸穆姬聞之乃與太子罃公子𢎞與簡璧穆姬女也衰絰履薪以迎公懼乃舍諸靈臺左傳同杜預曰靈臺在京兆鄠縣周之故臺史記作舍之上舍鳳臺劉向列仙傳蕭史者善吹簫作鸞鳳之樂秦穆公有女字㺯玉好之公遂以妻焉日教弄玉作鳳鳴后數年吹簫似鳳聲鳳凰來止其舍公為作鳳臺一統志作鳳女臺祈年觀一作祈年宫詳槖泉宫水經注曰雍縣中年井秦惠公之故居所謂祈年宫也孝公又謂之槖泉宫名雖兩出其實一宫也酈又按地理志知其地皆屬雍縣又引崔駰之言曰穆公冡在槖泉宫祈年觀下又從而辨正其失曰劉向固言穆公𦵏無丘壟處矣惠公孝公並是穆公繼世之君子孫無由起宫于祖宗之墳陵也以是推之知二證之非實也按酈此言則是祈年宫槖泉宫皆在惠公雍都而亦不知何人所建獨漢書曰祈年宫惠公所起也三輔黄圗作蘄年宫且曰秦穆公所造廟記宫在城外而始皇本紀則曰在雍皆以世逺難究其的也廣成舍史記藺相如奉璧西如秦秦王舍相如廣成舍索隠廣成舍之名張儀樓杜甫石犀行蜀人矜誇一千歳泛濫不及張儀樓成都記云張儀樓在于城南髙百尺蜀紀云張儀既築龜城作樓髙百尺定江山南北之勢觀樓射圃華陽國志秦惠王二十七年張儀與張若城成都周迴十二里髙七丈郫城周迴七里髙六丈臨卭城周迴六里髙五丈造作下倉上皆有屋而置觀樓射圃成都縣本治赤里街若徙置少城内城營廣府金置鹽鐵市官并長丞修整里闠市張肆列與咸陽同制具囿左傳云鄭之有原圃猶秦之有具囿也五苑韓子秦大饑應侯請發五苑菓棗以活民按史記孝文王元年赦罪人修先王功臣褒厚親戚弛苑囿上林應劭曰嬴秦未并天下章臺上林皆在渭南上林秦苑名也獸圏三輔黄圗秦有獸圈烈士傳云秦王召魏公子無忌不行使朱亥奉璧一雙詣秦秦王怒使置亥于獸圈中永巷史記范雎得見于離宫佯為不知永巷而入其中正義曰永巷宫中獄也田齊宫室梧宫劉向說苑楚使使聘于齊齊王饗之梧宫水經注齊王享楚使梧宫之側有臺層秀䑓西有碑漢熹平間立今廢按山東通志梧臺在臨淄縣界即梧宫也又齊地記云齊城有梧桐臺唐韓翃青州詩栢寢寒蕪變梧臺宿雨收雪宫山東志古蹟青州有雪宫在府城内城隍廟西有遺址存齊王見孟子於雪宫即此郡縣志雪宫故趾在臨淄縣東北六里余按晏子春秋齊侯見晏子於雪宫姜齊有雪宫也文選謝惠連云雪宫建于東國雪山峙于西域注雪宫在齊故云東國百畆室老子注解齊有百畆之室按吕氏春秋齊宣王為大室盖百畆堂上三百户三年而未成羣臣莫敢諫老子注解盖引此也右室史記騶忌子以鼓琴見王威王說而舍之右室應劭曰古諸侯置左右室也瑶臺說苑齊威王遊於瑶臺許慎淮南注帝有桀紂為璇室瑶臺者璇瑶石之似玉以飾室臺也栢寢臺杜氏通典青州千乗縣柏寢臺齊景公與晏子遊處至田氏王亦屢游樂焉庾亮啟云齊威王不登柏寢之臺故忠臣日親楚莊王戒強臺而弗登故驕樂日踈琅邪臺戰國春秋威王起琅邪之臺倚山背流其髙九仭淮南子注齊宣王樂琅邪之臺三月不返按山東志琅邪臺在琅邪山戲馬臺吕觀孟子注引國䇿云齊宣王登戲馬之臺羣臣皆從今本無按志戯馬臺在新城縣治東世傳齊桓公歇馬之臺一云景公祭臺山東志祭臺在平隆縣西南相傳齊康公𦵏此後人築祭臺􅀕之或曰田齊之王祭之也漸臺齊宣王漸臺五重黄金白玉琅玕籠䟽翡翠珠璣幕絡連飾見列女傳九重臺說苑齊王起九重之臺募國中有畫者賜之錢狂卒敬君居常饑寒妻端正敬君工畫貪賜畫臺去家日乆思念其妻像向之熹笑旁人瞻見之以白王王即設酒與敬君相樂謂敬君曰國中獻女無好者以錢百萬易妻可乎不者殺汝敬君倉惶聽許余又按姜齊諸臺名可攷者左傳齊晏子侍于遄臺又齊有檀臺亢倉子齊有清臺不詳世代又闞子云景公登虎圏之臺又一統志桓公臺在樂安縣東齊桓公盟諸侯于此臺他如穆陵臺牛山臺戰臺封衛臺封禪臺夫人臺或以地或以事名號尤多不能具載又齊威王閉虞姬九層之臺稷山館史記齊宣王喜文學游說之士自如騶衍淳于髠接予瓌淵之徒七十六人皆賜列第為上大夫不治而議論是以齊稷下學士復盛且數百千人齊地記曰齊城西門側系水左右有講室趾往往存焉虞嘻曰齊有稷山立館其下以待游士名曰稷山館七畧云齊田駢遊稷下好談論號天口言不可窮盡余按稷山館一名講堂郡國志云齊桓公宫城西門外有講堂齊宣王立此學也故稱為稷下學即稷山館也明堂齊宣王欲毁明堂見孟子按禮記明堂位云明堂者明諸侯之尊卑昔成王封周公于曲阜令魯世世祀周公以天子之禮樂故泰山下有明堂相傳為周公朝諸侯之處盖魯封内有泰山後嘗以為齊所代故齊南有泰山云美唐吕氏春秋齊人走莒燕人争金于美唐注美唐齊藏金之處楚方府三錢府之類也篇海云廟中路謂之唐鹿囿李郊宫室賦齊則栢臺鹿囿按孟子曰臣聞郊闗之内有囿方四十里殺其麋鹿者如殺人之罪所謂鹿囿也章華東門閭門武鹿門史記宣王三十六年蘓代自燕來入齊見于章華東門括地志云齊城章華之東有閭門武鹿門也東門國䇿作南門杏唐之門魯連子魯仲連見孟嘗君于杏唐之門一作杏堂之門稷門劉向别録稷門齊城門也談說之士期㑹于稷門之下故曰稷下一統志稷山者山有后稷祠故名稷山余按虞嘻所謂稷山館者稷山下之館也劉向所謂稷門者稷山下之門也或以稷門為稷館誤矣司馬門列女傳鍾離春詣齊司馬門按賈誼書曰天子宫門曰司馬門司馬貞曰天子門有兵欄曰司馬門也雍門戰國䇿孫子謂田忌曰使輕車銳騎衝雍門注雍去聲齊西門也博物志韓娥東之齊過雍門鬻歌假而去餘響遶梁三百日不絶故雍門人至今善歌郎門韓子齊中大夫有夷射者御飲于王醉而出倚于郎門楚宫室細腰宫四川志巫山治西北楚襄王所遊之地有古楚宫遺址尚存所謂細腰宫也按楚靈王亦好小腰淮南子靈王好細腰而民有殺食自饑也徐陵玉臺新詠序楚王宫内無不推其細腰衛國家人俱言訝其纎手述廣記云楚中有宫人草狀如金䔲花色紅翠俗說楚靈王時宫人數千皆多愁曠有囚死于宫中者塟之后墓上悉生此花假君宫越絶書云春申君子假君宫前殿屋盖地東西十七丈五尺南北十五丈七尺堂髙四丈十霤髙丈八尺殿屋盖地東西十五丈南北十丈二尺七寸户霤髙丈二尺庫東鄉屋南北四十丈八尺上下户各二南鄉屋東西六十四丈四尺上户四下户三西鄉屋南北四十二丈九尺上戸三下户二凡百四十九丈一尺檐髙五丈二尺霤髙二丈九尺周一里二百四十一步春申君所造大宫國䇿吳與楚戰于柏舉䝉榖奔入大宫負雞次之典渚宫左傳云楚子西縊而梁絶王使適至使為商公㳂漢泝江將入郢王在渚宫下見之杜預注小洲曰渚正義曰商在漢水北漢水東流而南入江子西既至商聞讒言不敢居商縣㳂漢水順流而下至江乃泝流逆上渚宫當郢都之南故王在渚宫下見之也章華臺左傳楚子即位為章華之宫納亡人以實之杜預曰章華南近華容縣余按楚華容城内又有章華臺盖宮以臺名也蘭臺之宫風賦楚襄王游于蘭臺之宫楚世家楚有人謂頃襄王曰王請繳蘭臺飲馬西河蘭臺一名南臺時所謂楚臺者也湖廣志楚臺山在歸州城中舊傳楚襄王建臺于此因名又杜詩注作雲臺之宫夀宫楚辭蹇將憺兮夀宫注夀宫楚供神之宫也漢武帝時置夀宫神君楚殿平原君傳毛遂定從于楚殿上韓詩外傳楚成王讀于殿上又楚莊王賜其羣臣酒日暮酒酣左右皆醉殿上又樂人優孟入殿門大哭余按齊景公時有得罪者景公大怒縛置之殿下是春秋已有殿矣太室史記楚共王有寵子五人無適立乃望祭羣神請神决之而隂與巴姬埋璧于太室之庭杜預曰太室楚廟也㨿劉向别録云楚有太室王游焉是楚别館葉庭國䇿秦興師求九鼎周君患之顔率曰大王勿憂臣請東借救於齊謂齊王曰秦欲九鼎不若歸之大國齊王大發師五萬人救周而秦兵罷齊將求九鼎周君又患之顔率至齊謂齊王曰大國何途之從而致之齊齊王曰將寄徑於梁顔率曰不可夫梁之君臣欲得九鼎謀之暉臺之下沙海之上其日乆矣鼎入梁必不出王曰寡人將寄徑于楚對曰不可楚之君臣欲得九鼎謀之葉庭之下其日乆矣鼎入楚必不出小曲臺列女傳楚恭王在小曲之臺令尹侍焉層臺楚書右篇楚莊王築層臺延石千重延壤百里國人勞苦罷敝士有反三月之糧者說苑云莊王築層臺大臣諫者七十二人皆死矣有諸御已者入諫莊王遂解層臺而罷民楚人歌之曰薪乎萊乎無諸御已訖無子乎萊乎薪乎無諸御已訖無人乎按晉靈公嘗造九層臺雲夢臺髙唐賦序游于雲夢之臺通鑑注祝穆云據左傳邢夫人棄子文于夢中言夢而不言雲楚子避吳入于雲中言雲而不言夢則知雲夢二澤也漢陽志雲在江之北夢在江之南子産相楚楚子享之賦吉日王以田江南之夢盖楚之雲夢跨江南江北故有南夢有北夢陽雲臺古文苑襄王與唐勒景差宋玉游于陽雲之臺玉作大言賦文選作雲陽時所謂陽臺者豫章臺水經注江水又東得豫章口夏水所通也西北有豫章岡盖因岡而得名矣或言因楚王豫章臺名匏居臺楚語伍舉曰先君莊王為匏居之臺髙不過望國氛大不過容晏豆木不妨守備用不煩官府或作抱居之臺放鷹䑓一統志放鷹臺在湖廣安陸州州城東南五十里藪澤間四望空濶極目千里而臺居其中昔楚王游獵放鷹于此又襄陽耆舊記云楚王好遊獵之事揚鑣馳逐乎華容之下射鴻乎夏水之濱按荆門州北亦有放鷹䑓志云楚昭王放鷹之所附社臺湖廣志楚昭王游獵與越姬同乗馳逐登附社之臺望雲夢之圃顧謂姬曰樂乎對曰樂則樂矣不可乆也亦見列女傳春申臺一統志春申臺在夀州城内東北隅楚春申黄歇所築遺址尚存釣臺一統志釣臺在江陵縣西南龍陂北相傳楚莊王垂釣臺也乾谿臺新語楚靈王作乾谿之臺五百仭之髙欲登浮雲窺天文薛綜注張衡東京賦引左氏傳迺云楚子成章華之臺於乾谿誤說也左傳實無此文章華與乾谿元非一處中天臺賈誼新書楚王作中天之臺三休而後至其上按魏襄王亦作中天臺詳魏宫室又文選注云周穆王築臺號曰中天之臺中天言髙及天半也章華臺楚靈王築一名三休臺左傳楚子成章華臺願與諸侯落之史記靈王七年就章華臺注宫室始成祭之為落䑓今在華容城内湖廣志云華容城在監利縣又云章華䑓一名三休臺按賈子新書翟王使使之楚楚王誇之饗于章華之臺三休乃至臺名三休疑取諸此國語云昔楚靈王不君其臣箴諫不入乃築臺于章華之上為石郭陂漢以象帝舜章華臺楚靈王築一統志楚章華臺在荆州府境有二臺一在府城外沙市一在監利縣東北皆傳以為楚靈王所築其在監利者又名三休臺唐胡曽詩茫茫衰草沒章華因笑靈王昔好奢臺土未乾簫管絶可憐身入野人家章華臺楚襄王築河南志河南開封府商水縣西北三里有章華臺初楚靈王築章華臺于華容城及襄王為秦將白起所迫北保于陳更築此臺五仭臺說苑楚莊王與晉戰勝之懼諸侯之畏已也乃築為五仭之臺臺成而觴諸侯諸侯請約莊王曰吾薄徳之人也諸侯請為觴乃仰歎曰將將之臺窅窅其謀我言而不當諸侯伐之于是逺者來朝近者入賓九重臺韓詩外傳齊景公使人于楚楚王與之上九重之臺強臺淮南子令尹子佩請飲莊王莊王請諾子佩疏揖北面立于殿下曰昔者君王許之今不果往意者臣有罪乎莊王曰吾聞子具于強臺強臺者南望料山以臨方皇左江而右淮其樂忘死若吾薄徳之人不可以當此樂也恐留而不能反國䇿云楚王盟強臺而弗登曰后世必有以髙臺陂池亡其國者荆臺邊讓賦云靈王游雲夢之中息于荆臺之上家語云楚王將遊荆臺司馬子期諫一統志荆臺在監利縣西三十里士洲之南五樂臺一統志湖廣河陽府有五樂臺在古州城東北相傳楚王出獵之所孟子注箋云楚康王作樂臺京臺文選注楚王登京臺南望獵山左江右湖其樂忘死漸臺列女傳貞姜者楚昭王夫人也王出游留夫人漸臺之上王聞江水大至使使者迎夫人忘持其符使者請夫人夫人不去于是使者取符則水大至臺崩夫人流而死蔡邕琴操有漸水之臺疑即此朝雲館襄陽耆舊傳楚襄王游雲夢望朝雲之館髙唐觀傅武仲舞賦楚襄王既游雲夢使宋玉賦髙唐之事李善注雲夢藪在南郡華容縣髙唐楚觀名宋玉髙唐賦序曰楚襄王與宋玉遊於雲夢之臺望髙唐之觀漫叟詩話曰濠州西有髙唐館俗以為楚之髙唐也宋閻欽愛詩借問襄王安在哉山川此地勝陽臺盖言其非耳髙府史記白公勝刼惠王置之髙府杜預曰楚别府也方府莊辛說楚襄王方府之金方府藏金之府也平府吕氏春秋荆王發平府而視故記章句云平府藏書之室三錢府史記楚王使使封三錢之府東面壇西面壇新序秦欲伐楚使使者徃觀楚之寳器楚王聞之召昭奚恤問焉恤曰此欲觀吾國得失而圖之寳器重于賢臣夫珠玉玩好之物非國之重寳也遂使恤發精兵三百人陳于西門之内為東面之壇一為西面之壇一秦使者至曰君客也請就上位楚王池楚王池在巫山縣治東北其水甘美相傳楚襄王曾于池上納涼見志洗馬池一統志洗馬池在湖廣荆州歸州得勝門外一里楚襄王時洗馬之所永巷列女傳呉勝楚入至郢昭王亡吳王闔閭盡妻其後宫次至伯嬴持刀曰近妾而死何樂之有如先殺妾又何益于君王王慚遂退舍伯嬴與其保阿閉永巷之門皆不釋兵三旬秦救至昭王乃復矣龍門楚辭望龍門而不見蛇門吳地記蛇門南面有陸無水春申君造以禦越軍在已地以屬蛇因號蛇門茅門詳見刑法攷一作第門棘門李園殺春申于棘門見史記楚門越絶書楚門春申君所造楚人從之故為楚門修門宋玉招魂魂兮歸來入修門些王逸注修門郢城門也趙宫室信宫武靈王十九年春正月大朝信宫見趙世家晉陽宫國䇿張孟談曰臣聞董子之治晉陽也公宫之垣皆以荻蒿苫楚廧之其髙至丈餘君可發而為矢于是發而試之其堅則箘簬之勁不能過也君曰矢足矣吾銅少若何張孟談曰臣聞董子之治晉陽也公宫之室皆以鍊銅為柱質請發而用之則有餘銅矣及三國之兵乗晉陽城三月不能拔吕覽章句云晉陽之宫銅柱礎天下之雄宫也又云董晉陽築兵宫而人不見緝矢垣而隣國不備古以銅為兵春秋戰國皆然郡國志云太原府城中又有三城其一曰大明城即古晉陽城也董安于所築晉陽故宫一名大明宫在州城内避暑宫一統志趙王臺在山西遼州府和順縣西二里狀如伏虎人傳為趙襄子避暑宫東宫武靈王二十七年五月戊申大朝于東宫傳國立王子何以為王見史記沙丘宫史記主父餓死沙丘宫正義曰在邢州平鄉縣東北二十里壇臺之宫李公緒趙記曰趙孝成王造壇臺之宫為趙都朝諸侯故曰信都邯鄲宫述異記曰邯鄲有故邯鄲宫基址存焉中有趙王果園梅李至冬而花春得食叢臺郡國志趙有叢臺有洪波臺劉劭趙都賦結雲閣于南宇立叢臺于少陽唐開元十七年嚴浚作叢臺賦張衡東京賦云周姬之末不能厥政政多用僻始于宫隣卒于金虎嬴氏傅翼擇肉西邑是時也七雄並争競相髙以奢麗楚築章華于前趙建叢臺于後太平御覽云趙武靈王建叢臺於邯鄲漢書髙后紀趙王宫叢臺災師古曰運聚非一故名叢臺盖本六國時趙王故臺也在邯鄲城中洪波臺見郡國志又韓詩外傳曰趙簡子有臣曰周舍吏于門下抱筆執牘從之書過簡子與之居無幾死後與諸大夫飲於洪波之臺酒酣泣曰千羊之皮不如一狐之腋衆人之唯唯不如周舍之諤諤今舍死吾亡無日矣鑿臺一統志山西太原府有鑿臺在榆次縣南史記云智伯信韓魏從而伐趙攻晉陽韓魏殺之于鑿臺之下即此后為洞渦水所沒檀臺趙成侯時魏獻榮椽因以為檀臺見趙世家水經注作檀臺寒臺述異記恒州野望臺趙武靈王以登髙亦曰寒臺野臺史記武靈王十七年王出九門為野臺以望齊中山之境徐廣曰一作望臺按括地志野臺一名義臺在定州樂縣西南六十三里清臺韓詩外傳趙簡子大子名伯魯小子名毋恤簡子自為二書牘親自表之書曰節用聽聰敬賢勿慢能勿使賤與二子使誦之居三年簡子坐清臺之上問二書所在伯魯忘其表令誦不能得毋恤出其書于袖令誦習焉乃出伯魯而立毋恤清臺一作青臺東廟淮南子湣王專用淖齒而死于東廟邯鄲廥趙世家趙孝成王十二年邯鄲廥燒徐廣曰庫廐之名音膾索隠曰廥積蒭藁之處鹿苑一統志鹿苑在山西遼州和順縣西二里相傳為趙襄子養鹿苑趙圃修墨録昔戰國趙王作游圃多植松栢名曰趙圃又韓子云趙王游于圃中左右以莵與虎而輟觀之盼然環其眼司馬門國䇿武安君北面再拜賜死縮劍將自誅乃曰人臣不得自殺宫中過司馬門趨甚疾出誃門也右舉劍將自誅臂短不能及銜劍徴之于柱以自刺誃門詳司馬門廣門燭過典廣門之左詳見趙職官鹿門史記趙肅侯十六年肅侯遊大陵出于鹿門無窮之門國䇿武靈王曰昔者先君襄主與代交地城境封之名曰無窮之門所以詔後而期逺也遺遺之門國䇿武靈王率騎入胡出于遺遺之門魏宫室丹宫沈休文史記注梁襄王之丹宫趙成侯之檀臺麗華冠于一時余按國䇿魏惠王廣公宫制丹衣柱疑丹宫之名從此起也然國䇿乃惠王沈休文作襄王或别丹宫耳范臺國䇿梁王觴諸侯于范臺酒酣請魯君奉觴魯君興避席擇言曰主君之尊儀狄之酒也主君之味易牙之味也左白台而右閭須南威之美也前夾林而後蘭臺強臺之樂也有一於此足以亡國梁王稱善余按白台閭須魏之美女夾林蘭臺魏之宫苑也故曰南威之美強臺之樂盖云魏之美女可比南威魏之宫苑可比強臺文章虚實一讀可辨舊注以白台等皆作影語謬甚矣蘭臺詳范臺文臺無忌上魏王書邊盡拔文臺墮垂都焚索隠曰文臺臺名列士傳曰隠君陵施酒文臺京臺楚䇿更嬴與魏王處于京臺之下仰見飛鳥暉臺國䇿顔率曰梁之君臣欲得九鼎謀之暉臺之下沙海之上其日乆矣注臺名曰暉靈臺河南志靈臺在府城南二十里戰國魏侯罃所築俗名梁惠王臺洪範五行傳曰天子曰靈臺諸侯曰時臺春秋緯曰天子靈臺諸侯觀臺禮含文嘉曰天子靈臺以攷觀天人之際法隂陽之㑹也中天臺新臺序魏襄王將欲為中天臺許綰負鍤而入曰聞大王將為中天之臺願加一力臣聞天與地相去萬九千里其趾當方一萬里盡王之地不足為臺趾王黙然罷築者文侯臺魏臺在魏縣界相傳魏文侯築古謂之文侯臺也見志拜郊臺一統志直𨽻大名府南大門外有髙臺相傳魏惠王拜郊臺今稱村曰䑓頭堡武侯臺武侯臺在今直𨽻大名府南一十里舊有壇曰武侯壇相傳謂魏武侯壇也見志正殿說苑魏文侯御廪災文侯素服避正殿夾林詳范臺梁囿國䇿魏有梁囿温囿又信陵君書五入囿中索隠曰囿即圃田鄭藪屬魏温囿詳梁囿逢忌藪薛瓉漢臣引汲郡古文云梁惠王發逢忌之藪以賜民今浚儀有逢陂忌澤是也又見魏食貨攷青沼世說葆真池即梁惠王故沼桓譚云魏王為青沼按孟子見梁惠王王立于沼上疑此沼也麗譙莊子徐無鬼見魏武侯曰無盛鶴列于麗譙之間注鶴列陳兵也麗譙髙樓也亦作麗嶕謂華麗而嶕嶢戰樓名也按周禮司市思次鄭司農云次市中侯樓也周亦有侯樓陸機洛陽記云洛陽城周公所制城上百步有一樓櫓外有溝渠又黄帝有五城十二樓見漢郊祀志范蠡為勾踐作飛翼樓以象天門見吴越春秋郎門國䇿梧下先生見魏王曰願王專事秦無有他計魏王曰諾客趨出至于郎門而反注郎門者按韓非子使郎中開道于郎門之内也夷門史記魏有隠士曰侯嬴年七十家貧為大梁夷門監者太史公曰吾過大梁之墟求問其所謂夷門夷門者城之東門也韓宫室鴻臺宫張儀說韓王曰秦下甲據宜陽斷韓之上地東取成臯榮陽則鴻臺之宫桑林之苑非王之有也注韓之宫室其地未詳望氣臺韓王望氣臺見玉海聽訟觀臺孫子荆過臺賦叙曰酸棗寺門外夾道左右有兩故臺訪之故老云韓王聽訟觀臺髙一十五仭樓雖冺滅然廣基似於山嶽召公大賢猶舍甘棠區區小國而臺觀隆崇驕盈于世以鑒來今故作賦曰望韓王之故臺尋往代之所營雙闕碣以峻峙貫雲氣而上征歴千載而特立顯妙觀乎太清薄邯鄲之叢臺陋楚國之章華邈岧嶤以亢極豈岑樓之能加至乃宫觀𢎞敞増臺隠天伐文梓于萬仭發玉石于三泉優倡角烏鳥之聲蛾眉戯白雪之舞紛淫衍以低仰翳脩袖而容與桑林苑詳鴻臺宫髙門韓世家韓昭侯二十五年旱作髙門屈冝臼曰昭侯不出此門何也不時吾所謂時者非時日也人固有利不利時昭侯嘗利矣不作髙門往年秦拔冝陽今年旱昭侯不以此時䘏民之急而顧益奢此謂時絀舉嬴二十六年髙門成昭侯卒果不出此門劉向别録云韓宫室之美有桑林髙門金玉布列五色錯舉燕宫室碣石宫史記騶衍如燕昭王築碣石宫身親往師之正義云碣石宫在幽州薊縣西三十里寧䑓之東甘棠宫昔召公巡行鄉邑有棠樹决獄改事其下召公卒而民人思召公之政懷棠樹不敢伐作甘棠之詩後昭王慕召公之政起甘棠宫祠召公焉見詩緯注元英宫樂毅報燕王書大吕陳于元英索隠曰大吕齊鐘名元英燕宫殿名也洞宫仙傳燕昭王得洞光之珠以飾宫故曰洞宫劉滄有宿洞宫詩沐髮清齋宿洞宫又唐人稱道院曰洞宫明光宫十二國續史燕惠王起明光宫金緯玉經白刄為表周宫為衣迷不知其所從入東宫燕丹子燕太子丹自喜得荆軻永無秦憂日與軻游東宫臨池而觀拾瓦投鼃太子令人捧槃金丸進之按左傳注云太子不敢居上位故常居東宫正寢拾遺記云燕昭王居正寢召其臣甘需曰寡人志于仙道欲學長生乆視之道可得遂乎磨室史記樂毅書故鼎反乎磨室索隠曰燕鼎前輸于齊今反入于磨室磨室宫名徐廣曰磨歴也國䇿新序作歴室祗明室靈氣寳符云燕昭王坐祗明之室升于泉昭之館此館常有白鳳白鸞遶集其間展臺一統志展臺在涿州西南舊傳燕昭王嘗展禮于此作展臺寧臺樂毅報燕王書齊器設于寧臺注寧臺燕之臺也靈臺範志燕昭王起靈臺窮極珍巧子時起工午畢謂之子午臺黄金臺上谷郡圗經黄金臺易水東南十八里昭王置千金于臺上以延天下之士述異記云黄金臺或呼為賢士臺亦謂之招賢臺圗書編又稱金臺小金臺一統志黄金臺在今順天府東南一十六里又一臺曰小金臺在府東南一十五里燕中雜紀云小金臺昭王養學者之處也金臺晉書云段疋磾討石勒進屯故安縣故燕太子丹金臺據此燕丹又有金臺也仙臺水經注燕王仙臺東有三峰甚為崇峻騰冠衆峯髙霞翼嶺岫壑冲深含煙罩霧耆舊言燕昭王求仙處按史記云齊威宣燕昭使人入海求蓬萊方丈瀛洲此三神山者其傳在渤海中去人不逺患且至則船風引而去盖嘗有至者諸仙人及不死之藥皆在焉燕昭王盖迷于仙者也崇霞臺拾遺記昭王登崇霞之臺握日臺亦見拾遺記釣臺水經注固安縣金臺陂西北有釣臺髙丈餘陂北十餘步有金臺有小金臺臺北有蘭馬臺並悉髙數丈秀峙相對翼臺左右水流徑通長廡廣宇周旋被浦棟堵咸淪柱礎尚存耆舊咸言昭王禮賓廣延方士至如郭隗樂毅之徒鄒衍劇辛之儔自逺而至者多矣不欲令諸侯之客伺隙燕邦故脩建下都館之南垂燕昭創之于前子丹踵之于後蘭馬臺詳釣臺禪臺薛氏孟子章句曰燕噲築禪臺讓于子之後昭王復登禪臺讓于樂毅毅以死自誓不敢受禪禪臺一名堯舜臺逃齊臺燕有逃齊臺在小金臺東北十六里相傳為子之之亂齊伐燕羣臣登臺避兵後名臺曰逃齊臺見史記舊注余按帝王世紀云周赧王雖居天子之位為諸侯所侵逼與家人無異貰于民無以歸之乃上臺以避之故周人因名臺曰逃債周之逃債燕之逃齊可云二逃雙妙五花臺一統志五花臺在易州治相傳周武王築為日者占候之所曰候臺至戰國燕昭王建五樓其上嘗游樂其間更名五花臺三臺三臺城在容城縣見志城冡記云燕魏分易水為界築三臺登降以耀武即此陽華臺燕丹子云荆軻之燕太子為置酒陽華之臺一作章華之臺通雲臺拾遺記昭王坐通雲之臺亦曰通霞臺山西有昭石去石十里視人物之影如鏡焉碎石片片皆能照人而質方一丈則重一兩昭王舂此石為泥泥通霞之臺泉昭館詳祗明室華陽館史記索隠燕太子丹與樊將軍置酒華陽之館出美人竒馬一作華陽臺疑即陽華臺也史無明文姑並存之又按水經注易水二館之城澗曲泉清山髙林茂風煙披薄觸目怡情方外之士尚憑依舊居取暢林木二館謂樊於期荆軻之館也又云易水又東歴燕之長城又東逕漸離城南盖太子丹館髙漸離處也七國攷卷四
