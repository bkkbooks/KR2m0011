body:
  text: 七國攷卷八明董説撰秦噐服傅車秦昭王使以傅車召范雎見史記翠鳯旗李斯諫逐客書云陛下建翠鳯之旗樹靈鼉之鼓龍文鼎史記秦武王有力好戯力士任鄙烏獲孟説皆至大官王與孟説舉龍文之鼎絶臏而死智嚢鼎秦丞相樗里子作一鼎文曰智囊古文大篆書見鼎録定蜀鼎張儀伐蜀鑄一鼎髙三尺文曰定蜀大篆書見鼎録秦公敦廣川書䟦云商人堌中得敦銘曰秦公作敦其制簋也御璽通鑑秦王下吏治毐毐懼矯王御璽發兵攻蘄年宫相印史記秦王收穰侯之印注相印也又應侯歸相印劉向别録云秦惠文王置相印虎鈕白趾按白趾不可攷有司印事物紀原云事物始曰州縣之印始於春秋按商鞅書定分篇曰法令之長即以封右劵以法令之長有印以封印則有司之賜印自秦孝公變法始耳玉符通鑑吕不韋為異人説華陽夫人夫人承間言於太子太子許與夫人刻玉符約以為嗣屏風燕丹子云荆軻把秦王王乞聽琴聲而死召姬人鼓琴琴曰羅縠單衣可掣而絶八尺屏風可超而越按此秦殿上屏風盖斧扆之遺制也帯劍史記秦簡公六年令吏初帯劍正義曰春秋官吏各得𢃄劍劍有二一佩劍所謂衣冠帯劍是也一兵劍持以相格殺者也秦别紀作簡公七年百姓初帯劍黼黻之服史記秦獻公敗三晋之師於石門斬首六萬王賜以黼黻之服孔頴逹曰白與黑謂之黼黑與青謂之黻羅縠衣詳見屏風據燕丹子秦王衣羅縠單衣坐殿上矣余不能無疑降服左傳楚人滅江秦伯為之降服出次不舉過數大夫諫公曰同盟滅雖不能救敢不矜乎吾自懼也君子曰詩云維彼二國其政不獲維此四國爰究爰度其秦穆之謂矣注云降服素服也武幘物原云秦孝公作武幘後漢書輿服志云古者有冠無幘其戴也加首有頍所以安物故詩曰有頍者弁此之謂也三代之世法制滋彰下至戰國文武并用秦雄諸侯乃加其武将首飾為絳帕以表貴賤其後稍稍作顔題炙轂子云上古被髪服皮三代即有衣冠皆列品命無敢惑黔首之服以三尺皂絹裹髪名折上巾説畧云儀禮士冠庻人巾則古者以上有冠無巾幘唯庻人戴之秦謂民為黔首青藤山人路史云抹額是大禹所制旄頭述異傳云旄頭飾騎秦文公作使之先驅按晋武帝問侍臣旄頭何義彭推對曰秦有竒怪觸木截水無不崩潰惟是畏旄頭故虎士服之此秦制也象牙􅁫中華古今注􅁫古笄之遺制也至秦穆公以象牙為之連環春秋后語秦始皇聞齊王后賢嘗使遺之連環曰齊人多知能觧此乎后以羣臣莫能觧乃引椎破之謝秦使曰謹以觧矣以報始皇壮其志益不敢謀齊田齊噐服文車國策齊王遣太傅齎黄金千斤文車二駟服劍一封書謝孟嘗君相印史記騶忌子見三月而受相印衛宏曰秦以前民皆以金玉為印龍虎鈕唯其所好秦以來天子獨以印稱璽又獨以玉羣臣莫敢用也七雄之時璽始稱曰印余按楚尚有相璽鹵噐史記湣王三十九年燕将樂毅遂入臨菑盡取齊之寳藏噐及淖齒殺湣王與燕共分齊之侵地鹵噐注鹵噐宗廟噐也又樂毅報燕王書齊噐設於靈䑓寳盤博古圖云楚姬匜盤髙四尺五寸深一寸八分口徑一尺四寸三分耳髙二寸二分闊二寸八分容一斗重十七斤有半三足銘十有七字曰齊侯作楚姬寳盤其萬年子子孫孫永保用先是得楚姬匜齊侯作楚姬寳匜楚與齊從親在齊湣王之時所謂齊侯則湣王也周室之未諸侯自王乆矣銘其噐以侯稱之尚知止乎禮義彛噐法度所自出故其銘如此洪齋洪氏隨筆曰夫齊楚之為國各數百十年豈必當湣王時從親乎且湣王在齊諸王中最為驕暴嘗為東帝豈肯自稱侯之理服劍詳見文車服劍者王所自佩劍也側注冠通典云齊君冠曰側注冠形如通天冠頂不斜却直竪鐵為卷梁髙九寸無山展筩一名髙山冠其曰側注冠者冠體側立而曲注故名秦滅齊以賜近臣中外謁者僕射行人使者等所服黄金𢃄國策魯仲連謂田單曰将軍黄金横帯而馳乎淄澠之間楚噐服楚車桓譚論云荘王為車鋭上斗下號曰楚車又陸子云楚平王奢侈縱恣不能制下檢民以德増駕百里而行欲令天下人餒財冨利明不可及於是楚國逾奢君臣無别安車孔叢子云楚昭王以安車象飾遺孔子又見楚語又楚有樓車巢車見楚兵制王輿左傳云昭王之在隨也子西為王輿服以保路國於脾洩又楚荘王以王輿迎叔敖以為令尹篳路左傳析父曰昔我先王熊繹辟在荆山篳路藍縷以處草莽杜注云篳路柴車也青翰舟説苑云楚鄧君乗青翰之舟張翠羽之鷁舲船屈原九章椉舲船余上沅兮齊呉榜以擊汰注舲船船有􅆤牖者或曰小船也盖楚效呉人所為之櫂王旌左傳楚子之為令尹也為王旌以田芋尹無宇斷之曰一國兩君其誰堪之杜預曰析羽為旌王旌游至於軫楚僭號故有王旌也九龍鼎春秋后語云呉入楚焼髙府之粟破九龍之鼎按楚又有九龍之鐘見音樂攷銅盤平原君傳毛遂從平原君求救合從於楚毛遂謂楚王左右曰取雞狗馬之血來毛遂奉銅盤而跪進之楚王曰王當㰱血而定從次者吾君次者遂遂定從於殿上索隠曰銅盤若周禮所用珠盤也楚王盞彛周噐欵識録有楚王盞彛又有楚公彛按楚初稱子后僭稱王無楚公之稱相璽國策楚置相璽玉海云古有璽説者以秦制乗輿六璽以為秦始者非老子云為之符璽荘子云焚符破璽春秋運斗樞云黄帝得龍圖中有璽章文曰天黄符璽是古有璽也漢舊儀云秦以前民皆佩綬金玉銀銅犀象為方寸璽各服所好沈羽云六國制傳信書今世所傳六國璽可攷将軍節吕氏春秋墨者田鳩欲見秦惠王留三年而不得見客有言之於楚王乃􅉨見楚王王悦之與将軍之節以如秦至而得見説略云龍節虎節玉節之類乃后世虎符之屬但可合符者皆謂之節不必盡若旌幢也印綬呉越春秋平王謂伍奢之譽二子即遣使者駕駟馬封函印綬徃許召子尚子胥令曰賀二子父奢以忠信慈仁去難就免平王内慚囚繫忠臣外愧諸侯之耻反進奢為國相封二子為侯尚賜鴻都侯胥賜盖侯相去不逺三百餘里奢乆囚繫憂思二子故遣臣來奉進印綬漢官儀云綬者有所承受也所以别尊卑彰有德也玉屏風蕭子顯齊書曰襄陽有盜發古塜者傳云是楚王塜獲玉履玉屏風玉屏風甚竒矣按西京雜記云漢朝以玉為虎子以為便噐使侍中執之行幸以從玉虎子尤可怪玉鏡齊春秋云襄陽人發古塜有玉鏡及竹簡古書字不可識王僧䖍善識字體亦不能觧襄陽古塜即蕭子顯齊書所稱襄陽楚王塜也象牀國策孟嘗君至楚獻象牀按世本云紂為玉牀鐵如意古琴疏楚王樂繞梁之琴七日不聼朝樊妃進諫於是以鐵如意搥琴而破之金諸侯賈子云楚懐王心矜好髙人無道而欲有伯王之號鑄金以象諸侯人君令大國之君編而先馬梁王御宋王􅆖乗周召畢陳滕薛衛中山之君皆象使隨而趨諸侯聞之以為不宜故興師而伐之玉劍詳見翠衣長鋏詳見切雲冠王逸楚辭注云長鋏劍名也其所握長劍楚人名曰長鋏也漢書注云楚長劍有長丈者翠衣説苑襄城君始封之日衣翠衣帶玉劍履縞舄立乎流水之上翠被左傳楚子田於乾谿雨雪王皮冠秦復陶翠被豹舄執鞭以出困學紀聞云楚之興也篳路藍縷其衰也翠被豹舄國家之興衰視其儉侈而已綘衣墨子楚荘王鮮冠組纓綘衣博袍以治其國博袍詳見綘衣楚服史記吕不韋為秦異人説於秦及異人至秦不韋使楚服而見王后説其状曰吾楚人也而自子之乃變其名曰楚復陶詳見豹舄注秦所遺羽衣也長冠杜氏通典云長冠漢髙帝採楚制長冠形如板以竹為裏亦名齋冠後以竹皮為之髙七寸廣三寸後人謂之鵲尾冠也逺遊冠通典逺遊冠秦採楚制楚荘王通梁組纓似通天冠而無山述有展筩横之於前獬豸冠通典獬豸冠秦滅楚獲其冠賜御史以纚為展筩鐵為柱卷取其不曲撓也執法者服之謂之獬豸冠者獬豸神羊一角能别曲直楚王獲之以為冠異物志曰東北荒中有獸名獬豸一角性忠直見人鬭則觸不直者聞人論則咋不正者淮南子云楚文王好服獬冠楚國效之觟楚冠讐冠淮南子云楚荘王好觟楚冠國效之也許慎注今力士冠觟胡瓦切又淮南云楚荘王服讐冠又左傳云南冠而縶者誰也注楚冠也皮冠詳見翠被切雲冠楚辭帶長鋏之陸離兮冠切雲之崔嵬注切雲當時髙冠之名薛孝緒曰楚切雲之冠者士冠也瓊弁玉纓左傳楚子玉自為瓊弁玉纓未之服也先戰夢河神謂已曰畀余余賜汝孟諸之麋弗致也杜預曰弁以鹿子皮為之瓊玉之别名次之以飾弁及纓詩云㑹弁如星玉屐襄陽耆舊傳云盗發楚王冡得宫人玉屐一作玉履又賈誼書云昔楚昭王與呉戰楚軍敗昭王走而履決失之行三十歩復旋取左右問王何惜此一踦履乎王曰楚國雖貧豈愛一踦􅂂哉􅁖與偕出弗與俱反也自是之後楚國之俗無相棄者珠履春申君客三千人其上客皆躡珠履見史記豹舄詳見翠被縞舄詳見翠衣緑佩慎倫先物畧云古有楚之緑佩文理光美絲綸直平此古佩之上質按後漢書輿服志云古者君臣佩玉尊卑有度上有韍徐廣曰韍如巾蔽膝貴賤有殊佩所以章德服之衷也韍所以執事禮之共也故禮有其度威儀之制三代同之五伯迭興戰兵不息佩非戰噐韍非兵旗於是觧去紱佩留其係璲以為章表故詩曰鞙鞙佩璲此之謂也又桓寛鹽鐵論云七國之時皆據萬乗南面稱王提珩注提舉也珩佩上玉也所以節行止也趙噐服輦史記趙孝成王元年太后曰老婦恃輦而行相國印趙惠文王以相印授樂毅詳見職官攷又史記虞卿度趙王終不可説乃觧其相印與魏齊亡令璽韓子梁車為鄴令其姊徃見之暮而后至閉門因踰郭而入梁車刖其足趙成侯以為不慈奪璽而逐之珠玉刀劍室史記趙平原君使人於春申君春申君舎之上舍趙使欲夸春申君為瑇瑁簮刀劍室以珠玉飾之銅枓史記趙襄子請代王使厨人操銅枓以食代王及從者行斟隂令宰人各以枓擊殺代王吕氏春秋作金斗智伯頭春秋后語云智伯圍趙襄子於晋陽襄子大敗智伯軍殺智伯漆其頭以為飲噐古今録云趙漆智伯頭為飲噐其後趙人制飲噐大者名曰智伯頭裴氏云飲噐椑榼也晋灼云飲噐虎子也余按吕氏春秋云斷其頭以為觴則虎子説非也貂服竹書紀年慎靚王十三年邯鄲命将軍大夫適子代史皆貂服余按趙武靈王貂服騎射詳見兵制即此事也貂北地所産當時無肯服者後世極貴重之實始於周末云羖羊裘説苑趙簡子敝車瘦馬衣羖羊之裘其宰曰車新則安馬肥則疾狐裘則温君宜改之術士冠后漢輿服志云術士冠前圓呉制差池邐迤四重趙武靈王好服之惠文冠通典云惠文冠者趙武靈王效胡服以金鐺飾首前挿貂尾為貴職秦滅趙以其君冠賜近臣應劭漢官云説者以金取堅剛百鍊不耗蟬居髙飲潔口在腋下貂内勁捍而外温潤此因物生義也古今注云貂蟬冠胡服也貂者取其有文而不煥外柔而易内剛而勁蟬者取其清虚而識時變在位者有文而不自耀有武而不示人清虚自牧識時而動邵氏云惠文冠者北土多寒其人貂皮温額後代因之曰惠文惠者蟪也冠文細如蟬翼故名惠文其説非是按武靈王死惠文立惠文者如曰趙王冠也不言武靈易創而難守也鶡冠后漢輿服志武冠俗謂之大冠環纓無蕤以青絲為緄加䨇鶡尾竪左右為鶡冠云鶡者勇雉也其鬬對一死乃止故武靈王以表武士注云荘子云縵胡之纓武士之服是也徐廣曰鶡似黒雉出於上黨傅𤣥賦注曰羽騎騎者戴鶡爪牙帽子中華古今注云搭耳帽夲北服以韋為之以羔毛絡縫趙武靈王更以綾絹皂色為之始竝立其名爪牙帽子盖軍戎之服也皂靴典略云三代以前人皆跣足三代以後始服木屐伊尹以草為之名曰履秦世叅用絲革靴本趙武靈王武靈王好胡服令有司衣袍者宜皂靴實録云靴胡履也趙武靈王好服短靿鞾黄皮為之漸以長靿靴軍戎通服之皂靴之制自武靈王始也學齋佔􅖶云古有履無靴趙武靈王乃變履為靴徽宗世嘗變靴為履髙宗世又變履為鞋方屐孔叢子云孔穿履方屐見平原君貝帯淮南子云趙武靈王貝𢃄鵕冠而朝國策賜周紹胡服衣冠具帶注具帶即貝帶以貝飾帶也瑇瑁簮詳見珠玉刀劍室魏噐服夏車國策或為六國説秦王曰魏伐邯鄲因退為逄澤之遇乗夏車稱夏王夏車者夏篆也篆其車而五采畫也七星旗春秋后語云魏惠王擁土千里帶甲三十六萬十八年㧞邯鄲西圍定陽從十二諸侯朝天子以西謀秦秦王恐衛鞅謂魏王曰大王不如先行王服然後圖齊楚魏王説於衛鞅之言也故身廣公宫制丹衣柱建九斿從七星之旗此天子位也而魏王處之於是諸侯伐魏覆其十萬之軍亦見國策七星之旗者帝旟也春秋緯云天子法斗諸侯應宿後漢輿服志曰戰國削滅禮籍修竒麗之服飾其輿馬文罽玉纓象鑣金鞍以相夸九斿詳見七星旗九斿者九旒之旗也端冕陳氏禮書武王端冕以奉丹書則天子齋而端冕信矣諸侯昏禮𤣥冕齋戒魏文侯端冕聽古樂則昏以𤣥冕攝盛也魏文侯之端冕非攝盛則僣也彤弓玉矢劉氏國語云周威烈王二十三年初使魏趙韓為諸侯命魏曰王曰斯汝為諸侯世世夾輔余周室汝毋不恪共汝職余有先王之命余亦有車馬彤弓玉矢用錫汝功業毋使余謂諸侯其大庇其子子孫孫無效於我周室毋好㐫兵􅁖吉德俾好與惡失度毋使百姓謂我不性不情毋使慈惠不下暨仁德不上先朱純一白珍一弓三即彤弓也束矢五十即玉矢也以命文侯朱純白珍詳見彤弓玉矢其後文侯生擊立為太子授以白珍謂之授命見孟子注盖以白珍傳國矣石牀石屏風玉唾壺銅帳鈎銅劍鐵鏡石枕並詳魏䘮制皆魏殉𦵏之物也犀篋曹植逸文云樂羊反於魏謗書盈於犀篋按春秋后語魏文侯命樂羊将攻中山三年而㧞之樂羊反而論功文侯示謗書一篋丞相璽史記薄代曰太子自相三人者皆以太子為非常相也皆務以國事魏欲得丞相璽上将軍印信陵君傳魏王見公子相與泣而以上将軍印授公子令璽韓非子外儲云西門豹為鄴令左右惡之居期年上計君收其璽按六書精藴云壐印章也從爾從土古之制字者取命爾守土為意其臣也曰君命我矣何為代君飬民也其在君也曰天命我矣何為代天飬民也秦制惟天子用璽后之人因改從玉虎符詳兵制韓噐服玉璽通鑑秦始皇十四年韓王納地效璽請為藩臣使韓非來聘相印蘇秦傳蘇秦佩六國相印是韓亦有相印也蔡邕釋誨云連衡者六印磊落燕噐服輅車通鑑燕昭王賜樂毅輅車乗馬后屬百兩藝苑巵言云凡三代兩漢皆用馬車魏晋至梁陳用牛車元魏君臣有乗馬及牛車者唐雖人主妃后非乗馬即歩輦自郊祀之外不乗車也燕鼎樂毅報燕王書故鼎反乎磨室索隠曰燕鼎前輸於齊今反入於磨室召父彛博古圖周召父彛銘云召父作乃闕寳彛召公尊博古圖周召公尊葢髙六寸七分深四寸一分口徑長四寸五分濶三寸八分腹徑長五寸四分濶四寸二分容七升七合共重二斤有半盖噐銘云王大召公族於庚辰旅王錫中馬自貫侯四南宫闕王曰用先中蓻闕王休用作父寳尊鼎此周王褒大召公之族於其廟之噐也又旅陳其王所錫之馬駪駪衆多竹簡書青絲編簡數分長二尺皮莭如新盗以把火照書後人又得十餘簡以示撫軍王僧䖍云是科斗書攷工記周官所闕一統志云楚昭王塜在習池北南齊建元中盗發得古書竹簡青絲編簡後沈約亦得數簡以示劉繪繪云周禮逸篇又按玉海云六安縣都陂中有大冡民傳言曰公琴即臯陶冡楚人謂冡為琴也又有葛陂城東北有楚武王冡民謂之楚瑟城楚人又謂冡為瑟矣名號大竒附記於此銅鼎銘墓皇覽云漢永平中葛陂城北祝里社下於土中得銅鼎而銘曰楚元武王墓葢楚以鼎銘墓也按吕氏春秋曰含珠鱗施今塟皆用之注含珠口實鱗施施玉匣於死者之體如魚鱗西京雜記曰廣川王發晉靈公冡得玉蟾蜍一枚大如拳腹空容五合水光潤如新宋謝惠連祭古冡文曰東府掘壍一丈得古冡上無封域明噐之屬材瓦銅漆有數十種異形不可盡識刻木為人長三尺許初開見悉為人形以物棖撥之應手灰㓕水中有甘蔗莭及李核𤓰瓣皆浮出不甚爛壊世代不可知也酉陽雜爼載齊景公墓在身也錫馬蕃庻駪於南宫南宫亦廟也此所謂褒大之也乙者父之名王褒大於廟為其父作此寳噐乃周家召公子孫之酒彛也瑶罋玉櫝斚耳左傳昭公六年齊侯伐燕将納簡公七年正月癸巳齊侯次於虢燕人行成曰敝邑知罪敢不聽命先君之敝噐請以謝罪公孫晢曰受服而退俟釁而動可也二月戊午盟於濡上燕人歸燕姬賂以瑶罋玉櫝斚耳不克而還注云櫝匱也斚爵類傍有耳皆玉為之玉盤燕丹子云太子出美人能琴者軻曰好手琴者即進之軻曰但愛其手太子即斷其手盛以玉盤奉之印綬史記王噲收印綬自三百石以上而效之子之按后漢書輿服志曰三王俗化雕文詐偽漸生始有印綬以檢姦萌周禮掌節有璽節鄭氏注云今之印章也綬組綬古者佩玉以綬貫之漢承秦制乗與璽綬諸王以下印以金銀銅為差綬以赤紫青黑黄為差印信也刻文合信也綬受也轉相授受也三百石吏銅印墨綬或黄綬王制諸侯大國之卿食禄以田計之為三十二夫之入萬石至於斗食佐吏凡十六等三百石吏第十等奉月四十斛丹綃幄拾遺記云燕昭王三年廣延國獻善舞者二人王處以丹綃華幄麟文席拾遺記云燕昭王設麟文之席麟文者錯雜寳飾席為雲霞麟鳯之状后服通鑑燕王賜樂毅妻以后服賜其子以公子之服公子服詳后服羽衣拾遺記云燕昭王徹色减味居乎正寝賜甘需羽衣一襲表其墟為明真里也七國攷卷八
