body:
  text: 七國攷卷十明董説撰秦䘮制殉塟按史記秦武公卒初以人從死從死者六十六人繆公三十九年卒塟雍從死者百七十七人秦之良臣子車氏三人名曰奄息仲行鍼虎亦在從死之中秦人哀之為作黄鳥之詩詩曰交交黄鳥止於棘誰從穆公子車奄息維此奄息百夫之特臨其穴惴惴其慄彼蒼者天殱我良人如可贖兮人百其身交交黄鳥止於桑誰從穆公子車仲行維此仲行百夫之防臨其穴惴惴其慄彼蒼者天殱我良人如可贖兮人百其身交交黄鳥止於楚誰從穆公子車鍼虎維此鍼虎百夫之禦臨其穴惴惴其慄彼蒼者天殱我良人如可贖兮人百其身應劭曰秦穆公與羣臣飲酒酣公曰生共此樂死共我哀於是奄息仲行鍼虎許諾及公薨皆從死黄鳥詩所為作也至獻公元年止從死是武公已下十八君皆從死也又按國策昭襄王時秦宣太后愛魏醜夫太后病将死出令曰為我塟必以魏醜為殉據此昭㐮之世尚有殉塟不知獻公止從死之後又起於何代也皇覽塜墓記云秦始皇塜在􅌐山之右塜中以水銀為百川金銀為鳬鴈機相輸上具天文下具地理以人魚膏為燭度乆不滅其塟時后宫無子者皆殉從死者甚衆以書塟皇覽云吕不韋好經書多以塟漢明帝朝公卿大夫諸儒八十餘人論五經誤失符節令宋元上言臣聞秦昭王與不韋好書皆以書塟王至尊不韋乆貴塜皆以黄腸題凑處地髙燥不壊臣願發昭王不韋塜視未焚詩書合塟史記正義云昭襄王卒以孝文王母吕太后與昭襄王合塟太子歸塟史記秦昭王二年太子質於魏者死歸塟芷陽壽陵史記昭襄王卒塟壽陵黄腸題凑詳見以書塟蘇林曰以柏木黄心致累棺外故曰黄腸木頭皆内向故曰題凑墓植柏博物志秦穆公時有人掘地得物若羊将獻之道逄二童子謂曰此名為蝹常在地中食死人腦若欲殺之以栢東南枝挿其首由是墓皆植栢墓植栢自秦始也遣弔左傳晋獻公之䘮秦繆公使人弔公子重耳諸侯來弔祠史記昭襄王卒韓王衰絰入弔祠諸侯皆使其将相來弔祠視䘮事田齊䘮制殉塟劉向云昔齊威王卒從死七十二人按括地志云齊桓公墓在臨淄南二十一里牛山上晋永嘉末人發之初得版次得水銀池有氣不得入經數日乃牽犬入得金蚕數十簿珠􅃭玉匣繒綵軍噐不可勝數又以人殉塟人骨狼藉據此自先齊已殉塟矣史記齊宣王卒湣王即位蘇秦説湣王厚塟以明孝髙宫室大苑囿以明得意欲破敝齊而為燕七畧云齊湣王厚死人按檀弓云陳子車死於衛其妻與其家大夫謀以殉塟又陳乾昔疾屬其兄弟而命其子遵已曰如我死則必大為我棺使吾二婢子夾我左傳宋文公卒始厚塟用蜃炭益車馬始用殉重噐偹椁有四阿棺有翰檜注始用殉用人從塟也又晋景公卒小臣有晨夢負公以登天及日中負晋侯出諸厠遂以為殉又邾子卒先葬以車五乗殉五人注欲藏中之潔故先内車及殉别為便房盖其遺命顧愷之啟蒙注云魏時人有開周王塜者得殉塟女子經數日而有氣數月而能語年可二十送詣京師郭太后愛飬之十餘年太后崩哀思哭泣一年餘而死古之殉塟者多矣銅椁從征記曰齊襄王墓在汝水西墓西有僖公墓續從征記曰太公塜在堯山北五里平地為坂髙十丈曽發之者得一銅椁金玉甚多尚父五世塟周此實田和塜也和遷齊居於海上而别為諸侯亦稱太公也山東志曰四王墓在臨淄縣南十五里鼎足山齊記補遺曰山基圓頂東西直列乃齊威宣湣襄四王墓按蘇州志虎丘山下有呉王闔閭塜銅椁三周水銀為池金銀為地古之厚塟盖有銅棺椁也出弔孟子為卿於齊出弔於滕白虎通曰遣大夫弔辭曰皇天降災子獨遭離之嗚呼哀哉皇覽逸禮曰君使大夫弔於國君禮錫衰衰裳弁絰有絰下馬大夫為介亦如之士介者将命者緦麻裳弁絰異姓葛同姓麻楚䘮制殉塟史記楚靈王徬徨山中野人莫敢入王行遇其故鋗人謂曰為我求食鋗人曰新王下法有敢饟王從王者罪及三族王因枕其股而卧鋗人又以土自代逃去王覺而弗見遂饑弗能起􅇗尹申無宇之子申亥曰吾父再犯王命王弗誅恩孰大焉乃求王遇王饑於釐澤奉之以歸夏五月癸丑王死申亥家申亥以二女送死并塟之是楚有殉塟之俗也又國策云楚宣王時江乙説於安陵君曰君無咫尺之功骨肉之親處尊位受厚禄一國之衆見君莫不歛袵而拜撫委而服何以也曰王過舉以色不然何以至此江乙曰以財交者財盡而交絶以色交者華落而愛弛是以嬖色不敝席寵臣不敝軒今君擅楚國之勢而無以自結於王竊為君危之安陵君曰然則奈何江乙曰願君必請從死以身為殉此又一証以書塟蕭子顯齊書襄陽有盗發古塜相傳是楚武王塜獲丘縣東北近世有人開之下入三丈石函中得一鵝鵝廻轉翅以撥石復下入一丈便有青氣上騰望之如陶烟飛鳥過人輙墮死遂不敢入墨荘漫録載政和間朝廷求詢三代鼎彛噐程唐為陜西提㸃茶馬李朝孺為陜西轉運遣人於鳯翔府破商比干墓得銅盤徑二尺餘中有欵識一十六字又得玉片四十三枚其長三寸許上圓而鋭下濶而方厚半指玉色明瑩此皆以物殉塟之絶異者也歸䘮楚世家頃襄王三年懐王卒於秦秦歸其䘮於楚人皆憐之如悲親戚赴史記郟敖既死公子圍使使赴於鄭伍舉問曰誰為後對曰寡大夫圍伍舉更曰共王之子圍為長杜預曰伍舉更赴辭重從禮告終稱嗣不以簒弑赴諸侯趙䘮制㑹塟史記肅侯二十四年卒秦楚燕齊魏出鋭師各萬人來㑹塟壽陵史記肅侯十五年起壽陵國語管仲曰定民之居成民之事陵為之終是民之墓亦稱陵也周顯王三十四年趙起壽陵秦惠文以後始稱陵而民不得稱水冡隋圖經云歴陵縣西十里趙簡子冡石虎令人發之初得炭深一丈得連木木厚髙八尺次得流泉水水色青冷非常以牛皮為嚢作絞車以汲之一月而水無極乃止築城繞之氣成樓闕赴主父死乃發䘮赴諸侯見趙世家魏䘮制以書塟束晢傳晋太康二年汲郡人盗發魏襄王墓或云安釐王冡得竹書數車其中與經傳大異者云夏年多殷益干位殺之太甲殺伊尹文王殺季歴自周受命至穆王壽百歳也幽王既亡共伯和者攝行天子事非二相共和也初發冡者焼策照取寳物及官收之多燼簡斷策據此魏以書塟也餘冬序録云汲縣發古塜人姓不不字呼作彪其名凖一統志又云漢初有人發魏襄王冡得竹簡書十餘萬言胡應麟曰武帝紀咸寜五年汲郡人發魏襄王冡非太康二年襄王即孟子所謂不似人君者而冡中獨竹簡數十車古噐一二他服玩珍怪無聞焉即世傳三書無論如大易繫辭或燼於秦火而出於冡中則襄王竹簡豈不與孔壁同功哉當戰國紛争雅尚如襄王誠未易者裸塟西京雜記魏王子且渠冡甚淺狹無棺柩但有石牀廣六尺長一丈石屏風牀下悉是雲母床上兩屍一男一女皆年二十許東首裸卧無衣衾據此魏有祼塟之俗也按張華博物志楚之南有炎人之國其親戚死朽之肉而棄之然後埋其骨乃為孝也此與裸塟竝為異特更塟日國策魏惠王死塟有日矣天大雨雪至於牛目壊城郭且為棧道而塟羣臣多諫太子者曰雪甚如此而䘮行民必甚病官費又恐不給請弛期更日太子曰為人子而以民勞與官費之故而不行先王之䘮不義也羣臣皆不敢言惠公駕而見太子曰塟有日矣太子曰然惠公曰昔王季歴塟於楚山之尾灓水齧其墓見棺之前和文王曰嘻先王必欲一見羣臣百姓也夫故使灓水見之於是出而為之張朝百姓皆見之三日而後更塟此文王之義也今塟有日矣而雪甚及牛目難以行太子為及日之故得無嫌於欲亟塟乎願太子更日先王必欲少留而扶社稷安黔首也故使雪甚因弛期而更為日此文王之義也若此而弗為意者羞法文王乎太子曰甚善謹弛期更擇日按王制云塟不為雨止鄭注云雖雨猶塟以其禮儀少也鐵劵石人西京雜記晋人有發魏哀王冡者哀王冡以鐵灌其上穿鑿三日乃開其黄氣如霧觸人鼻目皆辛苦不可入以兵守之七日乃歇初至一户無扄鑰石牀方四尺床上有石几左右有三十石人立侍皆武冠帶劍復入一户石扉有闗鑰叩開見棺柩黑光照人刀斫不入焼鋸截之乃漆雜兕革為棺厚數寸累積十餘重力不能開乃止復入一户亦石扉闗鑰得石牀方七尺石屏風銅帳􅟈一具或在牀上或在地下似是帳縻朽而銅􅟈墮落牀上石枕一枚塵埃朏朏甚髙似是衣服床左右石婦人各二人悉皆立侍或有執巾櫛鏡鑷之象或有執盤捧物之形無餘異物但有鐵鏡數百枚焉文石槨魏襄王冡皆以文石為槨髙八尺許廣狹容四十人中有石牀石屏風牀上有玉唾壺一枚銅劍二枚金玉雜具見西京雜記按檀弓曰有虞氏瓦棺又秦之先有石棺古史攷曰堯作瓦棺湯作木棺郭縁先証記曰桓魋石槨在九里山之東北也槨有二重門間隠起青石方净如鏡門扇數四博物志曰衛靈公塟得石槨銘曰不逄箕子靈公奪我里荆州記曰臨湘水中有石床床上有二石棺色緑如銅鏡莫能詳也呉越春秋曰呉王閶闔有女自殺闔閭痛之葬於國西閶門外文石為槨七國攷卷十
