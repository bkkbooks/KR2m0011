body:
  text: 七國攷目錄政書類一通制之屬卷一職官卷二食貨卷三都邑卷四宫室卷五國名卷六羣禮卷七音樂卷八器服卷九雜祀卷十䘮制卷十一兵制卷十二刑法卷十三災異卷十四𤨏徴臣等謹案七國攷十四卷明董説撰説字雨若烏程人所著有易發吳興備志諸書已别著錄是編載秦齊楚趙韓魏燕七國制度分職官食貨都邑宫室國名羣禮音樂器服雜記喪制兵制刑法災異𤨏徴等十四門皆採掇諸書以相佐證畧如兩漢㑹要之體大致以戰國䇿史記為本而以諸子雜史補其遺缺其所援引如劉向列仙傳張華感應類從志子華子符子王嘉拾遺記之類或文士之寓言或小説之雜記皆據為典要而月令所載太尉大酋之屬註者明曰秦官乃反遺漏未免去取不倫又既以七國為名自應始自分晉以後而秦之寺人上引車轔楚之兩廣逺徵左傳則於斷限有乖新序載魏王欲為中天之臺許綰諫止未必實有其事即有之亦議而未行而魏宫室門中乃出一中天臺莊子所載麗譙乃城闕之通名非魏所獨有乃於魏宫室中標一目曰麗譙琴操載韓殺聶政之父乃古來之常刑非韓所剏乃於韓刑法中標一目曰殺亦嫌於隨意撦撏苟盈卷帙至於秦水心劍事本見續齊諧記乃云白帖秦舎晉侯於靈臺本見左傳乃云列女傳亦往往不得其出典觀其前後無序䟦而齊職官門注封君后妃附乃祗有封君而無后妃殆説未成之稿偶為後人傳錄歟然春秋以前之制度有經傳可稽秦漢以下之故事有史志可考惟七雄雲擾䇿士縱横中間一二百年典章制作實蕩然不可復徵説能叅考諸書排比鉤貫尚一一各得其崖畧俾考古者有徵焉雖間傷蕪漫固不妨過而存之矣乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:16c1f5996a740c49c8e67e31395119126b44440f8cb12f40a83e67f45cd58d93
