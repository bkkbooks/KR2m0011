body:
  text: 七國考卷三明董説撰秦都邑關塞附犬丘秦紀非子居犬丘周孝王分土為附庸邑之秦注今天水隴西縣秦亭也地理志今隴西秦亭秦谷是也括地志秦州清水縣本名秦嬴姓邑漢屬天水郡水經注清水徑清水城南又西與秦水合水出東北大隴山秦谷厯三泉合成一水而厯秦川川有故亭秦仲所封也秦之為號始是秦水又西南厯隴川徑六槃口過清水城西南注清輿地廣記秦州隴城縣有秦谷郡縣志秦城在隴州東南二十五里世本云秦非子始封於秦故秦本紀稱周孝王曰朕分之土邑秦隴西秦谷亭是也廢丘秦紀莊公居其故西犬丘世紀周懿王所都今槐里是也世本云秦非子玄孫莊公徙廢丘汧渭之會秦紀平王封襄公為諸侯賜之岐以西之地於是始國文公居西垂宫東獵至汧渭之會乃卜居之占曰吉即營邑之括地志故汧城在隴州汧源縣南三里世紀云襄公二年徙居汧即此城郿縣故城在岐州鳯翔府郿縣東北十五里文公東獵汧渭之會卜居之乃營邑焉即此城也世紀文公從汧今扶風郿縣是也平陽世紀云出公徙平陽郿之平陽亭是也秦紀云寧公徙平陽括地志平陽故城在岐州岐山縣西四十六里秦寧公徙都之處岐山縣有平陽鄉鄉內有平陽聚武公居平陽封宫正義云在平陽城內水經注汧水徑郁夷縣徑平陽故城南雍城秦紀德公初居雍城大鄭宫卜居雍子孫飲馬於河世紀云今扶風雍是也括地志岐州雍縣南七里故雍城秦德公大鄭城也秦記康公居雍高寢桓公居雍太寢今鳯翔府天興縣櫟陽秦紀獻公城櫟陽徙都之世紀今馮翊萬年是也括地志櫟陽故城一名萬年城在雍州東北百二十里漢七年分櫟陽城內為萬年縣通典漢萬年縣在京兆府櫟陽縣東北二十五里櫟陽故城是周明帝省萬年入廣陽更於長安城中置萬年縣仍移廣陽縣入舊萬年縣城即今櫟陽縣是也咸陽秦紀孝公十二年作為咸陽築冀闕徙都之按别紀云孝公十三年始都咸陽蓋十二年築闕而十三年都之也世紀漢元年更名新城屬扶風後并於長安故太史公曰長安故咸陽也元鼎三年復别為渭城今長安西北渭水陽有故城西京賦秦里其朔實為咸陽括地志咸陽故城一名渭城在雍州咸縣東十五里京城北四十五里即秦徙都者今咸陽縣古之杜郵劉伯莊云冀猶記事闕猶象魏也始皇置酒咸陽宫營作朝宫渭南上林苑中先作前殿阿房為閣道自殿下直抵南山為復道自阿房渡渭屬之咸陽自孝公至子嬰十世居咸陽元和郡縣圖志山南曰陽水北曰陽在北山之南渭水之北故曰咸陽西都賦云左據函谷二崤之阻表以太華終南之山右界褎斜隴首之險帶以洪河涇渭之川衆流之隈汧湧其西華實之毛則九州之上腴焉防禦之阻則天地之奧區焉是故橫被六合三成帝畿周以龍興秦以虎視蘇秦説秦惠王曰大王之國西有巴蜀漢中之利北有胡貉代馬之用南有巫山黔中之限東有殽函之固田肥美民殷富戰車萬乘奮擊百萬沃野千里蓄積饒多地勢形便此所謂天府天下之雄國也淮南注云神農明堂曰天府蘇秦天府二字本此謂可以建都之地也胡三省通鑑注云河自龍門上口南抵華陰而東流秦國在河之西山自鳥鼠同穴連延為長安南山至於泰華秦國在山之西韓魏趙齊楚燕六國皆在河山以東荀子應侯問孫卿曰入秦何見孫卿曰其國塞險形勢便山林川谷美天材之利多是形勝也入境觀其風俗其百姓朴其聲樂不流汙其服不佻甚畏有司而順古之民也及都邑官府其百吏肅然莫不恭儉敦敬忠信而不楉古之吏也入其國觀其士大夫出於其門入於公門出於公門歸於其家無有私事也不比周不朋黨倜然莫不明通而公也古之士大夫也觀其朝廷其間聽決百事不留恬然如無治者古之朝也故四世有勝非幸也數也是所見也故曰佚而治約而詳不煩而功治之至也秦類之矣雖然則甚有其諰也兼數具者而盡有之然而縣之以王者之功名則倜倜然其不及逺矣是何也則殆其無儒耶漢書志云秦地於天官東井輿鬼之分野也其界自𢎞農故關以西京兆扶風馮翊北地上郡西河安定天水隴西南有巴蜀廣漢犍為武都西有金城武威張掖酒泉敦煌又西南有牂牁越雋益州皆冝屬焉秦地於禹貢時跨雍梁二州詩風兼秦豳兩國昔后稷封􅘭公劉處豳太王徙􅑢文王作鄷武王治鎬其民有先王遺風好稼穡務本業故豳詩言農桑衣食之本甚備有鄠杜竹林南山檀柘號稱陸海為九州膏腴始皇之初鄭國穿渠引涇水溉田沃野千里民以富饒漢興立都長安徙齊諸田楚昭屈景及諸功臣家於長陵後世世徙吏二千石高訾富人及豪傑并兼之家於諸陵蓋亦以強幹弱支非獨為奉山園也是故五方雜厝風俗不純其世家則好禮文富人則商賈為利豪傑則遊俠通姦瀕南山近夏陽多阻險輕薄易為盜賊常為天下劇又郡國輻湊浮食者多民去本就末王侯貴人車服僭上衆庶放效羞不相及嫁娶尤崇侈靡送死過度天水隴西山多林木民以板為室屋及安定北地上郡西河皆迫近戎狄修習戰備高上氣力以射獵為先故秦詩曰在其板屋又曰王于興師修我甲兵與子偕行及車轔四鐵小戎之篇皆言車馬田狩之事漢興六郡良家子選給羽林期門以材力為官名將多出焉孔子曰君子有勇而無義則為亂小人有勇而無義則為盜故此數郡民俗質木不耻冦盜自武威以西本胸奴昆邪王休屠王地武帝時攘之初置四郡以通西域隔絶南羌胸奴其民或以關東下貧或以報怨過當或以悖逆無道家屬徙焉習俗頗殊地廣民稀水草宜畜牧故涼州之畜為天下饒保邉塞二千石治之咸以兵馬為務酒禮之會上下通焉吏民相親是以其俗風雨時節榖糴常賤少盜賊有和氣之應賢於內郡此政寬厚吏不苛刻之所致也巴蜀廣漢本南夷秦并以為郡土地肥美有江水沃野山林竹木疏食果食之饒南賈滇僰僮西近卭莋馬旄牛民食稻魚無凶年憂俗不愁苦而輕易淫佚柔弱𥚹厄景武間文翁為蜀守教民讀書法令未能篤信道德反以好文刺譏貴慕權勢及司馬相如遊宦京師諸侯以文辭顯於世鄉黨慕循其迹後有王褎嚴遵揚雄之徒文章冠天下繇文翁倡其教相如為之師故孔子曰有教無類武都地雜氐羌及犍為牂牁越嶲皆西南外夷武帝初開置民俗略與巴蜀同而武都近天水俗頗似焉故秦地天下三分之一而人衆不過什三然量其富居十六秦豳吳札觀樂為之歌秦曰此之謂夏聲自井十度至桞三度謂之鶉首之次秦之分也又漢志云雍州其山鎮曰吳嶽國語謂之西吳古文以為汧山秦都咸陽以為西嶽函谷關以下附東賈子過秦論曰秦孝公據殽函之固范雎謂左關阪即殽函也鹽鐵論曰秦包商洛殽函以禦諸侯淮南墜形訓九塞曰殽阪按函谷關在陜州靈寶縣西南十二里西征記曰關城路在谷中深險如函故以為名其中劣通東西十五里絶岸壁立崖上柏林蔭谷中殆不見日關去長安四百里日入則閉雞鳴則開秦法也東自崤山西至潼津通名函谷號曰天險所謂秦得百二也孟嘗君客雞鳴出函谷燕太子丹亦雞鳴出函谷百物志云秦前有藍田之鎮後有故苑之塞左崤函右隴蜀西通流沙險阻之國也西征賦云躡函谷之重阻看天險之襟帶迹諸侯之勇怯算嬴氏之利害或開關以延敵競遁逃以奔竄有噤門而莫啓不窺兵於山外班固西都賦注云函谷者其谷似函故曰函谷江統函谷關賦云唯七國之西征仰斯阻而震恐豈懊險之難犯將羣帥之無勇鹽鐵論云諸侯之有關梁庶人之有爵祿非升平之興蓋自戰國始也武關南散關西蕭關北臨晉關張儀曰秦地被山𢃄河四塞以為固徐廣曰東函谷南武關西散關北蕭關武關即建武關也張衡東京賦秦負阻於二關注云二關武關函谷關也通鑑即墨大夫見齊王曰齊地方數千里帶甲數百萬王收而與之百萬人之衆使收三晉之故地即臨晉之關可以入矣鄢郢大夫不欲為秦而在城南下者百數王收而與之百萬之師使收楚故地即武關可以入矣胡三省云收三晉兵自河東攻秦則入臨晉關楚攻秦自南陽入武關七國形勢考云秦地西有隴關東有函谷臨晉南有嶢武關北有蕭關居庸天井關以臨胡庭故曰關中賈誼新書云所為建武臨晉函谷關者大抵備山東諸侯也武關在商州商洛以限南諸侯函谷在陜州靈寶以限北諸侯臨晉在同州朝邑以限東諸侯隴關即隴山關也七國形勢考引正義云秦東有函谷蒲津龍門合河等關南山及武關嶢關西有大隴山及隴山關大震烏蘭等關北有黃河南塞故曰被山帶河四塞以為固臣瓚曰臨晉者秦築高壘以臨晉國故曰臨晉湖關史記秦昭王使謁者王稽於魏載范雎入秦至湖關望見穰侯車騎東行縣邑松柏塞荀子曰秦有松柏之塞焉氏塞鄭所塞吕覽曰公子連亡在魏欲入從鄭所之塞右主然守塞弗入公子連去入翟從焉氏塞筃改入之長城王應麟曰秦昭王滅義渠於是秦有隴西北上郡築長城以距胡非自始皇始也古今注云秦築長城土色皆紫故稱紫塞楊泉物理論云始皇使蒙恬築長城死者相屬民歌曰生男愼勿舉生女哺用餔不見長城下尸骸相撑拄北邉備對云秦城多承燕趙燕城起於造陽而至襄平遼陽造陽者上谷地也襄平者遼東縣也遼陽者遼水之北也皆燕國邉胡之地故其建築亦在此地也趙之城則自代地而西屬於高闕代者鴈門都也高闕者靈州北流河之西陰山之上遊也趙武靈王國於雲代故其備河之城但能並河而西以極乎趙境耳至秦已并六國天下為一西自上郡北地而東至遼東西悉為秦有故蒙恬之致役也西起臨洮則中國極西之地也北屬遼東則中國極東之地也自東迄西殆萬餘里無論燕趙之與岷蘭其在當時蓋無一地而無長城也於是會合三制而要其所宿則秦城之長固周乎中國之北矣然審而求之則其城不皆秦築也秦但補築使足耳元和志云開皇城自代之繁畤縣北經蔚州北十里入飛狐縣夫其自代而蔚則極北而盡乎邉中國之地不出此外秦人為城以城中夏勝地固當在此矣志又曰開皇城起嵐州合河縣經幽州皆因古迹修築夫嵐州者樓煩郡也初為胡地後為趙惠文所取則合河縣固可立城矣幽州者戰國時屬燕地則非趙人所有何由可施版築也是前乎燕趙别有築之者史所不傳故槩言因古迹修築也田齊都邑關塞附臨淄通釋齊田和立為齊侯都臨淄國䇿蘇秦説齊宣王曰齊南有泰山東有琅琊西有清河北有渤海此所謂四塞之國也臨淄甚富而實其民無不吹竽鼓瑟擊築彈琴鬪雞走犬六博踏鞠者臨淄之途車轂擊人肩摩連袵成幃舉袂成幕揮汗成雨家敦而富志高而揚田肯曰齊東有琅琊即墨之饒南有泰山之固西有濁河之限北有渤海之利地方二千里持戟百萬縣隔千里之外齊得十二焉此東秦也荀卿子説齊相曰今巨楚縣吾前大燕鰌吾後徑魏鈎吾右西壤之不絶若繩楚人則有襄賁開陽以臨吾左是一國作謀則三國必起而乘我如是則齊必斷而為四三國若假城然耳鹽鐵論曰齊撫阿甄關榮厯倚泰山負海隅漢地理志曰齊地虛危之分野也東有淄川東萊琅邪高密膠東南有泰山城陽北有千乘清河以南渤海之高樂高城重合陽信西有濟南平原皆齊分也少昊之世有爽鳩氏虞夏時有季崱湯時有逄公柏陵殷末有薄姑氏皆為諸侯國此地至周成王時薄姑氏與四國共作亂成王滅之以封師尚父是為太公詩風齊國是也臨淄名營丘故齊詩曰子之營兮遭我乎嶩之間兮又曰俟我于著乎而此亦其舒緩之體也吳札聞齊之歌曰泱泱乎大風也哉其太公乎國未可量也古有分土亡分民太公以齊地負海舄鹵少五榖而人民寡乃勸以女工之業通魚鹽之利而人物輻湊後十四世桓公用管仲設輕重以富國合諸侯成霸功身在陪臣而取三歸故其俗彌侈織作氷紈綺繡純麗之物號為冠𢃄衣履天下初太公治齊修道術尊賢智賞有功故至今其土多好經術矜功名舒緩濶逹而足智其失夸奢朋黨言與行繆虛詐不情急之則離散緩之則放縱始桓公兄襄公淫亂姑姊妹不嫁於是令國中民家長女不得嫁名曰巫兒為家主祠嫁者不利其家民至今以為俗痛乎道民之道可不愼哉臨淄海岱之間一都會也其中具五民云陽關以下附南博物志云齊南有長城巨防陽關之險北有河濟足以為固越海而東通於九夷西界岱嶽配林之險坂固之國也史記齊世家魯伐我入陽關徐廣曰在巨平括地志云兖州博平縣南二十九里西臨汶水穆陵關山東志穆陵關在沂水縣北一百二十里古齊關也博關張儀説齊曰悉趙兵渡清河指博關臨淄即墨非王之有也史記齊宣王二年三晉之王皆因田嬰朝齊王於博望關而去輿地廣記博州戰國屬齊趙衛三國之交徐廣曰齊威王六年晉伐齊至博陵長城泰山記云泰山西有長城緣河徑泰山千餘里至琅邪臺入海國䇿蘇秦云長城巨防以為塞齊記云齊宣王乘山嶺之上築長城東至海西至濟州千餘里以備楚括地志西北起濟州平陰縣緣河厯泰山城岡上經濟州淄州即西南兖州傅城縣北東至密州琅邪臺入海正義長城西在濟州平陰縣界竹書紀年梁惠成王二十年齊閔王築防以為長城郡縣志故長城首起鄆州平陰縣北二十九里齊湣王所築外紀威烈王十六年王命韓趙伐齊入長城田世家趙人歸我長城在齊威王時山東志齊長城在諸城縣南四十里跨安丘境連亘蒙泰萊蕪直至平陰乃齊宣所築以禦楚冦者楚都邑關塞附丹陽通釋楚熊繹當周成王時封於楚蠻居丹陽輿地志秭歸縣東有丹陽城周廽八里熊繹始封也丹陽凡有數處楚鬻熊始封丹陽則在今秭歸縣后楚文王徙都江陵府枝江縣亦曰丹陽漢於宛陵置丹陽郡隋於丹州置丹陽郡唐於京口置丹陽郡而西漢志乃以曲阿之丹陽為楚所封誤矣郢楚文王始都郢括地志云平王城郢在江夏陵縣東北六里故郢城是也楚始都丹陽在今枝江文王遷郢昭王遷鄢皆在今江陵境中杜預左傳注云楚國今南郡江陵縣北紀南城也謝靈運鄴中集詩云南登宛郢城今江陵北十二里而有紀南城即古之郢都也又謂之南郢桓談新論曰楚之郢都車挂轂民摩肩市路相交號為朝衣新而暮衣敝鄀楚昭王去郢北徙都鄀輿地廣記鄀縣故鄀國春秋時自商密遷此為楚附庸楚滅之昭王畏吳自郢遷焉後復還郢吳越春秋作昭王徙於蒍若注云蒍若字誤當作鄀蘇秦説楚威王曰楚地西有黔中巫郡東有夏州海陽南有洞庭蒼梧北有陘塞郇陽陳城楚襄王二十三年秦拔郢東北保於陳城壽春考烈王二十二年東徙都壽春命曰郢今安豐軍壽春縣漢地理志云楚地翼軫之分野也今之南郡江夏零陵桂陽武陵長沙及漢中汝南郡盡楚分也周成王時封文武先師鬻熊之曽孫熊繹於荆蠻為楚子居丹陽後十餘世至熊逹是為武王寖以強大後五世至嚴王總帥諸侯觀兵周室并吞江漢之間內滅陳魯之國後十餘世頃襄王東徙於陳楚有江漢川澤山林之饒江南地廣或火耕水耨民食魚稻以漁獵山伐為業果蓏螺蛤食物常足故啙窳偷生而亡積聚飲食還給不憂凍餓亦無千金之家信巫鬼重淫祀而漢中淫佚枝柱與巴蜀同俗汝南之别皆急疾有氣勢江陵故郢都西通巫巴東有雲夢之饒亦一都會也扞關以下附七國形勢考云楚肅王四年周安王二十五年蜀伐楚取兹方楚為扞關以拒之鹽鐵論云楚自巫山起方城屬巫黔中設扞關以拒秦一名捍關括地志今峽州巴山縣界張儀説楚王曰秦西有巴蜀大船積粟起於汶山浮江以下不至十日而距扞關扞關驚則從竟陵以東盡城守矣黔中巫郡非王之有江關陽關華陽國志巴楚相攻伐故置江關陽關括地志云江關今夔州魚復縣南二十里江南岸白帝城是陽關今涪州永安縣治關城也弱關水經注江水自關東徑弱關捍關弱關在建平秭歸界昔巴楚數相攻伐藉險置關以相防捍昭關范雎傳子胥槖載而出昭關夜行晝伏陘塞國䇿北有汾陘之塞徐廣曰春秋齊伐楚次于陘楚威王十一年魏敗楚陘山在密縣正義曰陘山在鄭州新鄭縣西南三十里楚世家魏取我陘山今按陘塞其説有三山海經有少陘之山太平御覽謂滎陽則正義新鄭近之滎陽春秋為鄭戰國為韓蓋南北之隘道楚為塞以禦北方故蘇秦於韓曰南有陘山於楚曰北有陘塞其地一也楚漢亦於此決勝負焉左傳楚子庚治兵於汾注云襄城縣東北有汾丘城今襄城屬汝州汾陘之塞蓋在汝鄭二州黽厄之塞史記秦踰黽厄之塞而攻楚不便劉昭曰江夏郡鄳縣古黽厄之塞也符離之塞國䇿楚苞九夷地方千里南有符離之塞北有甘魚之口方城萬城淮南兵略訓曰楚地南卷沅湘北繞潁泗西包巴蜀東裹郯淮潁汝以為洫江漢以為池垣之以鄧林綿之以方城山高尋雲溪肆無景荀子議兵曰汝潁以為險江漢以為池限之以鄧林緣之以方城左傳曰方城以為城地理志葉縣有長城號曰方城朱熹曰荆地勢四平其守當在外楚人謂方城為城漢水為池是也博物志云楚後背方城前及衡嶽左則彭蠡右則九疑有江漢之流實險阻之國也盛𢎞之荆州記云葉東界有故城始犨縣東至瀙水逹泚陽界南北聫聫數百里號為方城一謂之長城南北雖無基築皆連山相接而漢水流其南郭仲産曰苦萊于東間有方城又楚狂接輿耕於城之南皆傍此長山方城而名者也又唐勒奏土論云楚世霸南土自越以至葉𢎞境萬里故號曰萬城楊用修以方城為萬城伯晦引史記阻之以鄧林緣之以方城及服虔杜預之説以闢之桓寬鹽鐵論云楚有汝淵滿堂之固趙都邑關塞附趙城史記趙之先造父封趙城通釋云在晉州趙城縣耿晉獻公賜趙夙耿通釋云河中府龍門縣東南索隱云今河東皮氏耿鄉也原趙世家重耳為晉文公趙衰為原大夫居原任國政括地志故原城在懷州濟源縣西北二里左傳云襄王以原賜晉文公原不服文公伐原以示信原降以趙衰為大夫即此也原本周畿內邑也索隱曰系本成季徙原列國紀聞云襄子嘗居原晉陽趙世家趙襄子時知伯率韓魏攻趙趙襄子懼乃奔保晉陽列國紀聞云趙簡子居晉陽中牟趙獻侯治中牟索隱曰在河北非鄭之中牟地理志河南中牟縣趙獻侯自耿徙此邯鄲趙敬侯元年始都邯鄲蘇秦説趙肅侯曰山東之建國莫如趙強地方三千里西有常山南有河漳東有清河北有燕國宋白曰邯鄲本衛地後屬晉七國時為趙都趙敬侯自晉陽始都邯鄲地理志云自中牟徙此按史記六國年表周安王之十六年趙敬侯之元年烈王之二年趙成侯之元年成侯二十二年魏克邯鄲是年顯王之十六年也二十四年魏歸邯鄲若敬侯已都邯鄲魏克其國都而趙不亡何也至顯王三十二年公子范襲邯鄲不勝而死是年肅侯之三年也意此時趙方都邯鄲蓋肅侯徙都非敬侯也漢志云趙地昴畢之分野趙分晉得趙國北有信都真定常山中山又得涿郡之髙陽鄚州鄉東有廣平巨鹿清河河間又得勃海郡之東平舒中邑文安束州成平章武河以北也南至浮水繁陽內黃斥丘西有太原定襄雲中五原上黨上黨本韓之别郡也遠韓近趙後卒降趙皆趙分也趙中山地薄人衆猶有沙丘紂淫亂餘民丈夫相聚遊戲悲歌慷慨起則椎剽掘冡作姦巧多弄物為倡優女子彈弦跕屣遊媚富貴遍諸侯之後宫邯鄲北通燕涿南有鄭衛漳河之間一都會也其土廣俗雜大率精急髙氣勢輕為姦太原上黨又多晉公族子孫以詐力相傾矜夸功名報仇過直嫁娶送死奢靡漢興號為難治常擇嚴猛之將或任殺伐為威父兄被誅子弟怨憤至告訐刺史二千石或報殺其親屬鍾代石北迫近邉徼民俗懻忮好氣為姦不事農商自全晉時已患其剽悍而武靈王又益厲之故冀州之部盜賊常為它州劇定襄雲中五原本戎狄地頗有趙齊衛楚之徙其民鄙朴少禮文好射獵鴈門亦同俗於天文别屬燕信都李公緒趙記云趙孝成王造檀臺之宫為趙都朝諸侯故曰信都亦見宫室考又史記云客説張耳曰兩君羈旅難以獨立立趙後扶以義可以就功乃求趙歇立為趙王居信都扞關以下附蘇厲為齊遺趙王書曰秦之上郡近扞關至於榆中千五百里吕氏云扞者扞敵之扞非關名也趙之扞關陸道之關也楚之扞關水道之關也句注塞句注塞者吕氏春秋九塞之一也胸奴傳趙襄子踰句注而破并代張儀説燕曰昔趙襄子欲并代與代王遇於句注之塞郡縣志晉咸寧二年句注碑曰蓋北方之險有盧龍飛狐句注為之首天下之阻所以分别外內博物志云趙東臨九州西瞻恆嶽有沃瀑之流飛壺井陘之險至於潁陽涿鹿之野鹽鐵論云趙結飛狐句注以存荆代一統志云句注山在代州西二十五里一名西陘史語正義云夏屋與句注相接鴈門塞鴈門山在代州北三十五里志云以鴈出其門故名鴈門塞關因山以立凡山西之關四十有餘皆踞隘保固而聳拔雄壯則鴈門為最故趙李牧漢郅都偹邉於此胸奴不敢近塞固皆一時良將不可謂非地險也史記李牧者趙之北邉良將也常居鴈門備胸奴以便宜置吏市租皆輸入幕府為士卒費日擊數牛饗士習騎射謹𤇺火多聞間諜厚遇戰士為約曰胸奴即入盜即入收保有敢捕虜者斬胸奴每入𤇺火謹輒入收保不敢戰如是數歲亦不亡失髙闕塞杜氏通典趙武靈王築長城自代傍陰山下至髙闕為塞水經注云長城之際連山刺天其山中斷兩岸雙闕善能沄舉望若闕焉節收表目故有高闕之名也自闕北出荒中闕口有城跨山結局謂之高闕戍上右迄今常置重捍以防塞道長城括地志云趙武靈王長城在朔州善陽縣北今按史記趙肅侯七年築長城及武靈王北略中山之地至於房子遂之代北至無窮西至河登黃華之上召樓緩謀曰我先王因世之變以長南藩之地屬阻漳滏之險立長城是武靈王之前已有長城疑括地志脫一字當是武靈王修長城也圖書記云趙簡子築長城以備胡又在肅侯之前矣虞氏記云趙侯自五源河曲築長城東至陰山又於河西造大城一箱崩不就乃改卜陰曲而禱焉晝見羣鵠遊於雲中徘徊經日光在其下乃即於其處築城今雲中城是也魏都邑關塞附魏史記晉獻公以魏封畢萬魏城在陜州芮城縣北五里漢河北縣輿地廣記河中府永樂縣古魏國唐分芮城置水經注永樂澗水北出於薄山南流徑河北縣故城西故魏國也晉以封畢萬左思賦魏土者畢昴之所應虞夏之餘人先王之桑梓列聖之遺塵考之四隈則八埏之中測之寒暑則霜露所均霍魏悼子徙居霍晉州霍邑縣索隱曰系本云武仲生莊子絳無悼子又系本居篇曰魏武子居魏悼子徙霍宋忠曰霍地名今河東彘縣也則是有悼子系本卿大夫代自脫耳安邑地理志河東安邑魏絳自魏徙此魏世家武侯二年城安邑秦紀昭王二十一年魏獻安邑國䇿云安邑者魏之柱國也晉陽者趙之柱國也鄢郢者楚之柱國也郡縣志安邑故城在陜州夏縣東北十五里禹所都柱國者都也大梁魏世家惠王三十一年秦用商君東地至河而齊趙數破我安邑近秦於是徙治大梁水經注大梁城本春秋之陽武高陽鄉於戰國為大梁周梁伯之居今開封府祥符縣也魏又有少梁史記韓魏戰於少梁注魏有大梁故此稱少梁耳蘇秦説魏襄王曰大王之地南有鴻溝陳汝南許郾昆陽召陵舞陽新都新郪東有淮潁煮棗無胥西有長城之界北有河外卷衍酸棗地方千里地名雖小然而田舍廬廡之數曽無所芻牧人民之衆車馬之多日夜行不絶輷輷殷殷若有三軍之衆臣竊料大王之國不下楚説趙曰秦之攻韓魏也無有名山大川之限稍蠶食之傳國都而止張儀説魏王曰魏地四平諸侯四通輻湊無名山大川之限從鄭至梁二百餘里車馳人走不待力而至梁南與楚境西與韓境北與趙境東與齊境卒戍四方守亭障者不下十萬梁之地勢固戰場也梁南與楚而不與齊則齊攻其東東與齊而不與趙則趙攻其北不合於韓則韓攻其西不親於楚楚攻其南此所謂四分五裂之道也博物志云魏前枕黃河背漳水瞻王屋望梁山有藍田之寶浮地之淵漢地理志云魏地觜觽參之分野也其界自高陵以東盡河東河內南有陳留及汝南之召陵濦疆新汲西華長平潁川之舞陽郾許傿陵河南之開封中牟陽武酸棗卷皆魏分也河內本殷之舊都周既滅殷分其畿內為三國詩風邶鄘衛國是也邶以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷民謂之三監故書序曰武王崩三監畔周公誅之盡以其地封弟康叔號曰孟侯以夾輔周室遷邶鄘之民於雒邑故邶鄘衛三國之詩相與同風邶詩曰在浚之下鄘曰在浚之郊邶詩又曰亦流於淇河水洋洋鄘曰送我淇上在彼中河衛曰瞻彼淇澳河水洋洋故吳公子札聘魯觀周樂聞邶鄘衛之歌曰美哉淵乎吾聞康叔之德如是是其衛風乎至十六世懿公亡道為狄所滅齊桓公帥諸侯伐狄而更封衛於河南曹楚丘是為文公而河內殷虛更屬於晉康叔之風既歇而紂之化猶存故俗剛強多豪桀侵奪薄恩禮好生分河東土地平易有鹽鐵之饒本唐堯所居詩風唐魏之國也周武王子唐叔在母未生武王夢帝謂已曰余名而子曰虞將與之唐屬之參及生名之曰虞至成王滅唐而封叔虞唐有晉水及叔虞子燮為晉侯云故參為晉星其民有先王遺教君子深思小人儉陋故唐詩蟋蟀山樞葛生之篇曰今我不樂日月其邁宛其死矣他人是愈百歲之後歸于其居民皆思奢儉之中念死生之慮吳札聞唐之歌曰思深哉其有陶唐氏之遺民歟魏國亦姬姓也在晉之南河曲故其詩曰彼汾一曲置諸河之側自唐叔十六世至獻公滅魏以封大夫畢萬滅耿以封大夫趙夙及大夫韓武子食采於韓原晉於是始大至於文公霸諸侯尊周室始有河內之土吳札聞魏之歌曰美哉渢渢乎以德輔此則明主也文公後十六世為韓魏趙所滅三家皆自立為諸侯是為三晉趙與秦同祖韓魏皆姬姓也是畢萬後十世稱侯至孫稱王徙都大梁鮑氏謂他國有山川關塞唯梁無之皆以卒戍守按九域志卒戍四方守亭障者參列粟糧漕庾不下十萬宋都大梁太祖欲西遷洛陽據山河之固曰不出百年民力殫矣後山陳氏謂開封無山川之阻為四戰之地故太祖以兵為衛畿內常用十四萬人長城附戰國之世各有長城秦昭王築長城以備邉楚有長城又有扞關以拒巴趙肅侯築長城以備邉濟宣王乘山嶺之上築長城東至海西至濟州以備楚燕築長城自造陽至襄平置上谷漁陽右北平遼東以拒敵魏之長城自惠王築也考竹書紀年梁惠成王十二年龍賈帥師築長城於西邉魏世家惠王十九年築長城塞固陽城自鄭濵洛以北有上郡當是時秦數侵魏而西戎義渠稱王窺中國故築長城焉鹽鐵論曰魏濵洛築城阻山帶河以保晉國韓都邑關塞附韓原韓世家韓之先與周同姓姓姬氏其後苗裔事晉得封於韓原曰韓武子武子後三世為韓厥從封姓為韓氏索隱曰按左傳云𨝍晉應韓武之穆則韓是武王之子然詩稱韓侯出祖則是有韓而先滅今據此文云其後裔事晉封於韓原曰韓武子則武子本是韓之後晉又封之於韓原即今之馮翊縣是也系本云韓萬生伯伯生定伯簡簡生輿輿生獻子厥州宣子徙居州漢河內州縣括地志懷州武德縣本周司冦蘇忿生之州邑也平陽貞子徙居平陽晉州臨汾縣世奉云景子徙平陽鄭哀侯二年滅鄭因徙都鄭改號曰鄭蘇秦説韓王曰韓北有鞏洛成臯之固西有宜陽商阪之塞東有宛穰洧水南有陘山地方九百餘里國䇿頓子曰韓天下之咽喉魏天下之胸腹玉海云晉楚之霸也爭鄭秦之并六國也始於韓以虎牢成臯之險也秦拔成臯滎陽十九年而韓亡圖書編云河南豫州之地平夷洞逹九有一轂八面受敵之場也而戰國之時韓魏以區區之陋邦北縈南齊環繞數千里界於秦楚齊趙四大國之間無再會不受敵而虎狼之秦搏噬尤亟其勢可謂危矣而終能雞唱荷戈月沉擊柝繼世相仍為二百年之戰國及與齊楚皆亡夫以二百年韓魏之君豈皆賢哉咸能不失疆土則以生於憂患故耳漢地理志云韓地角亢氐之分野也韓分晉得南陽郡及潁川之父城定陵襄城潁陽潁陰長社陽翟郟東接汝南西接𢎞農得新安宜陽皆韓分也及詩風陳鄭之國與韓同星分焉鄭國今河南之新鄭本髙辛氏火正祝融之虛也及成臯滎陽潁川之崇髙陽城皆鄭分也本周宣王弟友為周司徒食采於宗周畿內是為鄭鄭桓公問於史伯曰王室多故何所可以逃死史伯曰四方之國非王母弟甥舅則夷狄不可入也其濟洛河潁之間乎子男之國虢會為大恃勢與險崈侈貪冒君若寄帑與賄周亂而敝必將背君君以成周之衆奉辭伐罪亡不克矣公曰南方不可乎對曰夫楚重黎之後也黎為高辛氏火正昭顯天地以生柔嘉之材薑嬴荆芈實與諸姬代相干也薑伯夷之後也嬴伯益之後也伯夷能禮於神以佐堯伯益能儀百物以佐舜其後皆不失祠而未有興者周衰將起不可逼也桓公從其言乃東寄帑與賄虢會受之後三年幽王敗桓公死其子武公與平王東遷卒定虢會之地右雒左泲食溱洧焉土狹而險山居谷汲男女亟聚會故其俗淫鄭詩曰出其東門有女如雲又曰溱與洧方灌灌兮士與女方秉菅兮恂盱且樂惟士與女伊其相謔此其風也吳札聞鄭之歌曰美哉其細已甚民弗堪也是其先亡乎自武公後二十三世為韓所滅韓自武子後七世稱侯六世稱王五世而為秦所滅秦既滅韓徙天下不軌之民於南陽故其俗夸奢上氣力好商賈漁獵藏匿難制御也宛西通武關東受江淮一都之會也自東井六度至亢六度謂之夀星之次鄭之分野與韓同分商阪以下附西蘇秦説韓宣惠王曰韓北有鞏洛成臯之固西有宜陽商阪之塞六國表秦孝公十六年城商塞玉海云商阪一作商塞即商山也在商州商洛縣南一里亦曰楚山武關在焉成臯北困學紀聞云虎牢之險天下之樞也在虢曰制在鄭曰虎牢在韓曰成臯鹽鐵論云韓阻宜陽伊闕要成臯太行燕都邑關塞附薊通釋周武王封召公於北燕都薊輿地廣記武王封帝堯之後於薊又封召公於北燕其後燕國都薊詩補傳曰薊後改為燕猶唐之為晉荆之為楚或曰黃帝之後封於薊者已絶成王更封召公奭於薊為燕蘇秦説燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有呼沱易水博物志云燕却背沙漠進臨易水西至君都東至於遼長蛇帶塞險陸相乘也鹽鐵論云燕塞碣石絶邪谷繞援遼蘇代見燕王曰天下戰國七燕處弱焉獨戰則不能有所附則無不重南附楚楚重西附秦秦重中附韓魏韓魏重韓非子曰燕襄王以河為境以薊為國襲涿方城殘齊平中山有燕者重無燕者輕注方城涿之邑也漢地理志云燕地尾箕分野也武王定殷封召公於燕其後三十六世與六國俱稱王東有漁陽右北平遼西遼東西有上谷代郡鴈門南得涿郡之易容城范陽北新城固安涿縣良鄉新昌及渤海之安次皆燕分也樂浪玄莵亦宜屬焉燕稱王十世秦欲滅六國燕王太子丹遣勇士荆軻西刺秦王不成而誅秦遂舉兵滅燕薊南通齊趙勃碣之間一都會也初太子丹賓養勇士不愛後宫美女民化以為俗至今猶然賔客相過以婦侍宿嫁取之夕男女無别反以為榮後稍頗止然終未改其俗愚悍少慮輕薄無威亦有所長敢於急人燕丹遺風也上谷至遼東地廣民希數被兵警俗與趙代相類有魚鹽棗栗之饒北隙烏九夫餘東賈真畨之利玄莵樂浪武帝時置皆朝鮮濊貉句驪蠻夷殷道衰箕子去之朝鮮教其民以禮義田蠶織作樂浪朝鮮民犯禁八條相殺以當時償殺相傷以榖償相盜者男沒入為其家奴女子為婢欲自贖者人五十萬雖免為民俗猶羞之嫁取無所讐是以其民終不相盜無門户之閉婦人貞信不淫辟其田民飲食以籩豆都邑頗放效吏及內郡賈人往往以杯器食郡初取吏於遼東吏見民無閉藏及賈人往者夜則為盜俗稍益薄今於犯禁􅐛多至六十餘條可貴哉仁賢之化也然東方天性柔順異於三方之外故孔子悼道不行設浮於海欲居九夷有以也夫樂浪海中有倭人分為百餘國以歲時來獻見云自危四度至斗六度謂之析木之次燕之分也遼東郡以下附胸奴傳燕置遼東郡以距之通典云舜營州遼水之東是也燕置遼東郡秦漢因之遼西郡通典云燕築遼西郡上谷郡漁陽郡右北平郡天下圖書記云燕築長城又置上谷漁陽右北平遼東以距之朝鮮障蘇秦曰燕東有朝鮮遼東按朝鮮傳王滿燕人自始燕時嘗略屬真畨朝鮮為置吏築障秦滅燕屬遼東外徼長城胸奴傳燕築長城自造陽至襄平置上谷漁陽右北平遼西遼東郡以距之冠帶戰國七而三國邉於胸奴燕與敵相接杜氏通典云北方以畜牧為業隨逐水草無文書俗簡易以言語為約束然各有分地射獵禽獸食肉衣皮習於攻戰此天性也唐虞則山戎夏則獯鬻周則獫狁懿王時德衰侵暴及涇陽人被其苦至曾孫宣王乃命將討伐至太原稱為中興其後山戎越燕伐齊後乂伐燕齊桓公救燕敗走之襄王之時戎狄至雒邑東至衛境侵盜尤甚晉文公乃興師攘却居於西河圁洛之間圁音銀號曰赤翟白翟而晉北有林胡樓煩之戎燕北有樓蘭山戎各分散溪谷自為君長往往而聚者百有餘戎然不相統一自晉悼公納魏絳之謀和諸戎之服而晉強至安王之時趙襄子踰句注而破之洎於戰國趙武靈王築長城其後燕將秦關開襲破樓蘭却地千餘里燕亦築長城以距之北邉備對云古來築長城以扞北膚者四世燕趙秦隋也秦制多仍燕趙而隋氏不盡因秦也七國考卷三
