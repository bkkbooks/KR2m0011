body:
  text: 七國考卷十明董説撰秦喪制殉葬按史記秦武公卒初以人從死從死者六十六人繆公三十九年卒葬雍從死者百七十七人秦之良臣子車氏三人名曰奄息仲行針虎亦在從死之中秦人哀之為作黃鳥之詩詩曰交交黃鳥止於棘誰從穆公子車奄息維此奄息百夫之特臨其穴惴惴其栗彼蒼者天殱我良人如可贖兮人百其身交交黃鳥止於桑誰從穆公子車仲行維此仲行百夫之防臨其穴惴惴其栗彼蒼者天殱我良人如可贖兮人百其身交交黃鳥止於楚誰從穆公子車針虎維此針虎百夫之禦臨其穴惴惴其栗彼蒼者天殱我良人如可贖兮人百其身應劭曰秦穆公與羣臣飲酒酣公曰生共此樂死共我哀於是奄息仲行針虎許諾及公薨皆從死黃鳥詩所為作也至獻公元年止從死是武公已下十八君皆從死也又按國策昭襄王時秦宣太后愛魏醜夫太后病將死出令曰為我葬必以魏醜為殉據此昭襄之世尚有殉葬不知獻公止從死之後又起於何代也皇覽塜墓記云秦始皇塜在􅌐山之右塜中以水銀為百川金銀為鳬鴈機相輸上具天文下具地理以人魚膏為燭度久不滅其葬時后宫無子者皆殉從死者甚衆以書葬皇覽云吕不韋好經書多以葬漢明帝朝公卿大夫諸儒八十餘人論五經誤失符節令宋元上言臣聞秦昭王與不韋好書皆以書葬王至尊不韋久貴塜皆以黃腸題湊處地髙燥不壞臣願發昭王不韋塜視未焚詩書合葬史記正義云昭襄王卒以孝文王母吕太后與昭襄王合葬太子歸葬史記秦昭王二年太子質於魏者死歸葬芷陽壽陵史記昭襄王卒葬壽陵黃腸題湊詳見以書葬蘇林曰以柏木黃心致纍棺外故曰黃腸木頭皆內向故曰題湊墓植柏博物志秦穆公時有人掘地得物若羊將獻之道逄二童子謂曰此名為蝹常在地中食死人腦若欲殺之以柏東南枝插其首由是墓皆植柏墓植柏自秦始也遣弔左傳晉獻公之喪秦繆公使人弔公子重耳諸侯來弔祠史記昭襄王卒韓王衰絰入弔祠諸侯皆使其將相來弔祠視喪事田齊喪制殉葬劉向云昔齊威王卒從死七十二人按括地志云齊桓公墓在臨淄南二十一里牛山上晉永嘉末人發之初得版次得水銀池有氣不得入經數日乃牽犬入得金蠶數十簿珠𥜗玉匣繒綵軍器不可勝數又以人殉葬人骨狼藉據此自先齊已殉葬矣史記齊宣王卒湣王即位蘇秦説湣王厚葬以明孝髙宫室大苑囿以明得意欲破敝齊而為燕七略云齊湣王厚死人按檀弓云陳子車死於衛其妻與其家大夫謀以殉葬又陳乾昔疾屬其兄弟而命其子遵已曰如我死則必大為我棺使吾二婢子夾我左傳宋文公卒始厚葬用蜃炭益車馬始用殉重器偹椁有四阿棺有翰檜注始用殉用人從葬也又晉景公卒小臣有晨夢負公以登天及日中負晉侯出諸厠遂以為殉又邾子卒先葬以車五乘殉五人注欲藏中之潔故先內車及殉别為便房蓋其遺命顧愷之啓蒙注云魏時人有開周王塜者得殉葬女子經數日而有氣數月而能語年可二十送詣京師郭太后愛飬之十餘年太后崩哀思哭泣一年餘而死古之殉葬者多矣銅椁從征記曰齊襄王墓在汝水西墓西有僖公墓續從征記曰太公塜在堯山北五里平地為坂髙十丈曽發之者得一銅椁金玉甚多尚父五世葬周此實田和塜也和遷齊居於海上而别為諸侯亦稱太公也山東志曰四王墓在臨淄縣南十五里鼎足山齊記補遺曰山基圓頂東西直列乃齊威宣湣襄四王墓按蘇州志虎丘山下有吳王闔閭塜銅椁三周水銀為池金銀為地古之厚葬蓋有銅棺椁也出弔孟子為卿於齊出弔於滕白虎通曰遣大夫弔辭曰皇天降災子獨遭離之嗚呼哀哉皇覽逸禮曰君使大夫弔於國君禮錫衰衰裳辨絰有絰下馬大夫為介亦如之士介者將命者緦麻裳辨絰異姓葛同姓麻楚喪制殉葬史記楚靈王倣徨山中野人莫敢入王行遇其故鋗人謂曰為我求食鋗人曰新王下法有敢餉王從王者罪及三族王因枕其股而卧鋗人又以土自代逃去王覺而弗見遂飢弗能起芉尹申無宇之子申亥曰吾父再犯王命王弗誅恩孰大焉乃求王遇王飢於釐澤奉之以歸夏五月癸丑王死申亥家申亥以二女送死并葬之是楚有殉葬之俗也又國策云楚宣王時江乙説於安陵君曰君無咫尺之功骨肉之親處尊位受厚祿一國之衆見君莫不斂袵而拜撫委而服何以也曰王過舉以色不然何以至此江乙曰以財交者財盡而交絶以色交者華落而愛弛是以嬖色不敝席寵臣不敝軒今君擅楚國之勢而無以自結於王竊為君危之安陵君曰然則奈何江乙曰願君必請從死以身為殉此又一證以書葬蕭子顯齊書襄陽有盜發古塜相傳是楚武王塜獲丘縣東北近世有人開之下入三丈石函中得一鵝鵝回轉翅以撥石復下入一丈便有青氣上騰望之如陶煙飛鳥過人輒墮死遂不敢入墨莊漫録載政和間朝廷求詢三代鼎彛器程唐為陜西提點茶馬李朝孺為陜西轉運遣人於鳯翔府破商比干墓得銅盤徑二尺餘中有欵識一十六字又得玉片四十三枚其長三寸許上圓而鋭下濶而方厚半指玉色明瑩此皆以物殉葬之絶異者也歸喪楚世家頃襄王三年懷王卒於秦秦歸其喪於楚人皆憐之如悲親戚赴史記郟敖既死公子圍使使赴於鄭伍舉問曰誰為後對曰寡大夫圍伍舉更曰共王之子圍為長杜預曰伍舉更赴辭重從禮告終稱嗣不以篡弒赴諸侯趙喪制會葬史記肅侯二十四年卒秦楚燕齊魏出鋭師各萬人來會葬壽陵史記肅侯十五年起壽陵國語管仲曰定民之居成民之事陵為之終是民之墓亦稱陵也周顯王三十四年趙起壽陵秦惠文以後始稱陵而民不得稱水冡隋圖經云歷陵縣西十里趙簡子冡石虎令人發之初得炭深一丈得連木木厚髙八尺次得流泉水水色青冷非常以牛皮為囊作絞車以汲之一月而水無極乃止築城繞之氣成樓闕赴主父死乃發喪赴諸侯見趙世家魏喪制以書葬束晢傳晉太康二年汲郡人盜發魏襄王墓或云安釐王冡得竹書數車其中與經傳大異者云夏年多殷益干位殺之太甲殺伊尹文王殺季歷自周受命至穆王壽百歲也幽王既亡共伯和者攝行天子事非二相共和也初發冡者燒策照取寶物及官收之多燼簡斷策據此魏以書葬也餘冬序録云汲縣發古塜人姓不不字呼作彪其名凖一統志又云漢初有人發魏襄王冡得竹簡書十餘萬言胡應麟曰武帝紀咸寧五年汲郡人發魏襄王冡非太康二年襄王即孟子所謂不似人君者而冡中獨竹簡數十車古器一二他服玩珍怪無聞焉即世傳三書無論如大易繫辭或燼於秦火而出於冡中則襄王竹簡豈不與孔壁同功哉當戰國紛爭雅尚如襄王誠未易者裸葬西京雜記魏王子且渠冡甚淺狹無棺柩但有石牀廣六尺長一丈石屏風牀下悉是雲母床上兩尸一男一女皆年二十許東首裸卧無衣衾據此魏有祼葬之俗也按張華博物志楚之南有炎人之國其親戚死朽之肉而棄之然後埋其骨乃為孝也此與裸葬並為異特更葬日國策魏惠王死葬有日矣天大雨雪至於牛目壞城郭且為棧道而葬羣臣多諫太子者曰雪甚如此而喪行民必甚病官費又恐不給請弛期更日太子曰為人子而以民勞與官費之故而不行先王之喪不義也羣臣皆不敢言惠公駕而見太子曰葬有日矣太子曰然惠公曰昔王季歷葬於楚山之尾灓水齧其墓見棺之前和文王曰嘻先王必欲一見羣臣百姓也夫故使灓水見之於是出而為之張朝百姓皆見之三日而後更葬此文王之義也今葬有日矣而雪甚及牛目難以行太子為及日之故得無嫌於欲亟葬乎願太子更日先王必欲少留而扶社稷安黔首也故使雪甚因弛期而更為日此文王之義也若此而弗為意者羞法文王乎太子曰甚善謹弛期更擇日按王制云葬不為雨止鄭注云雖雨猶葬以其禮儀少也鐵劵石人西京雜記晉人有發魏哀王冡者哀王冡以鐵灌其上穿鑿三日乃開其黃氣如霧觸人鼻目皆辛苦不可入以兵守之七日乃歇初至一户無扄鑰石牀方四尺床上有石几左右有三十石人立侍皆武冠帶劍復入一户石扉有關鑰叩開見棺柩黑光照人刀斫不入燒鋸截之乃漆雜兕革為棺厚數寸纍積十餘重力不能開乃止復入一户亦石扉關鑰得石牀方七尺石屏風銅帳􅟈一具或在牀上或在地下似是帳縻朽而銅􅟈墮落牀上石枕一枚塵埃朏朏甚髙似是衣服床左右石婦人各二人悉皆立侍或有執巾櫛鏡鑷之象或有執盤捧物之形無餘異物但有鐵鏡數百枚焉文石槨魏襄王冡皆以文石為槨髙八尺許廣狹容四十人中有石牀石屏風牀上有玉唾壺一枚銅劍二枚金玉雜具見西京雜記按檀弓曰有虞氏瓦棺又秦之先有石棺古史考曰堯作瓦棺湯作木棺郭緣先證記曰桓魋石槨在九里山之東北也槨有二重門間隱起青石方淨如鏡門扇數四博物志曰衛靈公葬得石槨銘曰不逄箕子靈公奪我里荆州記曰臨湘水中有石床床上有二石棺色緑如銅鏡莫能詳也吳越春秋曰吳王閶闔有女自殺闔閭痛之葬於國西閶門外文石為槨七國考卷十
