  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0011_WYG_007-1a, image: WYG0618/WYG0618-0894a.png}
body:
  text: 七國攷卷七明董説撰秦音樂鈞天之樂碧巖大乗注云秦繆公夢饗於帝庭得鈞天廣樂而下其後繆公因作鈞天之樂西京賦云昔者天帝悦秦繆公而覲之饗以鈞天廣樂帝有醉焉乃為金䇿錫用此土而翦諸鶉首昭和鐘宋秘閣有秦昭和鐘銘云秦公曰丕顯朕皇祖受天命奄有下國十有二公不墜上帝嚴龔寅天命保大業故秦虩事䜌夏曰余雖小子穆穆師秉明德獻敷明刑䖍敬朕祀以受多福綏和萬民唬夙夕刺刺􅧱􅧱萬生是敕咸畜百辟𦙍士趫趫文武鎮静不廷優佊㸉百邦於秦執事匭咊鐘故曰邦其音雝雝孔煌以昭孝享以受毛魯多釐眉壽無疆畯惠在位髙引有慶匍百四方永寳用宜靈鼉鼓李斯諫逐客書陛下建翠鳯之旗樹靈鼉之鼓宣和琴古琴録秦惠文王有琴一曰宣和二曰閑邪夏侯湛琴賦云聊閑邪於五弦兮翼宣和於萬里盖指此也閑邪琴詳上宣和超屏琴燕丹子荆軻見秦王将刺之王曰寡人好琴願一曲而就死軻許之因命琴女文馨奏曲曲曰羅縠單衫可掣而絶三尺屏風可超而越鹿盧之劍可負而㧞王從其言遂得脱後名其琴曰超屏盆瓶戰國策云澠池之㑹藺相如請秦王奏盆瓶李斯上書擊瓮叩瓶盖不獨汲水且以為樂矣唐人之擊甌本此缶瓮許氏説文曰缶者瓦噐所以盛酒漿秦人鼓之以莭歌文獻通攷曰古者西戎用缶以為樂李竒曰擊瓮扣缶其秦之聲豈以秦人盡有西戎之地而為此聲故耶又六書纂文載太公寳缶銘或云秦之廟噐也筝李斯諫逐客書曰夫擊瓮扣瓶彈筝撫髀而歌呼嗚嗚快耳者真秦之聲也田齊音樂房中之樂鐘石書齊宣王房中之樂金遲石緩絲竹合奏秦漢淫聲之祖也或云金遲石緩謂用金石之音少專尚絲竹也余按遲緩之義非廢金石盖絲竹宻而金石踈大吕鐘樂毅報燕王書大吕陳於元英注大吕齊鐘名又齊策云大王據千乗之地而建千石鐘萬石簴和竽孔融云齊宣王好和竽和竽竽之名也猶秦和鐘也齊記云齊宣王好竽竽者廩食百人齊瑟選笙賦云齊瑟秦筝歌録有齊瑟行又蘇秦曰臨菑之民無不吹竽鼓瑟擊筑彈琴楚音樂瀟湘洞庭之樂拾遺記洞庭山浮於水上其下有金堂數百間玉女居之四時聞金石絲竹之聲徹於山頂楚懷王之時舉羣才賦詩於水湄故云瀟湘洞庭之樂聽者令人忘老雖咸池簫韶不能比焉每四季之莭楚王常繞山以遊宴舉四仲之氣以為樂章仲春律中夾鐘乃作輕風流水之詩醼於山南仲夏時中𬎼賔乃作皓露秋霜之曲又襄陽耆舊傳曰宋玉識音而善文襄王好樂而愛賦既美其才而憎其似屈原也乃謂之曰子盍從楚之俗使楚人貴子之德乎對曰昔楚有善歌者王其聞與始而曰國下里巴人國中唱而和之者數萬人中而曰陽阿採菱中唱而和之者數百人既而曰陽春白雪朝日魚麗含商吐角絶節赴曲國中唱而和之者不過數人盖其曲彌髙其和彌寡琴操云一曰烈女引楚樊妃作又楚膏梁子出游九臯之澤覧漸水之䑓張罛置罟于荆山臨曲池而渙而疾風霣暴雨電冥天火四起霹靂下臻𤣥鸛翔其前𤣥虎吟其後乃援琴而歌作霹靂引又楚昭王得和璧使大夫明光奉璧於趙郡中羊由甫知趙無反遣乃讒於王明光常背楚用趙今使奉璧何能述功德及光明逺怒之明光乃作歌曰楚光明地室金奏左傳晋郤至如楚聘且涖盟楚子享之子反相為地室而縣焉卻至将登金奏作於下驚而走出巫音吕氏春秋宋之衰也作為千鍾齊之衰也作為大吕楚之衰也作為巫音注女曰巫楚辭九歌巫以事神其女妓之流乎楚些丹鉛録齊歌曰謳呉歌曰歈楚歌曰些巴歌曰嬥又梁元帝纂要云楚歌曰艷宋玉招魂皆以些字為尾躬舞楚靈王信巫祝之道躬執羽紱起舞壇前呉人來攻其國而靈王鼓舞自若見桓譚新論萬左傳令尹子元欲蠱文夫人為舘於其宫之側而振萬焉夫人聞之曰先君以是舞也習戎偹也今令尹不尋諸仇讎而於未亡人之側不亦異乎九龍之鐘淮南子云闔閭伐楚破九龍之鐘許慎云楚為九龍之簴以縣鐘也賈子云子胥入郢毁十龍之鐘其説不同不可攷楚鐘楚宫鐘趙氏金石録楚鐘藏方城范氏銘云惟王五十六祀楚王下有字不可識鐘按楚惟惠王在位五十七年此鐘為惠王作無疑也方是時王室衰弱六國争疆楚尤强大遂不用周之正朔又金石録載楚公鐘銘云楚公自作余按楚爵子僣稱王未嘗稱公楚公鐘者當是宰邑大夫所造如葉公之類是也方磬桓譚新論云瀟湘之樂方磬為帝繞梁琴古琴疏宋華元獻楚王以繞梁之琴鼓之其聲嫋遶於梁間循環不已楚王樂之七日不聽朝樊姬進曰君滛於樂矣昔桀好妹喜之瑟而亡其身紂好靡靡之音而䘮其國今君遶梁是樂七日弗朝君樂亡身䘮國乎於是以鐵如意搥琴而破之青翻琴古琴録楚王子無虧有琴曰青翻後質於秦不得歸因撫琴歌曰洞庭兮木秋涔陽兮草衰去千里之家國作咸陽之布衣秋陽琴襄陽古噐録繞梁秋陽皆古楚琴楚笙闞子云楚笙冠中國又列子云墨子儉嗇而非樂者􅉨見荆王衣錦吹笙必楚俗好笙也警鼓詳見兵制文獻通考云昔楚厲王有警鼓與百姓為戒既而飲酒太過而擊民大警使人止之居數月警而擊之民莫有起者邵倫曰楚厲王以軍鼓為酒鼓可謂凟樂矣趙音樂肆夏禮郊特牲云大夫之奏肆夏由趙文子始也按此趙僣禮樂之始廣舞劉歆云趙襄主殺代王於廣舞之中按吕氏春秋簡子死召太子而告之曰我死已葬服衰而上夏屋之山以望太子敬諾簡子死已葬衰服襄子上於夏屋以望代俗其樂甚美於是襄子曰先君必以此教也乃以其女弟妻代君襄子遂謁而請觴之先令舞者置兵其羽中百人先具大金斗代王至酒酣反斗而擊之盡殺其從者因迎其妻其妻聞之遂磨笄以自刺故趙氏至今有磨筓之山歆言廣舞即此史記無舞者之文靈文筝陸機云趙惠文王有筝曰靈文趙瑟史記趙王與秦王㑹澠池秦王使趙王鼓瑟郭恕碑云屏趙瑟絶秦缶潘岳西征賦耻東瑟之偏鼓提西缶而接刃鹿碧巖大乗注云匏音之妙楚笙趙鹿鹿者笙之類余按金石録古祭噐有鹿噐為鹿形從此起趙之樂噐或此義也趙烈侯之石鐘石書云有石如磬形銘云趙烈侯之石盖六國時趙烈侯樂噐尚書擊石拊石皆指磬也余按趙世家趙烈侯好音謂相國公仲連曰寡人有愛可以貴之乎公仲連曰冨之可貴之則否烈侯曰然夫鄭歌者搶石二人吾賜之田人萬畆魏音樂金石之樂國語晋悼公十二年伐鄭軍於蕭魚鄭賂以女樂二八歌鐘二肆寳鏄大磬悼公以樂之半賜魏絳曰子教寡人和戎狄而正諸華於今八年七合諸侯寡人無不得志請與子共樂之魏絳辭不得乃受魏於是有金石之樂也魏樂書方樂書云六國時魏文侯最為好古孝文時得其樂人竇公獻其書乃周官大宗伯大司樂之章也惠侯琴天山録任襄掘地得古物木質金采銘曰魏下又有銘字差細曰惠侯琴盖戰國梁惠王之琴也按史記淳于髠見梁惠王王屛左右見之終無言王讓之髠曰王志在音知惠王滛於聲樂矣然惠侯是諡或其子孫追銘之也縣琴陳晹樂書晉師經以琴撞文侯文侯曰卿何鮮禮之甚也經對曰臣撞桀紂非撞陛下也文侯韙之乃懸琴於門為終身之戒搥鑿劉勰新論云魏文侯好搥鑿之聲不貴金石之和漢書禮樂志云六國魏文侯最為好古而謂子夏曰寡人聼古樂則欲寐及聞鄭衛余不知倦焉子夏辭而辨之終不見納自此禮樂䘮矣燕音樂縈塵集羽之舞拾遺記云燕昭王三年廣延國獻善舞者二人一名旋娟一名提嫫王登崇霞之臺乃召二人徘徊翔舞殆不自支王以纓縷拂之二人皆舞容冶妖麗靡於鸞翔而歌聲輕颺乃使女伶代唱其曲女伶已詳職官清響流韻雖飄梁動木未足嘉也其舞一名縈塵言其體輕與塵相亂次曰集羽言其婉轉若羽毛之從風末曲曰旋懷言其支體纒曼若入懐袖也宗廟之樂筑刺客傳燕太子丹使荆軻刺秦王既發太子及賔客知其事者皆白衣冠以送之至易水上既祖取道髙漸離擊筑荆軻和而為變徴之聲士皆垂淚涕泣淮南子云荆軻西刺秦王髙漸離宋意為擊筑而謌於易水之上聞者莫不瞑目裂眦髪植穿冠因以此聲為樂而入宗廟許慎注筑曲十二弦七國攷卷七
