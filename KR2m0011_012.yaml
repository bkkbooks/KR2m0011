body:
  text: 七國考卷十二明董説撰秦刑法什伍之法史記秦孝公既用衛鞅鞅欲變法恐天下議已衛鞅曰疑行無名疑事無功且夫有髙人之行者固見非于世有獨知之慮者必見敖于民愚者暗于成事知者見于未萌民不可以慮始而可與樂成論至德者不和于俗成大功者不謀于衆是以聖人茍可以強國不法其故茍可以利民不循其禮孝公曰善甘龍曰不然聖人不易民而教智者不變法而治因民而教不勞而成功緣法而治者吏習而民安之衛鞅曰龍之所言世俗之言也常人安于故俗學者溺于所聞以此兩者居官守法可也非所論于法之外也三代不同禮而王五伯不同法而霸智者作法愚者制焉賢者更禮不肖者拘焉杜摯曰利不百不變法功不十不易器法古無過循禮無邪衛鞅曰治世不一道便國不法古故湯武不循古而王夏殷不易禮而亡反古者不可非而循禮者不足多孝公曰善以衛鞅為左庶長卒定變法之令令民為什伍而相收司連坐不告姦者腰斬告姦者與斬敵首同賞匿姦者與降敵同罰民有二男以上不分異者倍其賦有軍功者各以卒受上爵為私鬪者各以輕重被刑大小僇力本業耕織致粟帛多者復其身事末利及怠而貧者舉以為收孥宗室非有軍功論不得為屬籍明尊卑爵秩等級各以差次名田宅臣妾衣服以家次有功者顯榮無功者雖富無所芬華令既具未布恐民之不信已乃立三丈之木于國都市南門募民有能徙置北門者豫十金民怪之莫敢徙復曰能徙者五十金有一人徙之輒豫五十金以明不欺卒下令謂之什伍之法淮南子商鞅之啔塞許慎注云啓之以令塞之以禁商鞅之術也杜甫詩秦時任商鞅法令如牛毛按連坐者一家有罪什伍皆相連坐罪也至漢文帝元年除收孥諸相坐律令舍人之法商君傳云商君亡欲宿客舍舍人曰商君之法舍人無驗者坐之商君喟然嘆曰嗟乎為法之弊一至此哉棄灰之法鹽鐵論注云衛鞅之法步過六尺者有罰棄灰于道者被刑按韓非子殷之法刑棄灰于道者步過六尺之法詳見棄灰同室之禁通鑑秦孝公十九年令民父子兄弟同室內息者為禁胡三省云息止也秦俗父子兄弟同室居止商鞅始更制禁之堯教民以人倫教之有序有别秦用西戎之俗至于男女無别長幼無序商君令為之禁止古道也烏可以例言之末利之禁秦法事末利及怠而貧者舉以為收孥詳什伍私鬪之禁為私鬪者各以輕重被刑詳什伍殿上之禁刺客傳曰秦法羣臣侍殿上者不得持尺寸之兵諸郎中執兵皆陳殿下非有詔不得上肉刑漢書注衛鞅變法令增加肉刑大辟有鑿顛抽脅鑊烹之刑令之初作一日臨渭論囚刑七百餘人渭水盡赤新序云衛鞅內刻刀鋸之刑外深斧鉞之誅車裂商君傳秦惠王車裂商君其後始皇車裂嫪毐文選注云商鞅車裂李斯腰斬刑轘之辟二人為首陸子謂秦始皇帝設為車裂之刑以斂姦邪非也棄市史記昭襄王五十二年河東守王稽坐與諸侯通棄市注秦法論死于市謂之棄市剖腹桓談云秦惠文王剖賢人之腹刑法大壞鍾離意别傳引周書云秦史趙凱以私恨告國民吳旦生盜食宗廟御桃旦生對曰民不敢食也王曰剖其腹出其桃史記惡而書之曰食桃之肉當有遺核王不知此而剖人之腹以求桃非禮也腰斬不告姦者腰斬詳見什伍之法許氏説文序腰本作要後人加月戮尸始皇初即位遣將成橋擊趙反死屯留軍吏皆斬及戮其尸注已死者戮其尸見史記體解通志刑法略秦體解荆軻體解即支解也梟首始皇初嫪毐作亂敗其徒二十人皆梟首車裂殉滅其宗輕者為鬼薪見史記在并天下之前大辟自大辟至鑊烹并詳肉刑鑿顛一作鑿項抽脅按晉書刑法志云秦文初造參夷始皇加之抽脅誤鑊烹漢書注云鼎大而無足曰鑊以鬻人也囊撲史記茅焦曰陛下有狂悖之行不自知耳車裂假父囊撲二弟注以囊盛其人撲而殺之應劭曰秦自孝公以來有此法也蒺藜説苑秦始皇太后不謹幸郎嫪毐始皇取毐四支車裂之取兩弟撲殺之取太后遷之咸陽宫下令曰以太后事諫者戮而殺之蒺藜其脊諫而死者二十七人茅焦曰陛下車裂假父有嫉妬之心囊撲兩弟有不慈之名遷母咸陽有不孝之行蒺藜諫士有桀紂之治賜死史記昭襄王五十年十二月白起有罪死注謂賜死也清軒筆記云自周以來有大臣之優刑優刑者賜死之類是也士伍史記昭襄王五十年十月武安君有罪為士伍遷隂密如淳曰嘗有爵而以罪奪爵謂之士伍自二級以上有刑罪則貶爵自一級以下有刑罪刖矣黥商君傳秦太子犯法衛鞅刑其傅公子虔黥其師公孫賈又秦法棄灰於道者黥刖詳見士伍如淳注宫列子云孟氏之一子之秦以術干秦王秦王曰當今諸侯力爭所務兵食而已若用仁義治吾國是滅亡之道遂宫而放之劓商君傳商君既變法行之四年公子虔復犯法劓之收孥詳見什伍之法謂收録其妻子沒為奴婢秦法一人罪收其室家鹽鐵論云紂為炮烙之刑而秦有收孥之法沒家秦法降敵者誅其身沒其家見史記注謂沒其一家也三族史記秦文公二十年法初有三族罪武公三年誅三父等而夷三族以其殺出子也漢志秦用商鞅連相坐之法造參夷之誅師古曰參夷夷三族張晏曰父母妻子兄弟如淳曰父族母族妻族又范雎傳云秦之法任人而所任不善者各以其罪罪之應侯罪當收三族秦昭王恐傷應侯之意乃下令國中有敢言鄭安平事者以其罪罪之七族鄒陽獄中上書云荆軻之湛七族應劭曰荆軻為燕刺秦王不成而死其族坐之湛沒劉向曰荆軻刺秦王不中而死秦兵至燕求軻七族一時並殺之也張晏曰七族上至曾祖下至曾孫索隱七族父之姓一也姑之子二也姊妹之子三也女之子四也母之姓五也從子六也及妻父母凡七族也十族韓詩外傳秦攻魏破之少子亡而不得令魏國曰有得公子者賜金千斤匿者罪至十族按書以親九族孔注髙祖玄孫之親釋文上自髙祖下至玄孫凡九族夏侯歐陽等以九族者父族四母族三妻族二皆緣異姓有服左傳隨季梁曰親其九族以致其禋祀注九族謂外祖父外祖母從母子及妻父妻母姑之子姊妹之子女子之子并已之同族皆外親有服者也今秦有十族之法無考滅宗詳見梟首即族也鬼薪詳見梟首取薪給宗廟為鬼薪律曰鬼薪作三歲贖死杜氏通典秦昭襄王與夷人盟傷人者論殺人得以賧錢贖死何承天纂文曰賧蠻夷贖罪貨也賧徒濫反華陽國志作煞人顧死倓錢罰賦荀子注云秦國罰賦余按衛鞅之法民有二男以上不分異者倍其賦疑即罰賦也罰甲韓非子秦昭王有疾百姓里出八牛而家為王禱王曰非法也人罰二甲一作訾其里正與伍老屯二甲屯亦罰也囚史記秦昭王囚孟嘗君欲殺之孔衍春秋后語云秦穆公將兄子三人囚于內宫內宫疑宫中之獄也尸子云秦穆公明于聽獄斷刑曰寡人不敏教不至遷史記衛鞅初下令有言令不便者及刑太子師傅有來言令便者衛鞅曰此皆亂法之人盡遷於邊城昭襄王時白起有罪遷隂密見士伍赦昭襄王二十一年錯攻魏河內魏獻安邑秦出其人募徙河東賜爵徙罪人遷之二十五年拔趙二城二十六年赦罪人遷之二十七年錯攻楚赦罪人遷之二十八年大良造白起攻楚取鄢鄧赦罪人遷之莊襄王元年大赦罪人見史記余讀商子秦之法一刑無等級自卿相將軍以至大夫庶人有不從王令犯國禁亂上制者罪死不赦有功于前有敗于後不為損刑有善于前有過于後不為虧法忠臣孝子有過必以其數斷守職之吏有不行王法者罪死不赦刑及三族真少恩矣至為法令置官吏有敢剟定法令損益一字以上者罪死不赦諸官吏及民有問法令之所謂必于王法之吏各為尺六寸之符明書年月日時所問法令之名以告吏民主法之吏不告及告而非法令所謂也即以吏民之所問法令之罪各罪主法者之吏天子之殿中為法令為禁室有鋌鑰為禁而封之內藏法令一副禁室中封以禁印有擅發禁室中印及入禁室視禁法令及剟一字以上者罪死不赦故桓談曰秦之重法猶盛三代之重禮樂也初衛鞅學于李悝其嚴刑峻法皆李悝之教語在魏刑法考中史記云商鞅凌轢公族傷殘百姓趙良曰君之出也后車載甲多力而駢脅者為驂乘持矛而撡闒戟旁車而趨此一物不具君固不出君之危若朝露而尚貪商於寵秦政畜百姓之怨田齊刑法錦繡之禁瑣語云齊威王時國中大靡民不衣布于是威王造錦繡之禁罪若誹謗王矣麋鹿之禁孟子曰臣始至于境問國之大禁然後敢入臣聞郊關之內有囿方四十里殺其麋鹿者如殺人之罪烹吕氏春秋齊王疾痛使人迎文摯至視王疾謂太子曰非怒王則疾不可治王怒則摯必死太子頓首強請曰茍已王疾臣與母以死爭之願先生勿患也摯曰諾與太子期而至將往不當者三齊王固已怒矣摯至不解履登牀問疾王怒不與言摯因出固辭以重怒王吐而起疾乃遂已王大怒不恱將烹摯太子與王左右急爭之不得果以鼎烹摯㸑之三日三夜顔色不變摯曰誠欲殺我則胡不覆之以絶隂陽之氣王使覆之乃死又史記威王召阿大夫語曰自子之守阿譽言日聞然使使視阿田野不闢貧民日多是子以幣厚我左右以求譽也是日烹阿大夫及左右嘗譽者皆并烹之釋名曰煮之於鑊曰烹若烹禽獸之肉也又齊威王設大鼎于庭中烹無鹽令見淮南子殺史記威王三十三年殺其大夫牟辛徐廣曰一作夫人又湣王時齊孫室子陳舉直言殺之東閭斫國䇿齊負郭之民有孤狐咺者正議閔王斫之檀衢百姓不附車裂孔叢子云齊王行車裂之刑羣臣諫爭之弗聽子髙見齊王曰車裂之刑無道之刑也而君行之臣竊以為下吏之過也王曰謹聞命遂除車裂又蘇秦傳云齊大夫多與蘇秦爭寵者使人刺蘇秦不死殊而走齊王使人求賊不得蘇秦且死乃謂齊王曰臣即死車裂臣以徇于市曰蘇秦為燕作亂于齊如此則臣之賊必得矣于是如其言刖韓子注齊刖罪人使守門也金刀桓談論齊宣王行金刀之法余按國語云齊桓公重罪贖以犀甲一戟輕罪贖以鞼盾一戟小罪謫以金刀宥間罪索訟者三禁而不可上下坐成以束矢美金以鑄劍戟試諸狗馬惡金以鑄鉏夷斤欘試諸囊土是金刀之法或即劍戟贖罪之意也楚刑法雞次之典國䇿吳與楚戰于柏舉蒙榖奔入大宫負雞次之典逃于雲夢之中昭王反郢蒙榖獻典而楚國大治劉向别録曰楚法書曰雞次之典或曰離次之典離次者朱度之謂也秦滅楚書遂亡矣憲令史記楚懷王使屈平為憲令藁草未定上官大夫欲見奪之不與乃讒曰平為令衆莫不知王怒疏平憲令者法令也將遁之法淮南子楚法兵相戰而將遁者誅若不及誅而死乃為桐棺三寸加斧鑕其上以徇于國僕區之法左傳楚文王作僕區刑書名僕隱也區匿也作為隱匿亡人之法茅門之法韓子楚莊王有茅門者法曰羣公大夫諸公子入朝馬蹄蹂霤者斬其輈而戮其御太子入朝馬蹄蹂霤廷理斬其輈而戮其御僇戮史記靈王會兵于申僇越大夫常夀過殺蔡大夫觀起索隱曰僇辱刑也與戮異戮見茅門法枝解韓非子吳起收泣于岸門痛西河之為秦卒枝解于楚漢注云枝解截其四肢也轘左傳楚子為陳夏氏亂故伐陳謂陳人無動將討于少西氏遂入陳殺夏徴舒轘諸栗門杜預曰轘車裂也又淮南子云吳起刻削而車裂然吳起本枝解非車裂也淮南以吳起枝解于楚作車裂而以商鞅車裂于秦作支解烹説苑楚莊王大怒解揚將烹之左傳楚白公為亂既死其徒徴之生拘石乞而問白公之死焉乞曰此事也克則為卿不克則烹固其所也何害乃烹石乞貫耳左傳楚子將圍宋使子文治兵于暌終朝而畢不戮一人子玉復治兵于蒍終日而畢鞭七人貫三人耳鞭詳見貫耳笞笞王説苑荆文王得如黃之狗箘簬之矰以畋于雲夢三月不反得舟之姬淫期年不聽朝保申諫曰先王卜以臣為保吉今王之罪當笞匍伏將笞王王曰不榖免于襁褓託于諸侯矣願請變更而無笞保申諫曰君王不受笞是廢先王之命也王曰敬諾乃席王王伏保申束細荆五十跪而加之背如此者再謂王起矣王曰有笞之名一也遂致之細荆一作細箭保申吕氏春秋作葆申余按楚失刑矣夫君治人非治於人者也為保申者可諫諫不可可去從古及今未聞有笞君之臣與受笞之君也周公相成王成王有過則撻伯禽豈敢撻成王哉墨墨盜昭七年楚芋尹無宇曰吾先君文王作僕區之法曰盜所隱器與盜同罪所以封汝也劉向孟子注曰楚文王墨小盜而國不拾遺不宵行周官墨刑罰五百鄭言先刻面以墨窒之窒墨者使守門尚書刑德考曰涿鹿者鑿人顙也黥人者馬羈窄人面也鄭注云涿鹿黥世謂之刀墨之民劓國䇿魏王遺楚王美人説之鄭褎妬之因説新人曰王愛子美矣雖然子為見王則必掩子鼻新人見王因掩其鼻王問鄭褎鄭褎曰其似惡聞王之臭也王曰悍哉令劓之王充論衡所謂鄭褎劓之者也又左傳公子以為王使觀從從師于乾溪而遂告之且曰先歸復所後者劓注劓截鼻也則韓子曰楚人和氏得璞玉于楚山之中獻之武王武王使玉人相之曰石也王以和為謾刖其左足及文王即位又奉其璞玉又使玉人相之又曰石也文王刖其右足又鬻拳自刖詳見職官宫左傳楚子曰吾以韓起為閽以羊舌肸為司宫注加宫刑使司宫也梏左傳楚公子元歸自伐鄭而處于王宫鬪射師諫則執而梏之注足梏曰桎手曰梏囚史記楚平王以費無極之讒囚伍奢又懷王囚張儀冥室櫝棺秦詛楚文云楚王暴虐不辜戮孕婦幽刺親戚拘圉其叔父置諸冥室櫝棺之中余按戮孕婦則桀紂故事冥室櫝棺楚法之極創者也棄市亢倉子楚平王棄左右近習三人于市入宅國策郢人有獄三年不決者故令人請其宅以卜其罪注有罪則宅入官故可請卜測知之也滅家國䇿春申君不聽朱英及考烈王崩李園先入置死士止于棘門之內夾制刺春申君斬其頭投之棘門之外于是楚使吏盡滅春申君之家夷宗通鑑楚悼王薨貴戚大臣作亂攻吳起起走之王尸而伏之擊起之徒因射刺起并中王尸既葬肅王即位使令尹盡誅為亂者坐起夷宗者七十餘家胡三省注夷殺也夷宗夷其同宗也三族楚法麗兵于王尸者盡加重罪建三族見應劭漢注錮左傳楚共王即位將為陽橋之役使屈巫聘于齊且告師期巫臣盡室以行遂奔晉晉人使為邢大夫子反請以重幣錮之注禁錮勿令仕趙刑法國律張斐律序云鄭鑄刑書晉作執秩趙制國律楚造僕區兹述法律之名申韓之徒各自立制夷通鑑公子章之敗也往走主父主父開之成兊因圍主父公子章死成兊謀曰以章故圍主父即解兵吾屬夷矣乃遂夷之令宫中人後出者夷沈説苑趙簡子與欒激遊將沈于河曰吾嘗好聲色矣而欒激致之吾嘗好宫室臺榭矣而欒激為之吾嘗好良馬善御矣而欒激求之今吾好士六年矣而欒激未嘗進一人是進吾過而黜吾善也刑徒山西太原府志三角城在太原縣治西北一名徒人城舊志云趙襄子所築以處刑徒其城三面故名三角收家列女傳趙之法以城叛者身死家收下獄趙下尹史于獄詳見災異考大赦惠文王三年主父自代道大通還歸行賞大赦見趙世家魏刑法大府之憲國䇿安陵君曰吾先君成侯受詔襄王以守此地也手受大府之憲憲之上篇曰子弒父臣弒君有常刑國雖大赦降城亡守不得與焉按此是李悝以前魏國相仍之法又淮南子云惠子為惠王為國法已成而示之諸先生先生皆善之奏之惠王惠王甚説之以示翟璜曰善可行乎翟璜曰不可惠王曰善而不可行何也翟璜對曰今夫舉大木者前呼邪許後必應之此舉重勸力之歌也豈無鄭衛激楚之音哉然而不用者不若是其宜也法經桓談新書魏文侯師李悝著法經以為王者之政莫急于盜賊故其律始于盜賊盜賊劾捕故著囚捕二篇其輕狡越城博戲假借不亷淫侈踰制為雜律一篇又以具律具其加減所著六篇而已衛鞅受之入相于秦是以秦魏二國深文峻法相近正律略曰殺人者誅籍其家及其妻氏殺二人及其母氏大盜戍為守卒重則誅窺宫者臏拾遺者刖曰為盜心焉其雜律略曰夫有一妻二妾其刑􅼪夫有二妻則誅妻有外夫則宫曰淫禁盜符者誅籍其家盜璽者誅議國法令者誅一作法禁籍其家及其妻氏曰狡禁越城一人則誅自十人以上夷其鄉及族曰城禁博戲罰金三市太子博戲則笞不止則特笞不止則更立曰嬉禁羣相居一日以上則問三日四日五日則誅曰徒禁丞相受金左右伏誅犀首以下受金則誅金自鎰以下罰不誅也曰金禁大夫之家有侯物自一以上者族其減律略曰罪人年十五以下罪髙三減罪卑一減年六十以上小罪情減大罪理減武侯以下守為魏法矣唐長孫無忌律疏序云周衰刑重戰國異制魏文侯師于李悝集諸國刑典造法經六篇一盜賊二贓法三囚法四捕請法五雜法六具法商鞅傳授改法經為律漢相蕭何更加李悝所造户輿廄三篇謂之九章之律淫禁狡禁嬉禁徒禁金禁詳見法經囚捕自囚捕至及母氏並詳法經誅左右伏誅余按左右伏誅者刑不上丞相故誅左右蔡雍所謂秦漢已前有恥辱之刑是也又受金罪薄故僅用辱刑耳臏應劭曰臏截足也刖應劭曰刖斬趾也􅼪古無􅼪刑疑即腐刑也又按斷耳曰聝耳月相近或傳寫之誤世俗寄猳者事露即割其耳豈亦魏法之遺乎宫尚書刑德考云宫者女子執置宫中不得出也周刑一曰墨二曰劓三曰剕四曰宫五曰大辟五刑之法疏謂宫刑至隋乃赦崔浩漢律序文帝除肉刑而宫不易書正義隋開皇之初始除宫刑按通鑑西魏大統十三年三月除宫刑非隋也又按蔡質云宫刑者男子腐女子幽閉戍應劭曰屯戍古之遷刑也笞特笞特笞不可解疑重笞也罰金秦亦有罰甲罰賦之法即籍家族族滅宗也又國䇿云魏王與龍陽君共船而釣龍陽君得十餘魚而涕下于是魏王布令于四境之內有敢言美人者族夷鄉夷鄉之法他國無有果行魏酷于秦矣及妻氏及母氏妻氏母氏猶言妻族母族也以上載法經烹説苑魏文侯時師經鼓琴魏文侯起舞賦曰使我言而無見違師經援琴而撞文侯不中中旒潰之文侯謂左右曰為人臣而撞其君其罪如何左右曰罪當烹暴尸魏法戰而怯守而降暴其尸于市詳見兵制考又惠王軍兵法有全伍全付之誅不重録黥孫吳列傳龎涓恐孫臏賢于已疾之則以法刑斷其兩足而黥之按斷兩足即臏也故司馬遷傳云孫子臏腳抱朴子李斯之誅韓非龎涓之刖孫臏又作則流東荒桓談新書魏之令不孝弟者流之東荒丹巾漆領班固答人書昔者戰國之時大梁之法得罪小者别以丹巾漆其領有畫衣冠之心射訟附韓子云李悝為魏文侯上地之守而欲民之善射也乃下令曰民之有狐疑之訟者令人射的中之者勝不中者不勝令下而民皆疾習射日夜不休及與秦人戰大敗之以民之善射故也余按古五刑之禁決關梁踰城郭而略盜者其刑臏男女不以義交者其刑宫觸易君命革輿服制度姦軌盜攘傷人者其刑劓非事而事之出入不以道義而誦不祥之辭者其刑墨降畔冦賊劫略奪攘矯虔者其刑死悝之法經何其深也衛鞅既不用于魏挾法入秦定刑令什伍連坐匿姦同罰為私鬪則被刑怠耕織則收孥較魏法經先後一轍作俑無後悝不免矣魏之法經曰大夫之家有侯物自一以上者族惠王嘗乘夏車建九斿諸侯不得姦天子猶大夫不得姦諸侯防已極疏繩人徒急吾恐惠王之世國法不行矣海濱筆乘云李悝弟子衛鞅得其師書行秦政而伯天下韓刑法刑符劉臻孟子注引韓昭侯刑符曰一罪謂之犯二罪謂之干三罪大逆曰凶人按論衡云韓用申不害行其三符兵不侵境蓋十五年其後不能用之又不察其書兵挫軍破國并于秦昭侯刑符者即申不害三符之一也史記云申不害者京人也故鄭之賤臣學術以干韓昭侯昭侯用為相內修政外應諸侯十五年終申子之身國治兵強無侵韓者申子之學本于黃老而主刑名著書二篇號曰申子劉向别録云今民間所有上下二篇中書六篇皆合二篇已備過太史公所記也阮孝緒七略云申子三卷新序云申子之書言人主當執術以督責臣下其責深刻故號曰術商鞅所為書號曰法王應麟通鑑或問云秦之李斯阿二世以求容其書引申子曰有天下而不恣睢命之曰以天下為桎梏于是行督責嚴一言喪邦秦之亡也忽焉韓非子定法問者曰申不害公孫鞅此二家之言孰急于國應之曰是不可程也人不食十日則死大寒之隆不衣然亦死謂之衣食孰急于人則不可一無也皆養生之具也今申不害言術而公孫鞅為法術者因任而授官循名而責實􅍾生殺之柄課羣臣之能者也此人主之所執也法者憲令著于官府刑罰必于民心賞存乎慎法而罰加乎姦令者也此臣之所師也又曰申不害韓昭侯之佐也韓者晉之别國也晉之故法未盡而韓之新法又生先君之令未收而後君之令又下申不害不擅其法不一其憲令則姦多故利在故法前令則道利在新法後令則道之利在故新相及前後相悖則申不害雖十使昭侯用術而姦臣猶有所譎其辭矣故託萬乘之徑韓七十年而不至于霸王者雖用術于上法不勤飾于官之患也公孫鞅之治秦也設告相坐而責其實連什伍而同其罪賞厚而信刑重而必是以其民用力勞而不休逐敵危而不却故其國冨而兵強然而無術以知姦則以其冨強也資人臣而已矣及孝公商君死惠王即位甘茂以秦循國周武王死昭襄王即位穰侯越韓魏而東攻齊五年而秦不益尺寸之地乃城其陶邑之封應侯攻韓八年城其汝南之封自是以來諸用秦者皆應穰之類也故戰勝則大臣尊益法則私封立主無術以知姦也商君雖十飾其法人臣反用其資故乘強秦之資數十年而不至于帝王者法雖勤飾于官主無術于上之患也又曰申子未盡于法也申子言治不踰官雖知弗言治不踰官謂之守職可也知而弗言是謂過也人主以一國目視故視莫明焉以一國耳聽故聽莫聰焉今知而弗言則人主安用假借矣殺琴操云聶政父為韓冶劍過期不成王殺之囚吕氏春秋云韓氏城期十五日而成段喬為司空有一縣後一日段喬執其吏而囚之余按他國皆有酷刑如秦剖腹鑿顛車裂鑊烹齊斫燕刳腹趙魏收孥夷鄉楚櫝棺枝解最為竒慘韓獨無考聽訟韓王有聽訟觀臺詳宫室燕刑法截應劭漢書注引田光謂燕太子丹曰今燕國之法欺上罔國者截截謂腰斬也刳腹劉歆七略云戰國之世刑法深苦秦立鑿顛燕設刳腹余按國䇿張丑謂燕境吏曰我言子之奪我珠而吞之燕王必當殺子刳子之腹歆之説豈據是耶斬通鑑樂毅圍齊二邑三年而猶未下或讒之于燕昭王昭王于是置酒髙會引言者而讓之曰汝何敢言若此乃斬之繫獄淮南子鄒衍事燕惠王盡忠左右譛之王繫之獄七國考卷十二
