body:
  text: 七國考卷十四明董說撰秦瑣徴霸水水經注霸者水上地名也古曰滋水矣秦穆公霸世更名滋水為霸水以顯霸功秦䜟趙世家趙簡子疾五日不知人大夫皆懼醫扁鵲視之出董安于問扁鵲曰血脉治也而何怪在昔秦穆公嘗如此七日而寤寤之日告公孫支與子輿曰我之帝所甚樂吾所以久者適有學也帝告我晋國將大亂五世不安其後將霸未老而死霸者之子且令而國男子無别公孫支書而藏之秦䜟於是乎出矣封禪書云秦繆立病卧五日不寤寤乃言夢見上帝上帝命繆公平晋亂史書而記藏之府而後世皆曰秦繆公上天小咸陽揚雄云秦使張儀作小咸陽於蜀按郡國志秦惠王二十七年使張儀築城以象咸陽沃野千里號曰陸海所謂小咸陽也為市秦别紀秦獻公七年初行為市狗堡三秦記麗山西有白鹿原原上有狗堡秦襄公時有大狗來下有賊則狗吠之故一堡無患馬城搜神記昔秦人築城於武周塞內以偹胡將成而崩者數矣有馬馳走周旋反覆父老異之因依馬跡築城城乃不崩遂以名焉龜城寰宇記初張儀築成都城城屢壞不能立忽有大龜周旋行走巫言依龜行處築之城乃得立遂名浮橋春秋后傳周赧王五十年秦作浮橋於河機發橋燕丹子秦王為機發之橋欲陷丹上計史記秦昭王召王稽拜為河東守三年嵗不上計檄楚書文心雕龍曰檄者皎也宣布於外皎然明白張儀檄楚書以尺一明白之文秦紀列國紀聞秦史曰紀余按司馬遷本紀之名蓋因秦舊博箭韓子秦昭王使工人施鈎梯上華山以松柏之心為博箭長八尺棊長八寸勒之曰昭王嘗與天神博於此鈎梯詳上博箭沐世本云秦穆公作沐輕粉秦穆公作輕粉見物原蕭史與秦穆公鍊飛雪丹苐一轉與㺯玉塗之今之水銀膩粉是也見古今注男子書年始皇本紀十六年初令男子書年斗桶權衡丈尺秦孝公十九年商鞅平斗桶權衡丈尺白玉虎太平御覽始皇二年騫霄國獻善畫之工刻白玉為兩虎削玉為毛如真矣不㸃兩目睛始皇㸃之即飛去明年南郡有獻白虎二頭始皇使視之乃是先刻玉者始命去目睛二虎不復能去事見拾遺記石牛蜀王本紀秦惠王欲伐蜀乃刻五石牛置金其後蜀人見之以為牛能大便金蜀王即發卒千人使五丁力士拖牛成道致三枚於城郭蜀道得通三牛力也後遣丞相張儀等將兵隨石牛道伐蜀焉石犀華陽國志秦李氷為蜀守作石犀五頭以厭水精詳見河渠杜甫詩君不見秦時蜀太守刻石立作三犀牛志云五犀其說不同田齊瑣徴棧道國策田單為棧道木閣迎齊王與后於城陽山中王伯厚云據此非但蜀有棧道也管仲之後傅子云昔田氏有齊而管仲之後去之或適魯或適楚漢興有管少卿為燕令始家朱虛世有名節九世而生管寧轂擊蘇秦稱臨淄之中車轂擊以為盛樂府注云齊人本好轂擊相犯以為樂也蓋其俗云鬭雞走狗六博踏踘蘇秦說齊云臨菑甚冨而實其民無不吹竽鼓瑟擊筑彈琴鬭雞走狗六博踏踘以牛釁鐘孟子引胡齕曰王坐於堂上有牽牛而過堂下者王問曰牛何之對曰將以釁鐘陳祥道曰古之用釁者多矣若天府釁寶鎮及寶器小子釁邦器及軍器龜人釁龜圉人釁廄以至社稷五祀與夫師行之主藏約之户或釁於始成或釁於將用其禮豈一端哉然釁有司行事而君不親犬羊為牲而牛馬不預有司爵辨而不冕牲駹而不純則釁之為禮也小矣後世有以牛釁鐘而甚者叩人鼻以衈社此先王之所棄也楚瑣徴典籍王子朝以典籍奔楚見左傳困學紀聞曰周之大寶河圖大訓列焉易象在魯三墳五典在楚周不能有寶矣然而老𣆀之禮萇𢎞之樂文獻猶存及王子朝之奔楚於是觀射父倚相皆誦古訓以華其國以得典籍故也營丘九頭圖盛𢎞之荆州記云衡山南有南正重黎墓也楚靈王時山崩毁其墳得營丘九頭圖焉離騷楚語伍舉曰德義不行則邇者騷離而逺者距違注騷愁也離畔也伍舉所謂騷離屈平所謂離騷皆楚言也揚雄為畔牢愁與楚語注合檮杌列國記聞云楚史曰檮杌亦曰書曰志曰記檮杌獸名或曰木也湘東紀聞云檮杌之獸能逆知未來故人有掩捕輒逃匿史以示往知來故名檮杌夏州左傳楚子為陳夏氏亂伐陳鄉取一人焉以歸謂之夏州縣楚滅陳為縣見史記縣名始此非始於秦也金陵立齊閒録云金陵即今南京戰國楚威王時以其地有王氣埋金以鎮之故名霸山春秋說文云楚武王獵山自名霸山一統志武王山在棗陽縣東楚武王獵於此又名霸山玉米田書舊云歸州有玉米田屈原耕於此産白米如玉楚人遂名其田曰玉米又見屈原外傳競渡隋書志屈原以五月望日赴汨羅土人追至洞庭不見湖大船小莫得濟者乃歌曰何由得渡河因雨鼓櫂爭歸競㑹亭上習以相傳為競渡之戲牽鈎隋書志楚又有牽鈎之戲云從講武所出楚將伐吳以為教戰流遷不改習以相傳鈎初發動皆有鼓節羣噪歌謡振驚遠近俗云以此厭勝致豐穰角抵漢武故事云內庭常設角抵戲角抵者六國時人所造也或曰角抵楚人造竹卜楚辭索瓊茅以筳篿兮王逸注楚人名結草折竹卜曰篿筳荆楚嵗時記曰秋分以牲祠社擲茭於社神以占來嵗豐歉或折竹以卜包茅左傳包茅不貢盛𢎞之荆州記曰零陵郡有香茅桓公所以責楚榖梁作菁茅也畫羊懸榖廣州記曰州㕔梁上畫五羊又作五榖囊隨羊懸之云昔髙固為楚相五羊銜榖萃於楚庭故圖其象為瑞六國時廣州屬楚雞駭犀國策楚王獻雞駭之犀夜光之璧於秦王抱朴子云通天犀中有一白理如線置米其上以飼雞雞見之驚故名雞駭犀夜光璧詳上明月珠魯連子云楚之明月出蚌蜃和氏璧楚惠文王時得和氏璧見史記白珩趙襄子問王孫圉曰楚之白珩猶在乎見國語方府金見莊辛說楚襄王注云方府之金四方所貢之金也黃金珠璣犀象國策楚王曰黃金珠璣犀象出於楚寡人無求於晋國朱鷺詩疏義楚成王時有朱鷺合沓飛翔而來舞舊鼓吹朱鷺曲是也茹黃狗吕覽荆文王得茹黃之狗說苑作如黃鐵腸兔異苑云楚王與羣臣獵於雲夢縱良犬逐狡兔三日而獲之其腸似鐵良工曰可以為劍文繡馬史記楚莊王有愛馬衣以文繡康王谷青藤山人路史云世傳始皇并吞六國楚康王避難谷中名康王谷在匡廬山亦見一統志采菱城一統志采菱城在桃源縣東北二十五里其湖産菱肉厚味甘楚平嘗采之趙瑣徴摩笄之山趙襄子擊殺代王其姊聞之泣而呼天摩笄自殺故趙氏有摩笄之山詳見音樂按今鎮江府城西南五里亦有摩笄山志云劉宋戴顒女于此摩笄誓不適人因名米山一統志米山在山西澤州髙平縣東一十里趙將亷頗積米於此俗呼大糧山夫人城郡國志洛州夫人城即趙武靈王夫人築也潘吾刻迹韓子趙主父令工施鈎梯而緣潘吾刻踈人迹其上廣三尺長五尺而勒之曰主父常游於此潘吾山名正旦放生孔叢子邯鄲之民以正月之旦獻雀於趙王而綴之以五絲王大悅申叔以告子順曰王何以為也對曰正旦放之示有生也魏瑣徴徑寸珠史記齊威王二十四年與魏王㑹田於郊魏王問曰王亦有寶乎威王曰無有梁王曰若寡人國小也尚有徑寸之珠照車前後各十二乘者十枚夜光璧鄒陽書曰白圭顯於中山中山人疑之魏文侯投以夜光之璧君臣相博史記信陵君與魏王博樂羊城郡國志定州博陵縣樂羊城魏文侯使樂羊取中山造上計韓子西門豹為鄴令居期年上計新序魏文侯時東陽上計錢布十倍上計者上其計簿木鵰異苑魏安釐王觀翔鵰而樂之曰寡人得如鵰之飛視天下如芥也吳客有隱游者聞之作木鵰而獻之王王曰此有形無用者也召隱游欲加刑焉隱游曰臣請為大王翔之乃取而騎焉遂翻然飛去莫知所之韓瑣徴氷井湖南志氷井在開封府延津縣西南二十里世傳韓襄王藏氷之處韓王之爻古今萬物史魏時鑿土得尺鐵刻云韓王之爻不知爻為何物或云古大事必卜六爻已奠刻而記之疑亦影說姑附於此燕瑣徴三九之數王應麟曰燕三九之數書不傳五位之卦應劭曰燕昭王作五位之卦是曰燕易蠡卜春秋后語曰蘇秦事鬼谷學終辭歸道乏因行以燕人蠡卜傳說自給黍谷劉向别録曰鄒子在燕燕有黍谷地美而寒不生五榖鄒子居之吹律而溫氣至今名黍谷龍膏燈拾遺記燕昭王二年海人乘霞舟以雕壺盛數斗膏以獻昭王王坐通雲之堂以龍膏為燈光耀百里烟色丹紫國人望之咸言瑞光世人遙拜之燈以火浣布為纒荃蕪香燕昭王散荃蕪之香見拾遺記銷暑招凉珠拾遺記昭王時有國獻珠於昭王王取瑶漳之水洗其沙泥乃嗟歎曰自懸日月以來見黑蚌生珠已八九十遇此千嵗一生珠也珠漸輕細昭王常懷此珠當隆暑之月體自清凉號曰銷暑招凉之珠也恆春樹拾遺記燕昭王通霞臺左右種恆春之樹葉如蓮花芬芳似桂花隨四時明真里拾遺記昭王徹色减味居乎正寢賜甘需羽衣一襲表其墟為明真里也七國考卷十四
