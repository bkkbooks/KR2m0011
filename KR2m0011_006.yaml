body:
  text: 七國考卷六明董說撰秦羣禮改元更元史記秦惠文王十四年更為元年又十四年而卒先是魏惠王三十六年改稱元年后十一年而秦惠王復改元按周文王改元矣尚書運期授注云周文王以戊午蔀二十九年受命受命之月已是季秋至明年乃改元書序云惟十有二年武王伐殷注云本文王受命而數之是年入戊午蔀四十嵗矣以歷考之入戊午蔀二十九年嵗在戊午其年殷九月二十五日得甲子明年乃改元則元年嵗在己未是得赤雀之命后年改元之驗也武成正義云文王斷虞芮之訟諸侯歸之改稱元年王應麟曰諸侯自于其國各稱元年是已之所稱容或中年得改正朔閏月秦别紀宣公初志閏月咸陽記云宣公閏月天時定矣獻公為市人志和矣十月為嵗首秦紀昭王四十二年先書十月次書九月四十八年先書十月次書正月五十年先書十月次書十二月次書二月吕不韋春秋季秋紀亦書合諸侯制百縣為來嵗受朔日與諸侯所稅於民輕重之法則自昭王以來用十月為嵗首久矣特始皇定為制耳朝㑹設九賔史記趙使相如獻璧於秦謂秦王曰和氏璧天下所共傳寶也趙王恐不敢不獻趙王送璧時齊戒五日今大王亦宜齊戒五日設九賔於廷臣乃敢上璧秦王齊五日後乃設九賔於廷韋昭曰九賔即周禮九儀索隱曰周禮大行人别九賔謂九服之賔客也列士傳云設九牢也劉伯莊云九賔者周王大偹之禮天子臨軒九服同㑹秦何得有九賔但亦陳設車輅文物耳又荆軻獻督亢之地圖秦王聞之大喜乃朝服設九賔朝天子孝公二十年使公子少官率師㑹諸侯逄澤朝天子來朝史記惠文君元年楚韓趙蜀人來朝三年韓魏太子來朝武王四年魏太子來朝昭襄王五年魏王來朝應亭十年楚懷王入朝秦秦留之十七年城陽君入朝及東周君來朝二十九年周君來五十三年天下來賔韓王入韓魏委國聽令凡七國朝㑹聘享燕饗貢獻見諸傳紀者不可勝述每存一二附於群禮蓋余非為記事之書也聘享通聘享之禮秦襄公以兵送周平王平王封襄公為諸侯賜之岐以西之地曰戎無道侵奪我岐豐之地秦能攻逐戎即有其地與誓封爵之襄公於是始國與諸侯通使聘享之禮遺女樂繆公以女樂二八遺戎王戎王受而說之終年不還抱撲子云秦惠王以美女五人與蜀王歸禭左傳秦人來歸僖公之禭禮也杜預曰秦慕諸夏欲通敬於魯因有翟泉之盟故追贈僖公并及成風本非魯方嶽同盟無相赴弔之制故不訊其後而以接好為禮朝賀天子賀繆公三十七年秦用由余謀伐戎王益國十二開地千里遂伯西戎天子使召公過賀繆公以金鼓孝公二年天子致胙十九年天子致伯惠文王二年天子賀四年天子致文武胙諸侯賀孝公二十年諸侯畢賀以鴈賀說苑秦繆公得百里奚公孫友歸取鴈以賀冠禮王冠惠文三年王冠昭襄王三年王冠昏禮嫁女弟襄公元年以女弟繆嬴為豐王妻或曰周無豐王閟本作幽王蓋幽豐字相近而又適其時作幽似矣然以余推之果為幽王所娶當云以女弟繆嬴為幽王后妻字無義此是戎狄之君僣稱王號耳且幽王娶申后豈得有繆嬴耶嫁宗女繆公十五年晋使太子圉為質於秦秦妻子圉以宗女再嫁宗女繆公二十三年晋惠公卒子圉立為君秦怨圉亡去乃迎晋公子重耳於楚而妻以故子圉妻蠻夷尚女後漢書云秦惠王并巴中以巴氏為蠻夷君長世代尚秦女其人爵比不更有罪得以爵除宗室軍功屬籍秦法宗室非有軍功不得為屬籍見史記貢獻獻夜光之璧國策張儀為秦破從連衡說楚王楚王遣車乘獻夜光之璧於秦王獻長人蜀王本紀秦昭襄王時宕渠郡獻長人二十五丈六尺燕饗饋七牢繆公生得晋君既而與盟許歸之更舍上舍而饋之七牢賈逵曰諸侯雍餼七牢牛一羊一豕一為一牢也賞賜賜食物范雎傳秦昭王下令國中有敢言鄭安平事者以其罪罪之而加賜相國應侯食物日益厚以順適其意賜田宅樗甘傳秦封甘羅為上卿復以始甘茂田宅賜之賜爵史記秦王聞趙食道絶王自之河內賜民爵各一級諡法稱號附君諡莊秦仲子以伐西戎為大夫諡莊公秦自柏翳始封歷非子秦侯公伯秦仲皆無諡至莊公始諡襄莊公子以禦戎封為侯遂諡襄公文襄公子諡文公寧文公孫諡寧公武寧公長子諡武公戰國惠文君子諡武王一曰諡悼武德武子弟諡德公宣德公子諡宣公成宣公弟諡成公穆成公弟任好諡穆公康任好子罃諡康公共罃子和諡共公桓和子罃諡桓公景罃子后諡景公哀后子諡哀公惠哀公孫諡惠公簡公子諡惠公悼惠公子諡悼公厲共悼公子諡厲共公躁厲共公子諡躁公懷躁公弟被圍自殺諡懷公靈懷公孫諡靈公簡懷公子名悼子諡簡公索隱曰簡公懷公子靈公季父始皇本紀云靈公生簡公誤也獻靈公子師隰諡獻公孝獻公子渠梁諡孝公惠文孝公子諡惠文正名駟昭襄武王弟稷諡昭襄王孝文昭襄王子柱諡孝文王莊襄孝文王子楚諡莊襄王其子政立為始皇帝除諡法后諡穆秦穆公夫人諡穆姬史記作繆王圻曰穆姬晋女也在晋曰伯姬伯為長女也在秦曰穆姬從夫之諡也嫁於小國則不從夫之諡如紀伯姬郯伯姬潞伯姬是也次國亦不從夫之諡如文姜聲姜出姜齊姜是也其有叔姬者各據本國次序也五經通義曰婦人以隨從為義夫貴於朝婦貴於室故得蒙夫之諡又曰夫人無爵故無諡太子諡竫文公太子諡竫公夷哀公太子諡夷昭懷公太子諡昭悼昭襄太子諡悼杜佑曰周制士冠禮云天子之元子士也士無諡故知太子無諡王圻曰太子無所施行不得設諡無諡出子宣公少子被弒號出子無惠公子被弒號出子應劭曰秦之出子諡之號也按通鑑作出公胡三省云出非諡也以其失國出死故曰出子仲秦風車粼美秦仲也孔氏曰秦仲以號配國者附庸未得爵命無諡可稱公莊公襄公文公寧公德公文公宣公成公穆公康公共公桓公景公哀公惠公悼公厲共公躁公懷公靈公簡公獻公孝公王惠文王昭襄王孝文王莊襄王帝秦昭王十九年齊王為東帝秦昭王為西帝二月復去帝為王君應劭云秦惠文王初稱君後稱王太后事物考云秦昭王母芉氏號宣太后太后之號始於此也田齊羣禮朝㑹朝天子通鑑周烈王六年齊威王來朝是時周室微弱諸侯莫朝而齊獨朝之天下以此益賢威王朝秦史記齊王建二十八年王入朝秦秦王政置酒咸陽來朝宣王二年三晋之王皆因田嬰朝齊王於博望關而去湣王三十八年西侵三晋欲以并周室為天子泗上諸侯鄒魯之君皆稱臣來朝昏禮迎婦湣王四年迎婦於秦納后山東志齊閔王出遊東郭百姓盡觀宿瘤采桑如故王問而賢之將載後車女曰貞女一禮不偹雖死不從於是使使者加金百鎰往聘迎之以宿瘤為后又鍾離春齊無鹽邑之女齊宣王之后也醜嫁不售宣王聞其賢納以為后燕饗太牢顔斶與齊王游食必太牢出必乘車貢獻獻玉珥韓子薛公相齊威王夫人死中有十孺子皆貴於王於是為十玉珥而美其一獻之王以賜十孺子明日視美珥之所在而勸王以為夫人獻鵠魏文侯使舍人毋擇獻鵠於齊見說苑賞賜賜車劍國策齊王逐孟嘗君梁王虛上位遣使者黃金百斤車百乘往聘孟嘗君孟嘗君不往也齊王聞之君臣恐懼遣太傅齎黃金千斤文車二駟服劍一封書謝孟嘗君賜牛酒史記田單為齊相解裘衣寒者王欲因以為已善乃賜單牛酒嘉其行賜第宣王喜文學游說之士自如騶衍淳于髠田駢接豫慎到環淵之徒七十六人皆賜列第為上大夫威王三賞國策齊威王下令羣臣能面刺寡人者受上賞上書諫寡人者受中賞能謗譏寡人於市朝聞寡人之耳者受下賞諡法君諡桓齊侯田和莊子之子號太公和子午諡桓公威午子因齊僣稱王諡威王宣因齊子辟疆諡宣王湣辟疆子地諡湣王一作閔襄地子法章諡襄王法章子建滅於秦無諡也按戰國無臣諡或者以威王少子田嬰諡靖郭君嬰子田文諡孟嘗君失其實矣馮歡曰孟嘗君客我死而后諡生而稱之乎獨怪王圻續文獻通考靖郭孟嘗並載諡法又不能張正義之是折索隱之非兩存抵牾之說何無主之甚也右諡法子文子桓子武子成子襄子莊子公莊子子田和號田太公田齊未嘗稱侯王威王二十六年稱王宣王湣王襄王王建余按齊威王二十六年周顯王十六年蓋田齊最先王韓宣惠王十一年周顯王四十七年趙武靈王元年周顯王四十四年燕易王元年周顯王三十七年魏襄王元年周顯王三十五年秦惠文王元年周顯王三十二年先齊而王者獨楚武王耳帝湣王三十六年齊王為東帝秦昭王為西帝蘇代自燕來說齊於是齊去帝復為王秦亦去帝蓋稱帝者二月楚羣禮朝㑹商人見君韓詩外傳楚國之法商人欲見君者必有大獻重質然後得見聘享獻天子史記楚成王惲元年初即位布德施惠結舊好於諸侯使人獻天子天子胙曰鎮爾南方夷狄之亂無侵中國於是楚地千里宗廟廟堂圖畫楚辭天問序云屈原放逐憂心愁悴倣徨山澤經歷陵陸仰天嘆息見楚先王之廟及公卿祠堂圖畫天地山川神靈及古聖賢怪物所行事周流罷倦休息其下仰視圖畫因書其壁呵而問之以泄憤悶據此楚廟有圖畫如周之明堂也祭典國語屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之宗老曰夫子屬之子木曰不然夫子承楚國之政其法刑在民心而藏在王府上之可以比先王下之可以訓後世雖微楚國諸侯莫不譽其祭典有之曰國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦籩豆脯醢則上下共之不羞珍異不陳庶侈夫子不以其私欲干楚國之典飬老國老說苑楚王賜虞丘子采地三百號曰國老或作賜菜田三百號曰國老按禮記王制曰有虞氏飬國老於上庠飬庶老於下庠夏后氏飬國老於東序飬庶老於西序殷人飬國老於左學飬庶老於右學周人飬國老於東膠飬庶老於虞庠正義皇氏云人君飬老有四一飬老更二子孫死難飬其父祖三飬致仕之老四飬庶人之老蔡雍月令章句云三老國老也五更庶老也禮賢金幣聘士韓詩外傳楚莊王使使齎金百斤聘北郭先生又楚襄王遣使以金千斤白璧百雙聘莊子以為相孔叢子楚王使使奉金幣聘夫子昏禮迎婦懷王二十四年倍齊而合秦秦昭王初立乃厚賂於楚楚往迎婦自娶太子婦平王二年使費無忌如秦為太子建取婦婦好來未至無忌先歸說平王曰秦女好可自娶為太子更求平王聽之卒自娶秦女生熊珍更為太子娶宗室三姓譜屬離騷注云楚三閭之職掌王族三姓曰昭屈景屈原序其譜屬率其賢良以勵國士蓋楚官多用同姓故譜屬最重也貢獻獻藥楚策有獻不死之藥於荆王者獻魚新序楚人有獻魚於王者曰今日漁獲食之不盡賣之不售棄之又惜故來獻也獻鶴史記齊王使淳于髠獻鶴於楚韓詩外傳作獻鴻獻珥國策楚王后死未立后也謂昭魚曰公何不請立后昭魚因買五雙珥令其一善而獻之王明日視善珥所在請立之燕饗饗鄰國公子楚成王三十五年晉公子重耳過楚成王以諸侯客禮饗而厚送之於秦饗鄰大夫左傳晉郤至如楚聘且涖盟楚子享之子反相為地室而縣焉郤至將登金奏作於下驚而走出觴諸侯說苑楚莊王為五仞之臺而觴諸侯昭二年楚靈王享昭公於新臺好以大屈既而悔之賜羣臣酒楚史檮杌莊王賜羣臣酒日暮酒酣燭滅有引婦人之衣者朝設脯糗楚語云昔鬭子文三舍令尹無一日之積恤民之故也成王聞子文之朝不及夕也於是乎每朝設脯一束糗一筐以享子文至於今令尹秩之賞賜賜田宋玉小言賦云楚襄王既登陽雲之臺命諸大夫景差唐勒宋玉等並作大言賦卒而宋玉受賞有作小言賦王曰善賜雲夢田國策云昭王反郢蒙榖不受遂自棄於磨山之中至今無冒注謂子孫雖有罪不冒法也又楚有賞田見左傳賜地孝烈王元年以黃歇為相封為春申君賜淮北地十二縣后十五載黃歇言之楚王曰淮北地邊齊其事急請以為郡便因并獻淮北十二縣請封於江東考烈王許之春申君因城故吳墟以自為都邑又襄王封莊辛淮北之地諡法稱號附君諡武熊通弒兄蚡冒之子代立諡武王文熊通子熊資諡文王成熊資子熊惲為太子商臣所弒諡成王穆熊惲子商臣弒父代立諡穆王莊商臣子侣諡莊王共侣子審諡共王康審子拈諡康王靈招子圍諡靈王平審子棄疾改名熊居諡平王昭熊居子珍諡昭王惠珍子章諡惠王簡章子中諡簡王聲中子當諡聲王悼當子類諡悼王肅類子臧諡肅王宣臧子熊良夫諡宣王威良夫子熊商諡威王懷熊商子熊槐諡懷王頃襄熊槐子橫諡頃襄王考烈橫子熊元諡考烈王幽元子悼諡幽王一云名悍哀悼弟猶諡哀王無諡文王熊資子熊囏是為杜敖無諡芻康王子員是為郟敖無諡哀王猶庶兄負殺猶自立滅於秦無諡按楚自熊繹始封至十七世武王而有諡荆蠻之俗積久乃變也按史記楚武王三十五年楚伐隨謂隨請王室尊吾號王室不聼熊通怒曰我自尊耳乃自立為武王生以為號死以為諡矣左傳商臣以宫甲圍成王請食熊蹯而死不聽丁未王縊諡之曰靈不瞑曰成乃瞑共王疾告大夫曰不榖不德少主社稷生十年而喪先君未及習師保之教訓而膺受多福是以不得而亡師於鄙以辱社稷為大夫憂其𢎞多矣若以大夫之靈獲保首領以沒於地惟是春秋窀穸之事所以從先君於禰廟者請為靈若厲大夫擇焉莫對及五命乃許秋共公卒子囊謀諡大夫曰君有命矣子囊曰君命以共若之何毁也赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎請諡之共大夫從之是以知楚國諡法之重也若夫杜敖無諡郟敖無諡則不得其解矣右諡法子熊繹熊艾熊䵣熊勝熊揚熊渠熊渠稱王已而復去王稱子熊摯紅熊延熊勇熊嚴熊霜熊狥熊咢熊儀是為若敖熊坎是為霄敖熊㫬是為蚡冒典略云楚自熊繹至蚡冒並稱楚子王蚡冒弟為武王武王之後文王成王穆王莊王共王康王靈王平王昭王惠王簡王聲王悼王肅王宣王威王懷王頃襄王考烈王幽王哀王王負芻按熊繹當周成王之時舉文武勤勞之后嗣而封熊繹於楚蠻封以子男之田稱楚子當周夷王之時王室微諸侯或不朝相伐熊渠甚得江漢間民和乃興兵伐庸陽粵至於鄂熊渠曰我蠻夷也不與中國之號諡乃立其長子康為句亶王中子紅為鄂王少子執疵為越章王及周厲王之時暴虐熊渠畏其伐楚亦去其王及熊通立三十五年伐隨隨曰我無罪楚曰我蠻夷也今諸侯皆為叛相侵或相殺我有敝甲欲以觀中國之政請王室尊吾號隨人為之周請尊楚王室不聽還報楚三十七年楚熊通怒曰吾先鬻熊文王之師也早終成王王舉我先公乃以子男田令居楚蠻夷皆率服而王不加位我自尊耳乃自立為武王蓋周桓王十六年也榖梁傳曰吳楚之君不書葬辟其號也謂辟其稱王之號也敖楚熊儀為若敖熊坎為霄敖或作若敖文王子熊囏為杜敖康王子員為郟敖棄疾即位葬子干於訾實訾敖杜預曰不成君無號諡者楚皆謂之敖余按敖者楚國尊大之别稱楚尊官有莫敖可推也熊眴為盼冒冒字不可考趙禮朝㑹大朝武靈王十九年春正月大朝信宫二十七年五月大朝於東宫見史記羣臣宗室之禮惠文王立四年朝羣臣安陽君亦來朝主父令王聽朝而自從旁觀窺羣臣宗室之禮大備悼襄王元年大備正義曰謂行大備之禮也宗廟廟見武靈王十六年五月大朝東宫傳國於何王廟見禮畢出臨朝飬老三老武靈年少未能聽政置博聞師三人左右司過三人及聽政先問先王貴臣肥義加其秩國三老年八十月致其禮慶賞置酒脯惠文王三年主父滅中山遷其王於膚施起靈壽北地方從代道大通還歸行賞大赦置酒酺五日按漢書音義云漢律三人已上無故羣飲罰金四兩恩詔橫賜得令聚㑹飲食五日酺布也言天子布恩於天下貢獻獻雀孔叢子邯鄲之民以正月旦獻雀於趙王而綴以五采獻鳩列子邯鄲之人以正月之旦獻鳩於簡子簡子大悅厚賞之賞賜賜田趙簡子疾五日不知人扁鵲視之曰不出三日疾有間居二日半簡子寤董安于以扁鵲言告簡子賜扁鵲田萬畝賜衣烈侯好音欲賜鄭歌者槍石二人田各萬畝相國公仲不與乃進牛畜荀欣徐越三人烈侯說止歌者田官三人賜相國衣一襲注單復具為一襲賜金肅侯游大陵出於鹿門大戊午扣馬曰耕事方急一日不作百日不食肅侯下車謝賜大戊午金百鎰見桓談論賜冠帶國策武靈王立周紹為王子傅又賜周紹胡服衣冠具𢃄黃金師比注具帶帶飾之備也猶具劍賜璧虞卿者游說之士躡屩擔簦說趙孝成王一見賜黃金百鎰白璧一雙賜湯沐邑信陵君傳公子留趙趙王以鄗為公子湯沐邑諡法稱號附君諡烈趙侯藉趙獻子浣之子諡烈侯武烈侯弟諡武侯敬烈侯子章諡敬侯成章子種諡成侯肅成侯子言諡肅侯武靈肅侯子諡武靈王惠文武靈王子何諡惠文王孝成何子丹諡孝成王悼襄丹子偃諡悼襄王幽繆偃子遷諡幽繆王徐廣曰王遷無諡今獨此稱幽繆主者蓋秦滅趙之後人臣竊追諡之遷子嘉為代王滅於秦無諡后諡武靈王納吳侯之女娃嬴是為孟姚有寵卒諡惠后右諡法子史記趙武卒諡為文子文子生景叔景叔卒生趙鞅立是為簡子簡子卒毋恤立是為襄子又襄子弟曰桓子侯襄子卒趙浣立是為獻侯獻侯卒子烈侯籍立烈侯卒太子章立是為敬侯敬侯子種立是為成侯成侯子語立是為肅侯王肅侯卒子武靈王立按武靈王八年五國相王趙獨否曰無其實敢處其名乎今國人謂已曰君及惠文王立武靈又自號為主父不知何時稱王也惠文王卒太子丹立是為孝成王孝成王卒子偃立是為悼襄王悼襄王卒子遷立是為幽繆王趙武靈王元年周顯王四十四年君見上按靈王能矯五國之非然趙侯爵稱侯可也今稱君亦無義沈羽云三晋本大夫而為諸侯者故多稱主君梁王觴諸侯於范臺魯君曰主君之尊儀狄之酒也見國策韓昭侯三日不朝大夫諫曰主君玩國甚矣見典論父武靈王自號主父一曰君二曰父甚竒孟通鑑豫讓漆身為癘吞炭為啞行乞於市其妻不識也行見其友其友識之為之泣曰以子之才臣事趙孟必得近幸胡三省云自春秋之時趙宣子謂之宣孟趙文子謂之趙孟其後遂襲而呼為趙孟孟長也追侯周威烈王二十三年魏韓趙皆立為諸侯魏文侯二十三年韓景侯六年趙烈侯六年趙烈侯既侯遂追尊獻子為獻侯余又按諸書載列國事蹟其稱號有甚繆者如闞子云趙簡王好獵是趙簡子也班媫妤咏扇畫作秦王女乘鸞向煙霧乃用簫史事是秦繆公也一統志趙王臺是趙襄子也皆未嘗稱王如楚武王冡皇覽云楚武帝冡韓昭侯作髙門胡廣說云昔韓昭帝作髙門皆未嘗稱帝是猶朱象不有天下而水經注有鼻天子城山海經有帝丹朱葬處也如楚既僭號而仙鑑有楚莊公則又尊變而卑矣按春秋亦作楚子然子楚爵也春秋不書僣王而書子爵仙鑑稱公無義也魏羣禮改元后元竹書紀年周顯王三十四年魏惠成王三十六年改元稱一年玉海云魏惠王年號云后元朝㑹朝天子國策魏惠王擁土千里𢃄甲三十六萬十八年拔邯鄲西圍定陽從十二諸侯朝天子來朝史記惠王十五年魯衛宋鄭君來朝紀年作十四年受經史記文侯受子夏經藝客假干木過其閭未嘗不軾也黃金聘士孔叢子魏王遣使者奉黃金束帛聘子順為相昏禮尚主魏相公叔髙尚主而害吳起見史記如淳曰天子嫁女於諸侯必使諸侯同姓者主之故謂之公主帝姊妹曰長公主諸王女曰翁主師古曰如說得之天子不親主婚故謂之公主諸王則自主婚故其女曰翁主翁者父也言父主其婚也亦曰王主言王自主其婚也揚雄方言云周晉秦隴謂父曰翁而臣瓉王楙或云公者比於上爵或云主者婦尊稱皆失之劉貢父曰豫謂公主之稱夲出秦舊男為公子女為公主古者大夫妻稱主故以公配之若謂同姓主之故謂之公主則周之事秦不知用也古之嫁女禮當如周使大夫主之何不謂之夫主乎然則謂之王主者猶言王子也謂之公主者緣公而生耳毛晃曰尚崇也髙也貴也飾也加也尊也娶公主謂之尚言帝王之女尊而尚之不敢言娶也小荀子曰尚主之制非古也釐降二女陶唐之典歸妹元吉帝乙之訓王姬歸齊宗周之禮也以隂乘陽違天以婦凌夫違人違天不祥違人不義燕饗觴政說苑魏文侯與大夫飲酒使公乘不仁為觴政曰飲而不嚼者浮以大白文侯飲而不嚼公乘不仁舉白浮君君視而不應侍者曰不仁退君已醉矣公乘不仁曰周書曰前車覆後車戒蓋言其危為人臣者不易為君亦不易今君已設令令不行可乎君曰善舉白而飲飲畢以公乘不仁為上客饗功之禮未學篇云魏武侯即位設饗功之禮以優士大夫設坐廟廷為三行上功坐前行肴席兼重器上牢次功坐中行肴席器差减無功坐後行肴席無重器觴諸侯國策梁惠王觴諸侯於范臺觴大夫淮南子魏文侯觴大夫於曲陽貢獻獻晨鳬北犬韓詩外傳魏文侯封太子擊於中山三年不往來趙倉唐曰君何不遣人使大國太子曰願之久矣未可得使者對曰臣願奉使侯何如太子曰侯嗜晨鴈好北犬於是遣倉唐緤北犬奉晨鴈獻之侯曰擊愛我知我所嗜好杜鄴與王音書云昔文侯寤犬鴈之獻而父子益親死事之賞列國紀聞魏文侯舉有功而進賞之有死事之家嵗使使者勞賜其父母又按魏文侯與田子方語有兩童子衣錦而侍於君側田子方曰此君之寵子乎文侯曰非也此其父死於戰此幼子也寡人收之是又恤死事之孤也賞賜賜田惠王索吳起之後賜之田二十萬巴寧㸑襄各十萬惠王曰非公叔何以知三子之功哉又賜公叔田四十萬加之百萬之上使百四十萬見國策賜衣說苑魏文侯封太子擊於中山三年使不往來趙倉唐奉使侯問子之君長大孰與寡人倉唐曰君賜之外府之衣則能勝之文侯遣倉唐賜太子衣一襲諡法稱號附君諡文魏侯斯諡文侯或作都武斯子擊諡武侯惠擊子罃諡惠王紀年作惠成王是也襄罃子赫諡襄王哀赫子諡哀王索隱曰系本襄王生昭王而無哀王蓋脫一代耳昭哀王子圍諡昭王安釐昭王子諡安釐王景閔安釐王子增諡景閔王無諡景閔王子假滅於秦無諡子武子悼子魏絳絳史無明文無考昭子獻子桓子系本有襄子史記無侯文侯二十二年列為諸侯武侯惠侯王襄王元年王哀王昭王安釐王景閔王王假按魏襄王元年周顯王三十五年也追王史記魏襄王元年與諸侯㑹徐州相王也然後追尊父惠侯為惠王吕氏曰竹書紀年魏惠王三十六年改元稱一年王與諸侯㑹於徐州其後十七年卒所謂今王者襄王也今史記惠王三十六年卒襄王立十六年卒并惠襄為五十二年史記誤分惠成王之世為二王之年數也其曰襄王元年與諸侯㑹徐州相王然后追尊父惠侯為惠王者即惠王改元一年㑹諸侯於徐州也追王之說史記誤右吕氏云索隱曰世本襄王生昭王而無哀王蓋脫一代耳孔衍叙魏語亦有哀王而紀年說惠成王三十六年又改元為后元一十七年卒史記分惠王之歷以為二王之年又有哀王凡二十三年紀事甚明無足疑者然則是紀年之作失哀王之代故分襄王之年為惠王后元即以襄王之年包哀王之代耳右索隱云據吕氏之說襄王不追王據索隱之說惠王不改元余考經世稽覽圖魏惠王改元后元一年其年即薨子襄王立又按孟子至魏在惠王三十五年其後襄王立孟子尚在魏也若惠王改元后又十七年而卒孟子豈能在魏十八年及襄王之世哉當是惠王改元之年卒襄王元年追為惠王紀年脫襄王一代又誤於慎靚王二年作魏惠王薨當言襄王薨也今王即哀王也或曰孟子曰梁惠王何也曰從後言之也孟子退而著書之年在襄王追王惠王之後也韓羣禮朝㑹執圭孔叢子云韓與魏仇敵之國而韓釐侯執圭見梁君非好卑而惡尊執圭者謂執圭而朝宗廟視牲天中記韓昭侯視所以祠廟之牲其豕小昭侯令官更之官以是豕來也昭侯曰是非嚮者之豕耶官無以對命吏罪之從者曰君王何以知之君曰吾以其耳也諡法附稱號君諡景韓侯䖍諡景侯烈䖍子取諡烈侯系本作武史記作列文烈侯子諡文侯哀文侯子為韓嚴所弒諡哀侯懿哀侯子若山諡懿侯索隱曰年表作莊侯昭懿侯子諡昭侯又作鄭釐侯按昭侯二十五年作髙門屈宜臼曰昭侯不出此門云云凡稱昭侯者三生而稱諡大不可解宣惠昭侯子諡宣惠王襄宣惠王子倉諡襄王也釐襄王子諡釐王桓惠釐王子諡桓惠王桓惠王子安滅於秦無諡右諡法子韓武子事晉封於韓原十一世皆稱子侯景侯始列為諸侯烈侯文侯哀侯懿侯昭侯王昭侯子宣惠王十一年號為王襄王釐王桓惠王安王按韓宣惠王十一年周顯王四十七年六國表作十年則顯王四十六年也蓋顯王三十二年秦王三十五年魏王三十七年韓王燕王四十四年趙王數年之間五王並立矣君宣惠王十一年君號為王據此十一年已前稱君也燕羣禮宗廟修宗廟漢略燕昭王三年修其宗廟修齊廟白帖燕將樂毅下齊七十城而修齊宗廟禮賢築宫燕昭王為郭隗改築宫而師事之樂毅自魏往鄒衍自齊往劇辛自趙往擁篲史記騶子如燕昭王擁篲先驅請列弟子之位而受業又阮籍奏記云鄒子居黍谷之隂而昭王陪乘燕饗駃騠食鄒陽書蘇秦相燕燕人惡之於王王按劍而怒食以駃騠漢書音義云駃騠駿馬也生七日而超其母王重蘇秦雖有讒謗而更膳以珍竒之味千里馬肝燕丹子云太子有千里馬軻曰千里馬肝美太子即進肝貢獻獻豕朔人獻燕昭王以大豕見符子獻香獻珠並詳雜徴賞賜賜羽衣詳器服賜后服通鑑燕賜樂毅輅車乘馬后屬百兩賜樂毅妻以后服賜其子以公子之服賜公子服詳上賜車馬詳上諡法稱號附君諡康召公奭諡康公子封北燕伯惠康公九世孫諡惠侯懿公子諡惠公戰國昭王子諡惠王釐惠侯子諡釐侯閔公子諡釐年表作釐侯莊頃釐侯子諡頃侯哀頃侯子諡哀侯鄭哀侯子諡鄭侯索隱曰諡法無鄭鄭是名也余按列國諡法如此者甚多繆鄭侯子諡繆侯宣繆侯子諡宣侯桓公子諡宣公桓宣侯子諡桓侯襄公子諡桓公譙周曰系家襄伯生宣公無桓公也又釐侯子諡桓公昭宣公子諡昭公戰國噲子平諡昭王武昭公子諡武公文武公子諡文公又桓公子諡文公懿文公子諡懿公悼惠公子諡悼公共悼公子諡共公平共公子諡平公簡平公子欵諡簡公獻簡公子諡獻公索隱曰按紀年燕簡公後次孝公無獻公孝獻公子諡孝公戰國武成王子諡孝王成孝公子載諡成公閔成公子諡閔公易文公子諡易王武成惠王子諡武成王無諡易王子噲無諡孝王子喜為太子丹事滅於秦無諡也按續文獻通考云燕有南北南燕姞姓北燕即邵公所封也如昭三年書北燕伯欵出奔齊莊二十年書執燕仲父注云即南燕伯而史記乃共一世家豈遷别有據歟又左傳有莊公奐之子簡公盈與北燕簡公欵而世家獨有一簡公豈即左傳所謂北燕伯歟又有召穆公虎即江漢之詩所稱平淮夷者也而世家亦無之獨有繆侯豈穆即繆歟余又按周公名旦索隱曰諡文見國語父子君臣同時並諡矣五經通義曰周桓王時蔡侯卒諡蔡桓侯有德則善諡無德則惡諡故同也考燕諡法康公九世孫諡惠懿公子亦諡惠昭王子亦諡惠惠侯子諡釐閔公子亦諡釐繆侯子諡宣桓公子亦諡宣宣公子諡桓襄公子亦諡桓釐侯子亦諡桓宣公子諡昭王噲子亦諡昭武公子諡文桓公子亦諡文獻公子諡孝武成王子亦諡孝諡不諱同周之制也右諡法侯召公封於北燕已下九世至惠侯可考惠侯釐侯頃侯哀侯鄭侯繆侯宣侯桓侯自桓侯復稱公公莊公襄公桓公宣公昭公武公文公懿公惠公悼公共公平公簡公獻公孝公成公湣公釐公桓公文公王易王王噲昭王惠王武成王孝王王喜按燕易王元年周顯王三十七年也趙岐孟子注云以萬乘之國伐萬乘之國者萬乘非諸侯之號時燕國侵地廣大僣號稱王故曰萬乘七國考卷六
