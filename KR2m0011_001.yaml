body:
  text: 七國考卷一明董說撰秦職官封君后妃附相國策衛鞅亡入秦孝公以為相史記惠文王十年張儀相秦更元七年樂池相秦按禮諸侯有上大夫卿下大夫上士中士下士凡五等諸侯之大夫不世爵祿公孤國一人大國三卿皆命于天子次國三卿二卿命于天子一卿命于其君小國三卿一卿命于天子二卿命于其君每國下大夫五人上士二十七人大國之卿不過三命下卿再命小國之卿與大夫一命次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫至於周衰諸侯失制號令自己其名不一正卿當國皆謂之相楚謂之相亦謂之令尹荀子曰孫叔敖曰吾三相而心愈卑淮南子曰蘧伯玉為相又子産為鄭國相孔子攝行魯相事公儀休為魯相戰國又不可勝數矣左右丞相史記秦武王二年初置丞相樗里疾甘茂為左右丞相茂為左疾為右莊襄王又以吕不韋為丞相按物原云諸臣稱丞自秦獻公置丞相始是獻公之時已置丞相武王特加左右之名耳杜氏通典曰丞相相國皆秦官金印紫綬掌丞天子助理萬幾曰丞相荀悅曰秦本次國命卿二人是以置左右丞相無三公官漢官儀云相國丞相皆六國時官余按二世已誅李斯乃拜趙高為中丞相是二世時又有中丞相矣相國杜預曰始皇始置相國余按范睢傳秦昭王加賜相國應侯食物日益厚是昭王時有相國又莊襄王元年東周君與諸侯謀秦秦使相國吕不韋誅之見秦紀師商君傅太子犯法衛鞅曰法之不行自上犯之將法太子太子君嗣也不可施刑刑其傅公子䖍黥其師公孫賈傅詳見師上卿國䇿秦王大說姚賈封千户以為上卿又秦封甘羅為上卿亞卿晉公子雍仕秦為亞卿見左傳客卿史記昭襄王三十六年客卿竈攻齊取剛壽上大夫虞氏春秋秦繆公贖百里奚於楚欲爵之百里奚曰臣不及臣之友臣之友曰蹇叔是察於王道於是繆公使人厚幣迎蹇叔以為上大夫右大夫左傳楚子囊乞旅於秦秦右大夫詹帥師從楚子又秦右大夫說中大夫令史記秦始皇九年中大夫令齊等二十人皆梟首正義曰中大夫令秦官也齊名也五校大夫秦昭王使五校大夫王陵將而伐趙見國䇿將軍穰侯傳昭王以冉為將軍護軍將軍漢書百官公卿表云護軍將軍從秦官舍人李斯為之國尉白起傳白起遷為國尉正義曰言太尉通鑑秦尉錯錯伐魏襄城注尉國尉也月令云立夏命太尉贊桀俊注太尉秦官按尚書中候舜為堯太尉故徐陵碑云舜為太尉於是九澤載疏禹作司空然後百川咸導廷尉李斯傳秦王除逐客之令復李斯官卒用其計謀官至廷尉二十餘年竟并天下據此秦并天下以前有廷尉都尉通鑑始皇二十二年楚大敗李信入兩壁殺七都尉注此郡都尉將兵從伐楚者也又秦使都尉墨等從石牛道伐蜀中尉華陽國志蜀王伐苴侯苴侯奔巴求救于秦秦惠王方欲謀楚羣臣議曰夫蜀西僻之國戎狄為鄰不如伐楚司馬錯中尉田真黃曰蜀有桀紂之亂其國富饒得其布帛金銀足給軍用水通於楚有巴之徑卒浮大舶船以東向楚楚地可得軍尉應劭漢注云秦惠文王置軍尉又國策有尉注有尉軍尉也衛尉史記秦始九年衛尉竭內史肆佐弋竭中大夫令齊等二十人皆梟首漢書百官表曰衛尉秦官秩官史史記秦襄公十三年初有秩史以紀事御史劉歆略云戰國秦趙皆立御史又秦御史見亷頗藺相如傳按周禮有御史掌邦國都鄙及萬民之治令以贊冡宰凡治者受法令焉掌贊書內史史記戎王使由余于秦繆公退而問內史廖漢書百官表內史周官又應侯謂昭王曰其令邑中自斗食以上至尉內史有非相國之人者乎注尉內史秦二官名長史李斯傳秦王拜斯為長史大良造史記惠文王五年陰晉人犀首為大良造昭襄王十五年大良造白起攻魏國策右行秦謂大梁造注秦官也以良作梁庶長史記惠文王更元七年韓趙魏燕齊帥胸奴共攻秦秦使庶長疾與戰修魚虜其將申差余按秦爵二十等有左庶長右庶長此庶長當别是一官如有五大夫官大夫又有大夫也左傳秦庶長鮑庶長武帥師伐晉以救鄭又亢倉子秦景主將視强兵于天下使庶長鮑戎必致命亢倉子余按春秋時有秦景公即景主也蓋秦在春秋時即有庶長之官太守風俗通秦昭王使陳氷為蜀郡太守史記昭襄王十三年任鄙為漢中守漢書百官表云郡守秦官縣官史記秦王收穰侯之印使歸陶因使縣官給車牛以從玉海云周官有縣正春秋時縣大而郡小縣邑之長曰宰曰尹曰公曰大夫其職一也戰國郡大而縣小矣故甘茂謂秦武王曰宜陽大縣名曰縣其實郡也令商君傳秦集小都鄉邑聚為縣置令丞丞詳見令常侍郎物原云諸官稱郎自秦武王置常侍郎始李斯傳李斯求為吕不韋舍人不韋賢之任以為郎郎中國䇿段産謂新城君曰今臣處郎中能無議君於王不能使人無議臣於君荆軻傳秦有郎中又韓非子秦惠王愛公孫衍郎中皆曰兵秋起攻韓犀首為將于是日也郎中盡知之執法國䇿秦自四境之內執法以下執法殿中法官謁者史記秦昭王使謁者王稽於魏漢明帝詔曰昔燕太子使荆軻劫始皇變起兩楹之間其後謁者持匕首劍刺腋高祖偃武行文故易之以板中車府令蒙恬傳趙高昆弟數人皆生隱宫其母被刑僇世世卑賤秦王聞高彊力通於獄法舉以為中車府令傳言秦王知未并天下之前也右行國䇿石行秦謂大梁造曰欲决霸王之名不如偹兩周辨智之士注云石行一作右行右行秦官也佐弋詳見衛尉漢書百官表曰秦時少府有佐弋漢武帝改為佽飛掌射弋者主簿風俗通曰秦昭王時蜀守李氷與江神鬭主簿刺殺江神按玉海云主簿漢晉有之不言秦官應麟失考也主魚吏劉向列仙傳赤須子豐人也豐中傳世見之云秦穆公時主魚吏也里正韓非子秦昭王有病百姓里出一牛而家為禱王訾其里正與五老屯二甲里正者司鄉邑者也主鐵官司馬遷傳司馬蘄孫昌為秦主鐵官按楊升菴外集紀秦官名有工官鹽官鐵官銅官錦官服官羞官尊官渴官林官疇官湖官陂官樓船官發弩官均輸官橘官苑官洭浦官皆秦官名而漢因之雜見于諸傳百官表不悉載者微乎微者也余意秦并天下之後所置故鐵官外不具録市官華陽國志張儀與張若城成都置鹽鐵市官并長丞寺人秦風未見君子寺人之令鄭箋云欲見國君者先令寺人使傳告之時秦仲又始有此官傳云寺人內小臣也正義曰天官序官云內小臣奄上士四人寺人王之正內五人則天子之官內小臣與寺人别官也燕禮諸侯之禮也經云獻左右正與內小臣是諸侯之官有寺人也著人秦别紀云繆公享國三十九年天子致伯葬雍繆公學著人索隱曰著音貯又音寧著即寧也門屏之間曰寧謂學於寧屏門之人故詩云俟我于著乎而也楊慎曰三代之君必學於耆德以為師保而繆公乃學於寧人以刑餘為周召以法律為詩書又不待始皇胡亥矣則景監得以薦商鞅趙高得以殺扶蘇終於亡秦著人之禍也侍醫史記荆軻逐秦王而卒惶急無以擊軻而以手共搏之是時侍醫夏無且以其所奉藥囊提荆軻也掌卜左傳秦伯伐晉卜徒父筮之吉杜預曰徒父秦之掌龜卜者大祝集仙傳注蕭史為秦大祝宗祝秦詛楚文云又秦嗣王敢用吉玉瑄璧使其宗祝卲鼛布愍告於不顯大沉久湫按周禮有大祝小祝器祝詛祝宗祝疑詛祝之類也舍人史記秦始初即位李斯為舍人注主廄內小吏名或曰侍從賓客謂之舍人也行人道書注秦昭王時行人張固至楚按左傳文公十二年秦行人夜戒晉師中庶子中庶子蒙嘉秦王寵臣見刺客傳少庶子國䇿甘羅為文信侯少庶子蓋家臣也徹侯二十商君為秦制爵二十等以賞功勞徹侯二十關內侯十九大庶長十八駟車庶長十七大上造十六少上造十五右更十四中更十三左更十二右庶長十一左庶長十五大夫九公乘八公大夫七官大夫六大夫五不更四簮裊三上造公士一詳應劭漢儀後漢志云徹侯金印紫綬功大者食縣小者食鄉亭得臣其所食吏民後避漢武帝諱改曰通侯或曰列侯關內侯十九顔師古曰言有侯號而居京畿無國邑也荀綽百官表注曰時六國未平將相皆居關中故以為號按吕覽春秋齊景公時已有關內侯又懶真子云僕仕於關中嘗見一方寸古印印文云關外侯印然疑古有關內侯不聞有關外侯後於魏志見之建安二十三年始置名位侯十二級以賞軍功關外侯乃其一也大庶長十八劉昭曰自左庶長以上至大庶長皆將軍也所將庶人更卒故以為大庶長即大將軍也左右庶長即左右偏禆也駟車庶長十七言乘駟馬之車而為衆庶之長大上造十六大上造少上造皆言主上造之士少上造十五詳上右更十四言主領更卒部其役使中更十三昭襄王三十八年中更胡傷攻閼與左更十二昭襄王時有左更白起及左更錯右庶長十一言為衆列之長左庶長十孝公拜鞅為左庶長秦舊有此官五大夫九五大夫大夫之尊者也劉昭曰自公士至大夫皆軍吏也昭襄王十三年五大夫禮出亡奔四十五年五大夫賁攻韓取十城葉陽四十八年五大夫陵攻趙邯鄲至始皇封松為五大夫公乘八言得乘公家之車也傅子云臨戰得乘公車故曰公乘公大夫七漢舊儀云公大夫領行伍兵漢書髙帝紀曰其七大夫以上皆令食邑師古注云七大夫公大夫也爵第七故謂之七大夫官大夫六官大夫亦謂之國大夫大夫五傅子云大夫者在車右也左傳楚人滅江秦伯為之降服出次不舉過數大夫諫又榖梁疏云秦無大夫秦處西戎罕接諸夏繆公始有大夫不更四不更者言不預更率之事漢舊儀云不更主一車四馬秦桓公時已有不更女父見左傳簮裊三以組帶馬曰裊簮裊者言飭此馬傅子云駕車馬者其形如簮故曰簮裊上造二造成也言有成命於上公士一言有爵命異於士卒史記秦始四年百姓內粟千石拜爵一級按納粟拜爵始此商君以下附史記孝公以衛鞅為相封之於商號曰商君竹書紀年云周顯王二十八年秦封衛鞅於塢改名曰尚胡應麟曰史無封尚之文尚恐商字之誤涇陽君范睢曰太后擅行不顧穰侯出使不報涇陽華陽擊斷旡諱昭襄王同母弟二曰顯高陵君也曰悝涇陽君也華陽君新城君宣太后二弟冉同母芈戎異母芈戎封為華陽君又號新城君國䇿注云新城君芈戎也高陵君詳見涇陽君嚴君史記昭襄王元年嚴君疾為相正義曰蓋封蜀郡嚴道縣因號嚴君疾樗里子名也武安君昭襄王十三年左更白起攻新城十四年左更白起攻韓魏於伊闕十五年大良造白起攻魏二十七年白起攻趙二十八年大良造白起攻楚楚王走周君來白起為武安君長安君始皇弟長安君將兵擊趙在始皇八年見漢書五行志安國君昭襄王四十二年安國君為太子陽泉君吕不韋見秦質異人竒之為說秦王后弟陽泉君以上並見史記王符曰戰國之制將相權臣必以親家皇后兄弟主壻外孫年雖童妙未脫桎梏由籍此官職功不加民澤不被下而取侯多受茅土又不得治民效能以報百姓虛實重祿素餐尸位而但事淫侈坐作驕奢破敗而不及傳世者也子産有言未能操刀而使之割其傷實多是故也昌平君史記嫪毐為亂王使昌平君昌文君發卒攻毐昌文君詳見昌平君武信君秦惠王封儀五邑號曰武信君見傳剛成君國䇿文信侯欲攻趙以廣河間使剛成君蔡澤事燕蔡澤傳云號為剛成君與國䇿異余按戰國封君有二一以封地為號如秦之華陽涇陽新城陽泉齊之安平楚之彭城襄城魏之平都中山之類是也一特立名號如秦之剛成武信齊之孟嘗楚之春申春申傳注云四君封邑檢皆不獲唯平原有地又非趙境並蓋號諡而孟嘗是諡然余按孟嘗亦非諡乃號耳趙之馬服信平武襄長安之類是也南鄭公北史李氏之先出自帝顓頊高陽氏周時李耳字伯陽為柱下史子孫散居諸國或在趙或在秦在秦者名興族為將軍生子伯佑建功北狄封南鄭公穰侯昭王時封魏冉于穰復益封陶號曰穰侯見穰侯傳蜀侯華陽國志秦惠王封子通為蜀侯七年復封子惲為蜀侯十五年封惲子綰為蜀侯應侯史記范睢封為應侯秦王謂范睢曰昔者齊桓公得管仲時以為父今吾得子亦以為父文信侯異人既以不韋計得立以不韋為相號曰文信侯食藍田十二縣長信侯秦封嫪毐為長信侯上並見史記右封君王后夫人美人良人八子七子長使少使應劭云秦自惠文王後嫡稱王后次稱夫人又有美人良人八子七子長使少使之號美人爵視二千石比少上造八子視千石比中更史記昭襄王母芊八子是也右后妃爵秩田齊職官封君后妃附相國䇿鄒忌為齊相司馬齊王建入朝於秦雍門司馬前諫見國䇿余按齊桓公時置王子成為大司馬景公以穰苴為司馬蓋春秋列國皆置司馬也師通鑑孫臏以刑徒陰見說齊使者齊使者竊載與之齊田忌善而客待之進於威王威王問兵法遂以為師傅吕氏春秋齊宣王使淳于髠傅太子太傅國䇿齊逐孟嘗君梁使三反孟嘗君固辭不受王聞之遣太傅齎黃金千斤文車二駟服劍一書謝孟嘗君注太傅本周官當是齊之大臣御史史記齊威王置酒后宫問淳于髠曰先生能飲幾何而醉對曰賜酒大王之前執法在前御史在後髠恐懼不過一斗徑醉矣按戰國竝置御史太史史記淖齒殺閔王於鼓里太子法章乃解衣免服逃去為太史家灌園太史后氏女知其貴人也善事之注后姓也太史官名以其姓后不可曰后故曰君王后也左傳疏云天子則內史主之外史佐之諸侯亦不異但春秋之時不能依禮諸侯史官多有廢闕或不置內史其䇿命之事多是太史右師王歡為齊右師見孟子余按趙有左師古人吉禮尚左唯喪禮軍禮尚右左陽右陰故喪禮右也人左臂力少右臂力多故軍禮右也秦漢及前元之世丞相將軍以下官俱先右而後左秦于金石文及本紀稱右丞相去疾左丞相斯可證士師劉向孟子注士師田齊獄官余按先齊景公時有士師見晏子春秋祭酒荀卿三為齊祭酒見劉向目録按史記注云三為祭酒者謂荀卿出入前后三度處列大夫康莊之位而皆為其所尊故云三為祭酒漢書注應劭云禮飲酒必祭示有先也故稱祭酒尊之也如淳云祭祠時唯尊長者以酒沃酹博士五經異義曰戰國時齊置博士之官班固亦云六國時往往有博士掌通古今卿孟子為卿於齊淳于髠曰夫子在三卿之中上卿說苑淳于髠立為上卿客卿蘇秦傳蘇秦詳為得罪於燕而亡走齊齊王以為客卿大夫册府元龜魯謂之宰仲尼為中都宰是也齊謂之大夫齊威王封即墨大夫烹阿大夫是也上大夫齊宣王喜文學游說之士如騶衍淳于髠之徒七十六人皆賜列第為上大夫見史記劉向荀子目録曰方齊威王之時聚天下賢士於稷下尊寵之若鄒衍田駢淳于髠之屬甚衆號曰列大夫咸作書刺世是時荀卿年十五始來游學至齊襄王時荀卿最為老師齊尚修列大夫之缺余按列大夫即賜列第為上大夫也或曰齊有上大夫又有列大夫非中大夫韓子云齊中大夫有夷射者上將軍說苑田單為齊上將軍史記作將軍駙駕韓子造父為齊王駙駕執法詳見御史掌書吕氏春秋春子諫大室宣王召掌書曰書之蓋史官也劉向作召尚書書之干寶周禮注曰言司者總其柄言師者訓其徒言職者主其業言衡者平其政言掌者主其事言氏者世其官言人者終其身郎中韓子齊威王時有郎中諸侯主客滑稽傳齊王罷長夜之飲以髠為諸侯主客正義曰今鴻臚卿也按周禮有掌客掌四方賓客主即掌也謁者國䇿先生王斗造門欲見齊宣王宣王使謁者延入注謁者掌賓讃受事延引也五官靖郭君謂齊王曰五官之計不可不日聽也而數覽見國䇿鮑彪曰曲禮司徒司馬司空司士司冦典司五衆計其事之凡也正曰按記曽子問諸侯出命國家五官而后行高曰五官齊之計簿書者或作五大夫非也按楚亦有五官守山東志盻子戰國時人齊威王使守高唐趙人不敢東漁於河令雜事篇云齊田單為即墨令靖郭君以下附國䇿靖郭君將城薛舊注田嬰諡正曰此據史文索隱曰靖郭當是封邑之號漢齊王舅父駟鈞封靖郭侯也按戰國臣死無諡索隱為是耳靖郭君又名薛公孟嘗君見國䇿田嬰子田文也安平君貂勃惡田單曰安平君小人也注安平在青州臨淄縣東單初起安平故以為號成侯成侯鄒忌為齊相高誘注成齊邑按田齊世家騶忌子以鼓琴見威王三月而受相印居朞年封以下邳號曰成侯則成侯為號矣楚職官封君附令尹史記郟敖三年以其季父康王弟圍為令尹考烈王以左徒為令尹封於吳號春申君應劭曰令尹楚相也陳軫所謂冠國之上又國䇿陳軫曰令尹貴矣王非置兩令尹也以此見楚令尹爵位最高傅遜氏曰春秋諸國惟楚英賢最多而為令尹執國政者皆其公族少有僨事旋即誅死所以强大纍世而威略無下移固其君之强明亦其傳國用人之制獨善也小令尹國䇿為公仲謂白壽曰今公與楚解中封小令尹以桂陽一作杜陽柱國史記懷王六年楚使柱國昭陽將兵攻魏上柱國國䇿楚國之法破軍殺將者其官為上柱國封上爵執圭又上柱國子良入見通典云柱國上柱國皆楚之寵官宛委餘編云上柱國楚為勳官在令尹下諸卿上其後隋為從一品階官在唐則為四品以階官皆不甚尊相國國䇿周共太子死有五庶子皆愛之而無適立也司馬翦謂楚王曰何不封公子咎而為之請太子左成謂司馬翦曰周君不聽是公之智困而交絶於周也不如謂周君曰孰欲立也微告翦翦令楚王資之以地公若欲為太子因令人謂相國御展子牆夫空曰王類欲令若為之此健士也居中不便於相國相國令之為太子注相國楚官楚有相國柱國又楚置相璽將軍史記楚成王三十九年伐宋宋告急於晉晉救宋成王罷歸將軍子玉請戰楚共王十六年共王召將軍子反上將軍說苑田齊去齊奔楚楚郊迎至舍問曰楚萬乘之國也齊亦萬乘之國也常欲相并為之奈何對曰易知耳齊使申繻將則楚發五萬人使上將軍將之至禽將首而反耳大將軍史記楚懷王十七年秦大敗我軍斬甲士八萬虜我大將軍屈丐禆將軍逄侯丑等七十餘人禆將軍詳上太宰左傳楚靈王即位薳罷為令尹薳啓疆為太宰先是伯州犁為太宰被殺少宰左宣十二年楚少宰如晋師注少宰官名太師史記穆王以其太子宫豫潘崇使為太師掌國事少師說苑楚莊王之時太子車立於茅門之內少師慶逐之太子怒入謁王曰少師逐臣之車王曰舍之老君在前而不踰少君在後而不豫是國之寶臣也太子太傅史記平王時伍奢為太子太傅旡忌為少傅左傳作奢為太子建師費無極為少師荀綽晉百官表曰太子太傅唐虞官太子少傅詳上保楚文王不治政保申諫曰先王卜以臣為保吉云云見吕氏春秋又楚語鍾儀曰其為太子也師保奉之以朝於嬰齊而夕於側也司馬史記楚靈王十二年吳越兵立子比為王公子子晢為令尹棄疾為司馬大司馬國䇿遣昭常為大司馬令往守東地又左傳公子圍殺大司馬蒍掩而取其室申無宇曰王子必不免善人國之主也王子相楚國將善是封殖而虐之是禍國也且司馬令尹之偏而王之四體也右司馬左傳楚公子申為右司馬左司馬韓詩外傳楚使申鳴為左司馬又國䇿齊韓魏共伐燕燕使太子請救於楚楚使景陽將而擊之暮舍使左右司馬各營壁地又左傳載楚子田孟諸宋公為右盂鄭伯為左盂期思公復遂為右司馬子朱及文之無畏為左司馬司徒左傳楚令尹蒍艾獵城沂使封人慮事以授司徒量功命日司敗左傳子西曰臣免於死又有讒言謂臣將逃臣歸死於司敗也杜預曰陳楚名司冦為司敗司宫左傳楚子朝其大夫曰晉吾仇敵也茍得志焉無恤其他今其來者上卿大夫若吾以韓起為閽以羊舌肸為司宫足以辱晉我亦得志矣注司宫謂加宫刑使為司宫之官也莫敖左傳有莫敖屈瑕注莫敖楚官名又國䇿威王問於莫敖子華自從先君文王以至不榖之身亦有不為爵勸不為祿勉以憂社稷者乎按楚改司空為莫敖新造盩國䇿棼冒勃蘇曰臣非異楚使新造盩鮑彪曰楚官余按戰國官號之竒者如新造盩犀首是也姓名之竒者如董之蘩菁及苦成帝是也大夫登徒子好色賦大夫登徒子侍於楚王又懷王時上官大夫按榖梁傳云楚無大夫疏云無大夫凡有三等之例曹無大夫者本非微國後削小耳莒則是東夷夲微國也楚則蠻夷之國僣號稱王其卿不命於天子故不得同中國之例也册府元龜云楚命大夫為公余意楚公尹之外又有大夫之官但列國大夫皆尊爵楚不過備官耳上大夫齊桓公七子奔楚楚以為上大夫見史記五大夫吕氏春秋荆文王曰莧嘻數犯我以義違我以禮與處則不安曠之而不榖得焉不以吾身爵之後世有聖人將以非不榖於是爵之五大夫三閭大夫離騷注屈原名平與楚同姓仕於楚王為三閭大夫三閭之職掌王族三姓曰昭屈景屈原序其譜屬率其賢良以厲國士入則與王圖議政事决定嫌疑出則監羣下應對諸侯按戰國䇿楚有昭奚恤元和姓纂云楚武王子食采於屈因氏焉屈重屈蕩屈平屈建並其後又云景氏有景差至漢皆徙關中公杜預曰楚僣號縣令皆稱公葉公諸梁申公鬭班之類是也册府元龜云魯謂之宰齊謂之大夫楚謂之尹亦謂之公公爵在侯伯之上楚僣天子之號故命大夫為公也又銅龍志云鄭公潭者乃楚之鄭鄉守邑大夫僣稱公故世以為鄭公潭耳漢書孟康注云楚舊僣稱王其縣宰為公陳涉為楚王沛公起應涉故從楚制稱曰公卿楚武王子瑕受屈為卿因以為氏見離騷注上卿譙周三巴記云周末巴國有亂巴國將軍曼子請師於楚許以三城楚王與師曼子既平巴國既而楚遣使請城曼子曰吾城許豫之君矣持頭往謝楚王城不可得乃自刎以頭與楚王楚王曰吾得臣若巴曼子何以城為乃以上卿禮葬曼子頭執圭文選注楚爵功臣賜以圭謂之執圭比附庸國䇿注楚國之法破軍殺將其官為上柱國封上爵執圭者謂既為上柱國之官又虛受執圭之爵也余按上柱國執圭皆楚官名封上爵執圭即今尚書加宫保之比文選注未明國䇿楚嘗與秦搆難戰於漢中通侯執圭死者七十餘人注通侯執圭皆楚官又楚襄王以執圭授莊辛淮南子云佽非爵為執圭又云子發攻蔡踰之宣王郊迎列田百頃而封之執圭又云吳起為楚减爵祿之令而功臣畔矣徐注减爵减執圭之類通侯詳見執圭三旌莊子楚昭王延屠羊說以三旌之位注三旌三公位也司馬本作三圭謂諸侯之三卿皆執圭者韓詩外傳作昭王請屠羊說為三公一官爾或稱三公或稱三旌或稱三圭也屈原大招三圭重侯聽類神只王逸云三圭謂公侯伯也五官國䇿楚昭王反郢五官失法蒙榖獻典五官得法劉歆云楚之五官者五卿也或云如秦五大夫一人官之者也太史張華感應類從志云有蒼雲圍軫軫楚之分野是不善之徴楚太史唐勒乃夜以葭灰遺於地乃更滅拂之其蒼雲為之半滅春秋文耀鈎作唐舉詳見災異考左史國語左史倚相王應麟玉海云左史楚之史官也韓詩外傳楚史援筆而書之於䇿左徒史記頃襄王二十七年使左徒侍太子於秦考烈王立以左徒為令尹封於吳蓋黃歇初為左徒官也又屈原為懷王左徒正義曰蓋今左右拾遺之類右領左傳子榖曰右領差車與左史老皆相令尹司馬以伐陳注右領官名令史記楚以荀卿為蘭陵令又芈尹文為江南令見春秋翼典令國䇿史疾謂楚王曰今王之國有柱國令尹司馬典令其任官置吏必曰亷潔勝任今盜賊公行而弗能禁也此烏不為烏鵲不為鵲也市令史記莊王以為幣輕更以小為大百姓不悅市令言之相相言之王市長真仙通鑑云宋來子楚莊公時市長尹左傳楚武王克權使鬭緡尹之以叛圍而殺之遷權於那處使閻敖尹之亞尹亢倉子荆君熊圉問水旱理亂亢倉子曰水旱由天理亂由人若人事和理雖有水旱無能為害堯湯是也故周之秩官云人强勝天若人事壞亂縱無水旱日益崩離且桀紂之滅豈惟水旱荆君北面遵循稽首曰天不弃不榖及此言也乃以和璧十朋為亢倉子夀拜為亞尹曰庶吾國有瘳乎王尹左傳楚莠尹然王尹麇帥師救潜孔頴逹疏曰楚官多以尹為名知二尹是官名耳其莠王之義不可知也服䖍曰王尹主宫內之政余按今本王作工然楚自有工尹此當是王尹也右尹史記靈王聞太子祿之死自投車而下曰人之愛子亦如是乎侍者曰甚是王曰余殺人之子多矣能無及此乎右尹曰請待於郊以聽國人又左傳有右尹子辛右尹子革通志氏族略有右尹氏左尹左傳楚左尹郤宛工尹壽帥師至於潜吳師不能退通志有左尹氏云楚左尹郤宛之後項羽本紀云楚左尹項伯者項羽季父也蓋仍楚舊又廣陵人召平矯陳王命拜項梁為楚王上柱國懷王以吕青為令尹工尹見上又左傳工尹路請曰君王命剝圭以為鏚柲敢請命王入視之析父謂子革吾子楚國之望也今與王言如響國其若之何檀弓有工尹商陽注工尹楚官名寢尹左傳注柏舉之役寢尹由于以背受戈莠尹左傳楚莠尹然王尹麇帥師救潜杜預曰二尹楚官然麇其名通志作季尹藍尹通志氏族略云藍尹氏楚大夫藍尹亹之後也楚書云藍尹陵尹分掌山澤位在朝廷監馬尹劉向云楚有監馬尹官廄尹楚有監馬尹大心宫廄尹詳上左傳公子圍弒王宫廄尹子晢出奔鄭中廄尹左傳楚郤宛之難國言未巳進胙者莫不謗令尹沈尹戌言於子常曰夫左尹與中廄尹莫知其罪而子殺之以興謗讟杜預曰左尹郤宛也中廄尹陽令終芈尹史記靈王饑不能起芈尹申無宇之子申亥曰吾父再犯王命王弗誅恩孰大哉乃求王奉之以歸環列之尹左傳楚穆王立以其為太子之室與潘崇使為太師且掌環列之尹注環列之尹宫衛之官清尹通志楚有清尹弗忌清尹楚官號也陵尹通志氏族略陵尹氏楚大夫陵尹喜陵尹招之後陵尹楚官針尹左傳有針尹克黃玉海云楚有針尹之官又楚有針尹固見定公四年針一作針連尹左傳楚公子午為令尹公子罷戎為右尹蒍子馮為大司馬公子橐師為右司馬公子成為左司馬屈到為莫敖公子追舒為針尹屈蕩為連尹養由基為宫廄尹以靖國人君子謂楚於是乎能官人又楚連尹襄老縣尹左傳穿封戍囚皇頡公子圍與之爭之正於伯州犂伯州犂曰請問於囚乃立囚伯州犂曰所爭君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戍方城外之縣尹也誰獲子囂尹左傳楚子狩於州來次於潁尾使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼吳郊尹左傳楚子奪成然邑而使為郊尹許氏說文曰邑外謂之郊郊外謂之野野外謂之林林外謂之坰玉尹新序荆人卞和奉玉璞而獻之楚武王武王使玉尹相之玉尹掌玉之官也卜尹史記楚平王謂觀從恣爾所欲欲為卜尹王許之賈逵曰卜尹卜師大夫官故卜尹亦曰卜大夫也樂尹左傳楚子入於郢將嫁季芈季芈辭曰所以為女子遠丈夫也鍾建負我矣以妻鍾建以為樂尹楚子昭王也樂尹樂大夫也門尹左傳石乞尹門注為楚門尹也樂師左傳鄭文夫人芊氏姜氏勞楚子於柯澤楚子使師縉示之俘馘杜預曰師縉楚樂師也又楚有樂師扈子作窮劫之曲見吳越春秋樂長焦竑云豫得漢延熹中碑云優孟楚之樂長史記所謂樂人優孟者也泠人左傳晉侯觀於軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族曰泠人也注泠人樂官名古泠氏世掌官因以為號泠音伶封人詳見司徒鋗人史記楚靈王獨傍徨山中野人莫敢入王行遇其故鋗人韋昭曰今之中鋗工正左傳蒍賈為工正軍正列子魯施氏之子好兵楚王以為軍正廷理韓詩外傳楚昭王有士曰石奢其為人也公而好直王使為廷理說苑楚令尹子文之族有干法者廷理拘之聞其令尹之族也而釋之子文召廷理而責之曰凡立廷理者將以司犯王命而察觸國法也或作廷尉郎中國䇿朱英謂春申君曰君先仕君為郎中君王崩李園入臣請為君撞其胸殺之正僕左傳昭十三年陳蔡入楚蔡公使須務牟與史猈先入因正僕人殺太子祿及公子罷敵注須務牟史猈楚大夫蔡公之黨也正僕太子之近官謁者國䇿蘇秦謂楚王曰謁者難得見如鬼王難得見如帝閽詳司宫即司門之官也職比大閽較卑大閽左傳巴人伐楚楚子禦之大敗於津還鬻拳弗納遂伐黃敗黃師於踖陵還及湫有疾夏六月庚申卒鬻拳葬諸夕室亦自殺也而葬於絰皇初鬻拳强諫楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼之以兵罪莫大焉遂自刖也楚人以為大閽謂之大伯使其後掌之杜預曰大閽若今城門校尉官御士左傳子南之子弃疾為王御士注云御士御王車者之官也周亦有御士太官史記楚莊王有愛馬衣以文繡置華屋下席以露牀啖以棗脯馬死欲以大夫禮葬之樂人優孟入殿門大哭曰請以君禮葬之以雕玉為棺文梓為椁豫章為題凑發甲卒為壙老弱負土諸侯聞之皆知大王賤人而貴馬也王曰為之奈何請為王言六畜之葬以籠竈為之槨銅䥶為之棺齊以薑桂薦以木蘭衣之以火光葬人腹中王乃以馬屬太官無令天下知聞也銅官圖書記云楚設銅官鑄錢洲上遂名銅官按一統志銅官渚在湖廣長沙府城北六十里有洲舊傳楚鑄錢處即銅官洲也太卜屈原卜居云屈原既放三年不得復見竭智盡忠蔽障於讒心煩意亂不知所從乃往見太卜鄭詹尹曰余有所疑願因先生决之注太卜楚掌卜者之官按周禮有太卜嗇夫楚有嗇夫空詳見相國主酒吏許愼淮南注楚㑹諸侯魯趙皆獻酒於楚王主酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄者奏之楚王以趙酒薄遂圍邯鄲也庖宰監食賈子云楚惠王食寒葅而得蛭因遂吞之腹有疾而不能食令尹入問曰王安得此疾王曰吾食寒葅而得蛭念譴而不行其罪乎是法廢而威不立也非所聞也譴而行誅則庖宰監食者法皆當死心又弗忍也故吾恐蛭之見遂吞之關吏吳越春秋子胥到昭關關吏欲執之伍員因詐曰上所以索我者美珠也今我已亡矣將去取之關吏因舍之按周禮有司門司關堂溪氏以下附史記吳夫概敗楚楚封之堂溪號為堂溪氏或作堂溪公白公楚惠王二年子西召故平王太子建之子勝於吳以為巢大夫號曰白公服䖍曰白邑名楚邑杜預曰汝陰褒信縣西南有白亭春申君考烈王以黃歇為令尹封於吳號春申君彭城君昭奚恤與彭城君議於王前注彭城屬楚以上並見史記襄城君說苑有襄城君卾君楚辭后語越人歌者楚王之弟卾君泛舟於新波之中榜枻越人擁棹而歌鄢陵君壽陵君國䇿莊辛謂楚襄王曰君王左州侯右夏侯輦從鄢陵君與壽陵君安陵君江乙說於安陵君注云失其姓蓋楚之幸臣陽陵君莊辛說襄王襄王聞之顔色變作身體戰栗於是乃以執圭授之為陽陵君與淮北之地臨武君天下合從趙使魏加見楚春申君曰君有將乎曰有之僕將欲將臨武君魏加曰臨武君嘗為秦孽不可以拒秦之將也以上並見國䇿陽文君史記黃歇為楚太子計曰陽文君子二人在中王若卒大命太子不在陽文君子必立為後太子不得奉宗廟矣不如亡秦州侯夏侯詳見鄢陵君陵陽侯荆王封卞和為陵陽侯見謝詩注趙職官封君附丞相國䇿希寫見建信君建信君曰秦使人來仕僕官之丞相爵五大夫注秦武王二年初置丞相秦爵五大夫第九據此則趙亦有之戰國改置遞相效也按魏亦有丞相見魏職官相國趙武靈王傳國於少子何肥義為相國見趙世家應劭曰相國之名始此秦漢因之又趙惠文王以相國印授樂毅假相國亷頗傳趙以尉文封亷頗為信平君為假相國又趙世家孝成王十七年假相大將武襄君攻燕注假相假名相也余按項羽斬宋義頭自立為假上將軍韓信破齊遣使立為假王其端有自起守相國䇿文信侯出走與司空馬之趙趙以為守相注守假官也代相見後官帥將柱國翟章從梁從甚善趙王王三延之以相不受田駟謂柱國韓向曰臣請為君刺之注云柱國楚官蓋趙亦有左師國䇿左師觸讋願見太后注春秋之時宋有左右師上卿也趙以觸讋為左師冗散之官以優老臣齊有右師王歡師史記趙烈侯好音將賜歌者田萬畝相國公仲連乃進牛畜荀欣徐越牛畜侍烈侯以仁義約以王道荀欣選練舉賢徐越節財儉用烈侯悅使使謂相國曰歌者之田且止官牛畜為師荀欣為中尉徐越為內史或曰師即右師之官也傅國䇿武靈王二十五年使周紹為王子傅司冦公子成為相號安平君李兌為司冦見史記胡三省云司冦周六卿之一也左司馬張孟談告趙襄子曰左司馬見使於國家安社稷不避死以成其忠注左司馬張孟談自謂也見國䇿余按趙必有左右司馬上卿韓詩外傳趙以孫子為上卿史記趙惠文王十六年亷頗為趙將伐齊大破之取晉陽拜為上卿藺相如傳趙王以相如功大拜為上卿位在亷頗之右王劭按董勛答禮曰職高者名録在上於人為右職卑者名録在下於人為左客卿春秋后語東里子趙之客卿也大夫史記趙武靈王立何為王大夫悉為臣上大夫相如既歸趙王以為賢大夫使不辱於諸侯拜相如為上大夫見史記中大夫韓非子王登為中牟令上言於襄主曰中牟有士曰中章胥已者其身甚修其學甚博君何不舉之主曰子見之我將為中大夫按左傳晉有中大夫五大夫詳見丞相夢大夫右夢書引趙史記云趙簡子病五日不知人扁鵲視之曰不出三日必寤寤必有言也居二日半簡子寤語大夫曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞不類三代之樂其聲動人心有一熊一羆來欲援我帝命我射之死帝賜我二笥皆有副吾見兒在帝側帝屬我一翟犬曰及而子之壯也以賜之夢大夫董安于受言而書藏之於府按趙世家無夢大夫三字國尉史記趙以許厯為國尉都尉新序秦趙戰於長平趙不勝亡一都尉應劭曰自上安下曰尉武官悉以為稱胡三省通鑑注曰戰國之時有國尉有都尉中尉詳見師尉文史記孝成王十五年以尉文封相國亷頗為信平君注尉文官名謂以尉文所食之地以封亷頗也或作邑名又作尉官文名俱非是將軍史記幽繆王七年秦人攻趙趙大將李牧將軍司馬尚擊之大將軍文選注李牧為趙大將軍又史記云趙王與大將軍亷頗謀大臣謀按左傳晉閻沒女寬謂魏獻子曰豈將軍食之而有不足又家語衛將軍文子問於子貢自戰國置大將軍周末又置前後左右將軍官帥將漢書馮奉世傳馮奉世字子明上黨潞人也徙杜陵其先馮亭為韓上黨守秦攻上黨絶太行道韓不能守馮亭乃入上黨城守於趙趙封馮亭為華陽君與趙將括拒秦戰死於長平宗族繇是分散或留潞或在趙在趙者為官帥將官帥將子為代相師古曰帥音所類反字或作師中候趙奢傳軍中候有一人言急救武安趙奢立斬之內史詳見師漢書百官表云少府內史周官秦因之掌治京師御史張儀說趙王曰敝邑秦王使臣獻書於大王御史應劭曰御史立於陛下者猶云陛下舊注御史周宗伯屬官秦因之趙亦有此官補曰御史周官以中士下士為之特小臣之傳命者余按亷頗藺相如傳相如顧趙御史曰某年某月趙王使秦王鼓缶是又紀事之官矣尹史趙有尹史見月生齒齕畢大星占有兵變詳見災異考筮史史記孝成王夢乘飛龍上天不至而墜明日召筮史敢占之注筮史官敢名也周禮有人古筮字代史竹書紀年愼靚王十三年邯鄲命將軍大夫適子代史皆貂服代史不知何官姑附於此郎中國䇿秦召春平君因而留之泄鈞謂文信侯曰春平侯者趙王甚愛之而郎中妬之應劭曰郎中趙官名中庶子詩傳曰扁鵲過趙趙王太子暴疾而死鵲造宫門曰吾聞國中卒有壤土之事得無有急乎中庶子之好言方者應之曰然王太子暴疾而死按扁鵲傳作虢太子不審孰是姑存之行人國䇿馮忌請見趙王行人見之注行人趙官又趙簡子時有行人燭過見韓非子宰人莊子說劍云宰人上食王三環之王者趙文王也又史記趙襄子請代王使厨人操銅枓以食代王及從者行斟陰令宰人各以枓擊殺代王注宰人趙之卑官余按宰人即周庖人之類令詳見中大夫家令古今注云羅敷為邑人千乘王氏妻王氏後為趙王家令家令疑官名宦者令杜氏通典云天文有宦者四星在帝座之西周官有宫正宫伯宫人內宰閽人寺人戰國時有宦者令注云趙有宦者令繆賢是也博聞師史記武靈王少未能聽政立博聞師三人左右司過二人應劭曰博聞師趙諫官余按司過乃諫官耳博聞師當是偹顧問者司過詳見博聞師按湯有司直之臣周禮有司諫中士二人史二人徒二十人司日劉向録云趙武靈王立司日出納王命余按國語趙簡子田於螻史黯聞之以犬待於門簡子見之曰何為曰有所為得犬欲試之兹囿簡子曰何為不告對曰君行臣不從不順主將適螻而麓不聞臣敢煩當日注當日簡子當日之官武靈司日疑即此官也太卜國䇿趙取周之祭地周君患之告於鄭朝鄭朝曰君勿患也臣請以三十金復取之周君豫之鄭朝獻之趙太卜因告以祭地事及王病使卜之太卜譴之曰周之祭地為祟趙乃還之典門子華子云子華子違趙趙簡子悅燭過典廣門之左簡子召而語之以其故余按古有典門之官吕氏春秋又云趙簡子時陽城胥渠處廣門之官黑衣國䇿左師觸讋曰老臣賤息舒祺最少不肖而臣衰竊愛憐之願得補黑衣之缺以衛王宫注黑衣衛士之服也沈約史記注云黑衣趙官名戰國時官制紛亂如魏之犀首齊祭酒皆緣事起名不仍周舊趙衛宫之官衣黑衣遂名黑衣也驂乘少室周為趙襄王驂乘見孟子注筆吏吕覽章句趙簡子以周舍為筆吏津吏列女傳趙簡子南擊荆至河津津吏醉卧不能渡傳舍吏春秋后語秦急圍邯鄲邯鄲且欲降傳舍吏子李同說平原君曰今邯鄲之民析骨而炊易子而食可謂急矣而君之后宫以百數婢妾被綺縠餘粱肉而民敝衣不完糟糠不厭君器物鐘鼓自若使秦破趙安得而有此哉田部吏史記趙奢者趙之田部吏也收租稅而平原君家不肯出趙奢以法治之奉陽君以下附蘇秦說趙肅侯曰奉陽君妬大王不得任事注肅侯令其弟成相號奉陽君安陽君惠文王四年朝羣臣安陽君亦來朝平陽君惠文王二十七年封趙豹為平陽君華陽君白起傳趙封馮亭為華陽君武陽君孝成王十一年武陽君鄭安平死徐廣曰故秦將降趙也武襄君孝成王十六年以樂乘為武襄君正義曰襄舉也上也言樂乘功最髙也武安君幽繆王三年秦政攻赤麗宜安李牧率師與戰肥下却之封牧為武安君又蘇秦傳趙封蘇秦為武安君以上見史記建信君國䇿建信君貴於趙或謂建信君君之所以事王者色也建信君無考平都君國䇿趙惠文王三十年相平都君田單謂趙奢曰吾非不悅將軍之兵也廬陵君馮忌為廬陵君謂趙王曰廬陵君孝成王母弟見趙記代成君趙世家襄子平代遂以代封魯伯子周為代成君長安君趙世家孝成王三年王新立太后用事秦急攻之趙氏求救於齊齊曰必以長安君為質正義曰長安君者以長安善故名也信平君史記孝成王十五年以尉文封相國亷頗為信平君正義曰信平亷頗號也言篤信而亷平也馬服君惠文王二十九年趙使趙奢將擊秦大破秦軍閼與下賜號為馬服君見史記說在趙兵制中崔浩云馬服趙官名誤陳餘遺章邯書曰白起為秦將南征鄢郢北坑馬服往趙奢子括代號馬服望諸君樂毅傳毅知燕惠王之不善畏誅遂西奔趙趙封樂毅於觀津號曰望諸君平原君平原君趙勝見國䇿春平君悼襄王時秦召春平君泄鈞為之說文信侯注春平君趙太子也李侯平原傳秦圍邯鄲急傳舍吏子李談說平原君得敢死士三千人與赴秦軍秦兵遂罷李談戰死趙封其父為李侯徐廣曰河內成臯有李城正義曰懷州溫縣本李城李談父所封魏職官封君附丞相史記蘇代曰太子自相是三人者皆以太子為非常相也皆務以國事魏欲得丞相璽也注魏置丞相余按太子自相亦竒師通鑑魏文侯以卜子夏田子方為師虞夏商皆有師保凝丞師古官也傅史記翟璜曰君之子無傅臣進屈侯鮒胡三省云傅者傅之以德義因以為官名司徒芒卯謂秦王曰王能使臣為魏之司徒則臣能使魏獻長平王屋洛林之地也見國䇿按左傳晉以僖侯廢司徒注僖侯名司徒故廢司徒為中軍魏有司徒知三晉之官非晉舊也犀首春秋后語魏以犀首官公孫衍劉向别録云犀首大梁官名公孫衍嘗為是官因號犀首蓋以官號也司馬彪曰犀首魏官若今虎牙將軍將軍魏有將軍王敖見劉向孟子注上將軍國䇿迎孟嘗君為上將軍魏世家令太子申為上將軍信陵君傳魏王以上將軍印授公子客將軍國䇿秦圍趙之邯鄲魏安釐王使將軍晉鄙救趙畏秦止於蕩陽不進魏王使客將軍辛垣衍間入邯鄲應劭曰魏有客將軍官五乘將軍韓子秦韓攻魏昭卯西說而秦韓罷齊荆攻魏昭卯東說而齊荆罷魏襄王養之以五乘將軍卯曰伯夷以將軍葬於首陽之下而天下曰夫以伯夷之賢與其稱仁而以將軍葬是手足不掩也按將軍周末官此言伯夷以將軍葬無考注五乘將軍謂養之以五乘為將軍也余謂注非也當是五乘之將軍古者兵車一乘甲士三人步卒七十二人五乘凡三百七十五人公乘說苑魏文侯時有公乘不仁公乘疑官名晉有公乘之官是也大夫孔叢子秦兵攻趙魏大夫以為於魏便國䇿魏武侯與諸大夫浮於西河上大夫尹子文魏王賜獻玉者千金長食上大夫之祿中大夫史記魏人范雎從中大夫須賈使於齊注戰國之時仍周制置上中下三大夫隋書百官志曰周監二代㳂革不同其道既文置官彌廣逮於戰國戎馬交馳雖時有變革然猶仍周制國大夫韓非子吳起下令大夫曰明日且攻亭有能先登者仕之國大夫賜之上田宅吕氏春秋云吳起治西河欲諭其信於民夜日置表於南門之外令於邑中曰明日有人僨南門之外者仕長大夫明日日晏矣莫有僨表者民相謂曰此必不信有一人曰試往僨表來謁吳起吳起自見而出仕之長大夫異文而同實也五大夫國䇿信陵君使人謂安陵君曰君其遣縮高吾將仕之以五大夫使為持節尉或作執節尉吕氏云謂兼持節尉也關內侯為竇屢謂魏王曰王不若與竇屢關內侯見國䇿上卿新序魏文侯召翟黃入復為上卿持節尉詳見五大夫注持節尉尉之持節者按周禮有掌節御史國䇿安邑之御史死注六國已遣御史監郡不自秦始也守魏文侯問於解狐曰寡人將置西河之守見說苑又吳起為苑守令西門豹為鄴令見淮南子樂人桓談新論云漢文帝得魏文侯時樂人竇公百八十歲文帝奇之問何服食而至此對曰年十三失明父母教以鼓琴日以為常無所服餌虞人魏文侯與虞人期獵見國策注虞人掌山澤之官按周禮有山虞澤虞舍人說苑魏文侯封太子擊於中山三年使不往來舍人趙倉奉使御庶子國策魏公叔痤病惠王往問之曰公叔病即不可諱將奈社稷何痤對曰痤有御庶子公孫鞅願王以國事聽之也史記作中庶子注云此公族官别於國官及太子官或以為御庶子痤之家臣如甘羅為文信侯少庶子也白帖作公叔之少子誤矣禮記曰古者周天子有庶子之官職諸侯卿大夫之庶子掌其戒令與其教理别其等正其位胡三省曰自戰國以來大夫之家有中庶子舍人青絲編曰中庶子魏官時公叔痤相魏中庶子其屬官也故曰痤有中庶子公孫鞅博士漢書賈山傳賈山潁川人也祖父祛故魏王時博士弟子也師古曰六國時魏也主書吕氏春秋魏攻中山樂羊將已得中山還反報文侯有貴功之色文侯知之命主書曰羣臣賓客所獻書者操以進之主書舉兩篋以進令將軍視之信安君以下附國䇿秦召魏相信安君注史不書無考平都君長平之役平都君說魏王隱陵君詳見宫室考安陵君國䇿信陵君使人謂安陵君按征羌侯國有安陵亭信陵君信陵君殺晉鄙救邯鄲破秦人存魏國見史記曹子建七啓云若夫田文無忌之儔乃上古之俊公子也皆飛仁揚義騰躍道藝游心無方抗志雲際揮袂則九野生風慷慨則氣盛虹霓寧陵君魏豹傳魏豹者故魏諸公子也其兄魏咎故魏時封為寧陵君秦滅魏遷咎為家中山君魏文侯封擊為中山君見韓詩外傳及說苑龍陽君國䇿魏王與龍陽君共船而釣胡元瑞筆叢云魏安釐王幸姬號龍陽君見名疑今以為男子非是余按古來美人諒亦有稱龍陽者非男子矣婦人封君至隱怪也天下守箋注童而習之不知其非誣女為男號為幸臣封君之竒反聾瞽焉譬如晦夜不見星斗獨有雲霧除寧侯續春秋云魏龎涓為除寧侯韓職官封君附相國國策謂韓相國曰人之善扁鵲者為有臃腫也史記韓懿侯八年申不害相韓修術行道國內以治諸侯不來侵伐司空吕氏春秋韓氏城期十五日而成段喬為司空有一縣後二日段喬執其吏而囚之囚者之子走告封人子髙曰惟先生能活臣父之死孔安國曰司空主空土以居人按空穴也古者穴居一曰司空地官雖空處皆得司也言自地已上無不司太守韓氏上黨守馮亭使者至曰願以上黨入之趙趙使平原君往受地以萬户都三封其太守為華陽君以千户都三封其縣令為侯見通鑑正義曰爾時未合言太守至漢景帝時始置太守此言太守衍字也余按國策中太守數見正義說縣令詳見太守封人詳見司空客卿客卿為韓謂秦王見國䇿注云韓重客卿位在相國之下一等大夫琴經疏聶伯為韓大夫出使於秦作怨離之曲别老母稚妻也中庶子國䇿韓公叔與幾瑟爭國中庶子强謂太子曰不若及齊師未入急擊公叔典冠韓非子韓昭侯醉而寢典冠者見君之寒也故加衣於君之上覺而問左右曰誰加衣者左右對曰典冠君因罪典衣與典冠其罪典衣以為失其事也其罪典冠以為越其職也廩吏韓子韓昭侯之時廩吏竊黍種燕職官封君祿制附相國國䇿秦客卿謂穰侯君欲成之何不使人謂燕相國又韓非子郢人有遺燕相國書史記蘇秦之在燕與其相子之為婚又燕王喜命相栗腹約歡趙趙世家作燕王令丞相栗腹約歡上卿蘇代說燕昭王王曰吾請拜子為上卿又太子丹尊荆軻為上卿並見史記亞卿樂毅傳樂毅為魏昭王使於燕燕王以客禮待之樂毅辭讓遂委質為臣燕昭王以為亞卿大夫王喜時有大夫將渠詳見兵制考太傅史記燕太子丹質於秦亡歸見秦且滅六國兵已臨易水太子丹患之謂其太傅鞠武曰燕秦不兩立將軍史記燕噲讓位子之國大亂將軍市被與太子平謀將攻子之上將軍典略燕以樂毅為上將軍御書蘇代自齊獻書於燕王曰臣之行也固知有口事故獻御書而行應劭曰御書猶尚書也余按趙亦有御史蓋謁者之官右御韓非子右御冶工見外儲說境吏國䇿張丑為質於燕燕王欲殺之走且出境境吏得丑豕宰符子朔人獻燕昭王以大豕曰養奚若使曰豕也非大囿不居非人便不珍今年百二十矣人謂豕仙王乃命豕宰養之十五年大如沙獖足如不勝其體王異之命衡官橋而量之折橋豕不量又命水官舟而量之其重千鈞其巨無用燕相謂王曰奚不烹之王乃命宰夫膳之衡官詳上按周禮有林衡川衡水官詳豕宰宰夫詳豕宰周宰夫之職掌治朝之法以正王及三公六卿大夫羣吏之位掌其禁令燕之宰夫乃膳人矣自春秋以來皆然女伶官拾遺記燕昭王時廣延國獻善舞者二人容冶妖麗靡於鸞翔而歌聲輕揚乃使女伶代唱其曲余按伶樂官也黃帝時樂師伶倫世掌樂官故後世號樂官曰伶官女伶者女樂官也周禮有女祝女史後代有女尚書女侍中女學士女博士之類又有女將軍女司樂即女伶官也昌國君以下附史記樂毅勝齊燕昭王親至濟上勞軍行賞饗士封樂毅於昌國號為昌國君及樂毅奔趙後燕王復以其子樂閒為昌國君奉陽君國䇿奉陽君甚不取於蘇秦正曰奉陽君李兌成安君趙世家惠文王二十八年燕將成安君公孫操殺其主右封君三百石史記燕噲自三百石吏以上而效之子之注以石計祿始見於此又秦范雎曰自斗食以上有非相國之人者乎王翦歸斗食以下秩吕不韋舍人六百石以上奪爵孟子為齊卿其祿十萬鍾七國祿制僅見於此姑附燕職官俟博聞者右祿制七國考卷一
