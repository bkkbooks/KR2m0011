body:
  text: 七國考卷十三明董說撰秦災異雨金秦獻公十七年櫟陽雨金四月至八月見六國表正義曰雨金于秦國都明金瑞見也秦紀作十八年一統志云雨金堡在陜西西安府富平縣東西三十里秦獻公時櫟陽雨金後因名堡按其地古櫟陽縣也又按述異記秦二世元年又宫中雨金秦與金終始者也雨粟燕丹子云燕太子丹質於秦欲歸秦王曰使日再中天雨粟乃得歸太子仰天嘆之日為再中天為雨粟秦王不得已遣之春秋潛潭巴曰天雨粟無德者興有德者不祿六月雨雪躁公八年六月雨雪見六國表雨三月蜀本紀云秦王誅蜀侯惲後迎葬咸陽天雨三月不通冬雷史記秦始皇五年冬雷雷火化為雀尚書中候云秦穆公出狩至於咸陵天震大雷下有火化為雀銜緑丹書集於公車文曰秦伯霸又按魚豢典略秦伯出獵至於咸陽有大鳥流下化為白雀銜緑丹書集於公車即其事也日蝕秦厲共公三十四年日食簡公六年日食惠公三年日蝕獻公三年日蝕書晦獻公十年日蝕獻公十六年日蝕秦武王六年日食晝晦昭襄王六年日食晝晦並見史記日月食秦躁公八年日月食見六國表日再中詳見雨粟彗星見秦惠王元年彗星見厲惠公七年彗星見十年庶長將兵拔魏城彗星見見通志六國年譜孝公元年彗星見西方見六國表困學紀聞云星孛東方在於越入吳之後彗見西方在衛鞅入秦之前天之示人著矣武王四年彗星見武王十一年彗星見見史記武王之世彗星三見昭襄王二年彗星見四年彗星見十一年彗星見見通志六國年譜始皇七年彗星先出東方見北方五月見西方將軍驁死彗星復見西方十六日夏太后死索隱曰莊襄王所生母始皇九年彗星見或竟夭嫪毐為亂覺誅遷其舍人於蜀四月寒凍有死者彗星見西方又見北方從斗以南八十日見史記按孝經鈎命决曰周襄王不能事其母弟彗入斗亡其度也星晝墮太平御覽秦孝公十二年星晝墮有聲流星通志災祥略云秦始皇二年三月乙未有流星大小西行不可勝數至晚乃息晝晦星見秦厲共公三十四年日食晝晦星見見史記六國表太白蝕昴鄒陽獄中書衛先生為秦畫長平之事太白蝕昴昭王疑之蘇林曰昴趙分也將有事兵故太白食食者干歷也如淳曰太白天之將軍也升中紀號對曰秦舉長平金精食昴或曰太白蝕昴天告秦母殺伐也渭水赤洪範五行傳秦武王三年渭水赤三日昭王三十四年渭水又大赤三日集異云秦有連坐之法棄灰於道者黥網密而刑虐加以征伐橫出殘滅鄰國至於變亂五行氣色謬亂鼎飛入泗水史記昭襄王五十二年鼎入泗水正義曰周赧王五十九年周亡秦昭王取九鼎一鼎飛入泗水餘八入於秦先是周威烈王時九鼎震緯略云禹貢九牧之金鑄鼎荆山之下民入山林川澤魑魅魍魎莫能逢之所鑄九鼎五者以應陽法四者以象隂數使工師以雌金為隂鼎以雄金為陽鼎鼎中水常滿以占氣象之休咎夏桀之時鼎水忽自沸煎及傳於周周末九鼎咸震亡滅之兆也地震壞城昭襄王二十七年地震壞城見六國年譜又始皇十五年地動十七年地動是年葉陽太后卒物化為土蜀王本紀云秦王以金一笥遺蜀王蜀以禮物答而盡化為土秦王怒羣臣拜賀曰土者地也秦當得蜀矣馬生人秦孝公二十一年馬生人見六國表占曰諸畜生非其類子孫必有非其姓者至始皇果吕不韋子馬生角燕丹子云燕太子丹質於秦秦王遇之無禮不得意欲歸秦王不聼謬言曰令烏白頭馬生角乃可丹仰天嘆烏即白頭馬即生角吕氏春秋云人君失道馬有生角京房云臣易上政不順厥妖馬生角牡馬生子漢書五行志秦昭王二十年牡馬生子而死劉向以為馬禍也烏白頭詳馬生角風俗通作烏生肉角論衡作象生肉角總一事變易之耳子書多有此弊梓中大特文公二十七年伐南山大梓豐大特詳見祭祀考五足牛漢書五行志秦孝文王五年斿胊衍有獻五足牛者劉向以為近牛禍也先是秦惠王初都咸陽廣大宫室南臨渭北臨涇思心失逆土氣足者止也戒秦建止奢侈將至危亡秦遂不改至於離宫三百復起阿房未成而亡一曰牛以力為人用足所以行也其后秦大用民力轉輸起負海至北邊天下叛之京房易傳云興繇役奪民時厥妖牛生五足媦語晋太康地志云秦文公時陳倉人獵得獸若彘不知名牽以獻之逄二童子童子曰此名為媦常在地中食死人腦即欲殺之以柏捶其首媦亦語曰二童子名陳寶得雄者王得雌者霸陳倉人乃逐二童子化為雉雌上陳倉北坂為石秦祠之搜神記云其雄者飛至南陽其後光武起於南陽皆如其言也一統志云秦之逄二童子者曰陽伯雜事占曰鳥獸而人言主其國有大兵一虎傷千人華陽國志秦昭王時有一虎傷害千餘人黑龍見秦文公出獵獲黑龍以為水德之瑞見史記劉氏災異略曰秦獲黑龍黑龍者秦也天若曰秦毋成虐將為人獲秦人昧而謂之瑞狼入市秦惠王四年狼入咸陽市昭王六年狼又入咸陽市見洪範五行傳余按述異記云周幽王時牛化為虎羊化為狼洛陽有避狼城云幽王時羣臣為狼食人故築臺避之今洛中有狼村是其處也河魚大上漢書五行志云秦始皇八年河魚大上劉向以為近魚孽也是嵗始皇弟長安君將兵擊趙死屯㽜軍吏皆斬遷其民於臨洮明年有嫪毐之誅魚隂類民之象逆流而上者民將不從君令為逆行也其在天文魚星中河而處車騎滿野至於二世暴虐愈甚終用急亡蜂食苗昭王三十八年蜂食民苗民無所食見洪範五行傳蝗蔽天始皇四年十月庚寅蝗蟲從東方來蔽天見史記自并天下已後並不載山木死昭王三十八年上郡大饑山木盡死見五行傳桃冬花秦紀獻公十六年桃冬花秦别紀孝公立十六年時桃李冬花當是一事孝獻音相訛耳姑並存之新生嬰兒言秦别紀孝公十六年有新生嬰兒曰秦且王秦史筆之以為禎祥然不恆為妖故附庸於災異田齊災異雨黍齊威王十六年雨黍見竹書紀年雨冰京房云戰國時齊地雨冰廣者六尺余按夏桀末年冰生於朝雨血齊湣王時千乘博昌之間方數百里雨血嬴博之間地坼至泉人有當闕而哭就之不見去則復聞其聲淖齒曰天雨血霑衣者天以告也地坼至泉者地以告也人有當闕而哭者人以告也京房易傳云佞臣祿忠臣戮天雨血地坼見上春秋考異郵云臣恣盛地裂坼紀年云夏桀末年社坼裂地景長湣王十一年齊地景長一丈餘髙一尺見竹書紀年石行春秋后傳周赧王二十年齊東有二石髙三丈餘相從而行如海數百步瑣語云齊東有二石髙八丈廣四尺而入於海尸變為蟬中華古今注齊王之后怨王而死尸變為蟬登庭樹嘒唳而鳴王悔恨之故曰齊女有人當闕而哭湣王時人有當闕而哭詳見雨血楚災異雨碧楚宣王六年雨碧於郢見紀年赤雲夾日史記楚昭王二十七年十月昭王軍於軍中有赤雲如烏夾日而飛昭王問周太史太史曰是害於楚王然可移於將相將相聞是言乃請自以身禱於神昭王曰將相孤之股肱也今移禍庸去是身乎弗聼杜預曰雲在楚上唯楚見之也蒼雲圍軫春秋文耀鈎楚有蒼雲如霓圍軫七蟠中有荷斧之人向軫而蹲於是楚唐史畫遺灰而雲滅故曰唐舉之策上滅蒼雲按北堂書鈔云楚有蒼雲如霓唐史曰君慢令簡宗廟以無禮見患七國皆謀皆壞屠君於是立禮正推禱醮於廟堂之前曰唐史之策上滅蒼雲謂之神史也不以知道之原星經云角亢鄭之分野兖州氐房心宋之分野豫州尾箕燕之分野幽州南斗牽牛吳越之分野揚州須女虛齊之分野青州危室璧衛之分野并州奎婁魯之分野徐州胃昴趙之分野冀州畢觜參魏之分野益州東井輿鬼秦之分野雍州栁星張周之分野三河翼軫楚分野荆州也地忽長楚宣王六年地忽長十丈有餘髙尺半見紀年土踊也人化為蛾楚莊王時宫人一旦化為野蛾飛去見述異記按劉向說苑楚莊王見天不見妖而地不出孽則禱於山川曰天其忘余與又尉繚子楚將公子心與齊戰時有彗星出柄在齊柄所在勝不可擊公子心曰彗星何知明與齊人戰大破之余謂莊王知不妖之妖者敬也公子心知妖之不妖者智也趙災異六月雨雪趙世家成侯二年六月雨雪月生齒齕畢大星後漢書天文志注云趙有尹史見月生齒齕畢大星占有兵變趙君曰天下共一畢知為何國也下史於獄其後公子牙謀殺君血書端門如史所言河水出趙惠文王二十七年河水出大潦見史記地坼趙幽繆王五年代地大動自樂徐以西北至平隂臺屋墻垣大半壞地坼東西百三十步幽繆王六年大饑民訛言曰趙為號秦為笑以為不信視地之生毛見史記魏災異雨骨述異記梁惠成八年雨骨於赤鞞后國饑時兵疫內記云是謂陽消星晝墮魏惠侯十二年星晝墮有聲見史記彗星見魏惠侯十年彗星見見史記惠侯即惠成王也大風晝昏史記注云魏文侯卒之嵗大風晝昏山崩壅河魏文侯二十六年虢山崩壅河見六國表按正義虢山在陜州陜縣西二里臨黃河今臨河有岡阜似是頽山之餘也水經注云陜城西北帶河水湧起方數十丈父老云石虎載翁仲至此沈沒水所以湧洪河巨瀆冝不為金狄梗流蓋魏文侯時虢山崩壅河所至耳河水溢水經注魏襄王六年十月大霖雨疾風河水溢酸棗郛見竹書紀年女子化為丈夫鴻範五行傳云魏襄王十三年張儀詐得罪於秦而去相魏將為秦而欺奪君是歲魏有女子化為丈夫者天若語魏曰勿用張儀變隂為陽神將為君是時魏王亦覺之不用張儀儀免去歸秦魏旡害一曰男化為女宫刑濫也女化為男婦政漢哀帝建平中豫章有男子化為女子嫁為人婦生一子長安陳鳯言此陽變為隂將亡繼嗣自相生之象余按魏之災政大廟災及水旱日食妖祥素服避正殿羣臣素服而弔劉向云魏文侯時御廪災文侯素服避正殿五日國之羣臣皆素服而弔此其儀也古者紀事之書凡宫殿災俱收災異余所考皆取其不經故不收魏之御廪災附記於此以志闕遺韓災異大雨三月韓懿侯九年大雨三月見六國表旱韓世家韓昭侯二十年旱燕災異天雨粟京房傳曰燕丹囚於秦天雨粟於燕後秦滅之按燕丹子云燕丹子質於秦秦王遇之無禮急欲求歸秦王不聽繆與誓曰使日再中天雨粟乃得歸太子仰天嘆之日為再中天為雨粟乃雨粟於秦也京房當别有據或雨於秦復雨於燕耳五月下霜淮南子鄒衍事燕惠王盡忠左右譛之王繫之獄仰天而嘆夏五月天為之下霜江淹書云昔者賤臣叩心飛霜擊於燕地庶女告天振風襲於齊臺曹植精微篇云鄒衍囚燕市繁霜為夏零白虹貫日史記荆軻慕燕丹之義白虹貫日太子畏之如淳曰虹臣象日君象烈士傳荆軻發後太子見虹貫日不散曰吾事不成矣後聞荆軻死事不立曰吾知之矣詩推度災曰撓弱不立邪臣蔽主則白虹刺日春秋感精符曰虹貫日國多死孽天子命絶大臣為禍主將見殺沈約史記解白虹貫日大臣亡國燕將滅見此變後客卿荆軻一匕首亡燕矣天官書云天子微諸侯力政五伯代興更為主命自是之後衆暴寡大并小秦楚吳越夷狄也為彊伯田氏篡齊三家分晋並為戰國爭於攻取兵革更起城邑數屠因以饑饉疾疫焦苦臣主共憂患其察禨祥候星氣尤急近世十二諸侯七國相王言從衡者繼踵而臯唐甘石因以時務論其書傳故其占驗凌雜米鹽二十八舍主十二州斗秉兼之所從來久矣秦之疆也候在太白占於狼弧吳楚之疆候在熒惑占於鳥衡燕齊之疆候在辰星占於虛危宋鄭之疆候在嵗星占於房心晋之疆亦候在辰星占於參罰七國考卷十三
