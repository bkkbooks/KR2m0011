body:
  text: 七國攷卷九明董説撰秦雜祀西畤史記秦襄公以兵定周周封爵之襄公於是始國通諸侯聘享之禮乃用駵駒黄牛羝羊各三祠上帝西畤封禪書云其牲用駵駒黄牛羝羊各一云年表云立西畤祠白帝索隠曰襄公始列為諸侯自以居西畤西畤縣名故作西畤畤止也漢書郊祀志曰秦襄自以為主少昊之神作西畤雜祀䘮制亦禮也不附羣禮各為一卷盖淫祠厚塟戰國無度非禮之禮攷古者慎焉宗廟而外並從雜祀鄜畤史記秦文公元年居西垂宫三年文公以兵七百人東獵四年至汧渭之㑹曰昔周邑我先秦嬴於此後卒獲為諸侯乃卜居之占曰吉即營邑之十年初為鄜畤封禪書曰秦文公夢黄虵自天下屬地止於鄜衍史敦曰此上帝之徴君其祠之於是作鄜畤用三牲郊祭白帝焉按秦紀祠鄜畤用三牢又秦德公元年以犧三百牢祠鄜畤德公文公之子也初居雍大鄭宫以犧三百牢祠鄜畤卜居雍后子孫飲馬於河漢書郊祀志曰文公夢蛇自天下屬地其口止於鄜衍文公問於史敦敦曰此上帝之徴君其祠之於是作鄜畤用三牲郊祭曰白帝焉宻畤秦宣公四年作宻畤見史記漢書注云雍有五畤太昊黄帝以下祠三百二所緯略云宻畤者宣公作在渭南祭青帝不在雍也括地志云漢有五畤在岐州雍縣南則鄜畤呉陽上畤下畤宻畤北畤秦文公作鄜郊祭白帝曰鄜畤秦宣公作宻畤於渭南祭青帝秦靈公作呉陽上畤祭黄帝作下畤亦祠黄帝漢髙帝曰天有五帝今四何也待我而具五遂立黑帝曰北畤也上畤下畤秦靈公作呉陽上畤下畤詳見括地志封禪書云作上畤祭黄帝作下畤祭炎帝畦畤陜西志畦畤在櫟陽縣東北三十里秦獻公時櫟陽雨金自以得金瑞故作畦畤祀白帝畦畤者言其畤如畦畛也武畤好畤雍録云武畤好畤在雍縣旁之呉陽此二畤者不知何世所造参求其地即秦靈公所立上畤下畤呉陽也靈公既立上下兩畤又立武畤好畤又云秦西畤鄜畤上畤下畤漢北畤為五畤五畤之外又别有四畤為宻畤畦畤武畤好畤括地志又以宻畤鄜畤上畤下畤北畤為五畤其説相牴牾也余按封襌書云自秦文公未作鄜畤也而雍旁故有呉陽武畤雍東有好畤皆廢無祠或曰自古以雍州積髙神明之隩故立畤郊上帝諸神祠皆聚云據此武好二畤舊在雍地非始於靈公盖二畤乆廢自靈公祠之也郊史記秦昭襄王五十四年王郊見上帝於雍滅周之明年也周禮大宗伯以禋祀祀昊天上帝禮記郊之祭迎長日之至也大報天而主日也兆於南郊就陽位也掃地而祭於其質也於郊故謂之郊又曰祭之日王被衮以象天戴冕藻十有二旒則天數也乗素車貴其質也旂有十二旒龍章而設日月以象天也天垂象聖人則之郊所以明天道也陳寳祠秦紀秦文公十九年得陳寳漢書郊祀志云文公獲若石云於陳倉北坂城祠之其神來若雄雉其聲殷殷云野雞夜鳴以一牢祠之名曰陳寳臣瓉云陳倉縣有寳夫人祠歳與葉君神㑹也封禪書云其神或歳不至或歳數來來也常以夜光輝若流星從東南來集於祠城括地志云寳雞神在岐州陳倉縣東二十里故陳倉城中又按神僧傳載秦穆公時扶風獲一石由余識為佛神事頗詭特儒者所不道怒特祠五行傳秦立怒特祠祠以白犬𤣥羊史記文公二十七年伐南山大梓豐大特徐廣曰今武都故道有怒特祠録異傳秦文公時雍南山有大梓樹文伐之輙有大風雨樹生合不斷時有一人病夜􅉨山中聞有鬼語樹神曰秦若使人被髪以朱絲繞樹伐汝汝得不困耶樹神無言明日病人語聞公如其言伐樹斷中有一青牛出走入豐水中其後牛出豐水中使騎擊之不勝有騎墮地復上髪觧牛畏之不出故置髦頭伏祠狗禦蠱史記秦德公二年初伏以狗禦蠱徐廣曰年表云初作伏祠社磔狗邑四門也胡廣曰秦有伏祭自德公始孟康曰六月伏日初也周時無至此乃有之歴忌説曰伏者何以金氣伏藏之日也四時代謝皆以相生立春木代水水生木立夏火代木木生火立冬水代金金生水立秋以金代火故至庚日必伏庚者金故曰伏也正義曰蠱者熱毒惡氣為傷害人故磔狗以禦之左傳云皿蟲為蠱漢書觧詁曰狗陽畜也以狗祭社以辟不祥風俗通曰俗説狗别賔客善守禦故著四門以辟盗賊今人殺白犬以血題門户辟除不祥取法於此顧氏説略云六月上伏秦始皇所置又云秦穆公始為伏皆誤也鳯女祠神仙傳秦穆公時蕭史夫婦皆隨鳯凰飛去故秦人為作鳯女祠於雍宫中時有簫聲而已臘祠史記秦惠文王十二年初臘正義曰十二月臘日也秦惠文王始效中國為之故云初臘臘禽獸以歳終祭先祖因立此日也漢名臣奏曰秦惠文王初立臘祠冬祭祖攷風俗通曰夏曰嘉平殷曰清祀周曰蜡漢曰臘漢書觧詁曰周曰大蜡秦始謂之臘尋更曰嘉平漢復曰臘也又左傳晋侯假道於虞以伐虢宫之竒諫弗聽以其族行曰虞不臘矣故疑左傳戰國人書也蜀水三祀華陽國志秦孝文王以李氷為蜀守氷能知天文地理謂汶山為天彭門乃至湔及縣見兩山對如闕因號天彭闕髣髴若見神遂從水上立祀三所祭用三牲珪璧沈濆乆湫巫咸亞馳金石古文載秦詛楚文文凡三曰乆湫曰巫咸曰亞馳亞馳讀作呼馳其石皆出宋世説者謂初得巫咸文於鳯翔次得乆湫文於渭又次得亞馳文於洛其詞則一唯告於神者隨號而異其乆湫文曰又通作有秦嗣王敢用吉玉瑄璧使其宗祝卲鼛布愍告於不顯大沉乆湫以底楚王熊相之多罪昔我先君穆公及楚成王實戮力同心兩邦若一絆以㛰姻袗以齊盟曰葉萬子孫毋相為不利親仰大成乆湫而質焉今楚王熊相康讀作庸回無道淫佚耽亂宣侈競縱變渝盟刺内之則暴虐不辜戮剔孕婦幽刺親戚拘圉其叔父寘諸㝠室櫝棺之中外之則冐改乆心不畏皇天上帝及大沉乆湫之光烈威神而兼倍十八世之詛盟率諸侯之兵以臨加我欲剗伐我社稷伐滅我百姓求蔑法皇天上帝及大沉乆湫之卹祠圭玉犧牲逮取我邊城新􅙉及音於長親我不敢曰可今又悉興其衆張矜億怒飾甲底兵奮士盛師以偪我邊境将欲復其音凶迹唯是秦邦之羸衆敝賦䩱棧輿禮使介老将之以自救也亦應受皇天上帝及大沉乆湫之威靈德賜克劑楚師且復略我邊城敢數楚王熊相之倍盟犯詛著諸石章以盟大神之威神按方氏䟦詛楚文以為秦惠文王二十六年石湖亦謂當惠文王之世按秦在戰國最多鬼祀史記六國表曰太史公讀秦記至犬戎敗幽王周東徙洛邑秦襄公始封為諸侯作西畤用事上帝僣端見矣禮曰天子祭天地諸侯祭其域内名山大川今秦雜戎翟之俗先暴戾后仁義位在藩臣而臚於郊祀君子懼焉法言曰節莫差於僣僣莫差於祭祭莫重於地地莫重於天則襄文宣靈其兆也昔者襄公始僣西畤以祭白帝文宣靈宗興鄜宻上下用事四帝而天王不匡反致文武胙楚雜祀望祭羣神左傳楚共王無冡適有寵子五人無適立焉乃大有事於羣望而祈曰請神擇於五人者使立社稷乃徧以璧見於羣望曰當璧而拜者神所立也誰敢違之乃與巴姬埋璧於大室之庭召五子齋而入康王跨之靈王肘加之子比子晢皆逺之平王㓜抱而入再拜􅐦紐故康王以長立至其子失之圍為靈王及身而弑子比為王十餘日子晢不得立又俱誅四子皆絶無後唯獨棄疾後立為平王竟續楚祀如其神符祭上帝桓譚新論楚靈王信巫祝之道躬執羽紱起舞壇前呉人來攻其國人告急而靈王鼓舞自若顧應之曰寡人方祭上帝樂明神當䝉福祐焉不敢赴救而呉兵遂至俘獲其太子及后妃以下祭岡山左傳楚子滅蔡用隠太子於岡山蔡太子也申無宇曰不祥五牲不相為用况用諸侯乎王必悔之注用太子者楚殺之為牲以祭岡山之神歴山祠越絶書無錫歴山春申時歳祠以牛立無錫塘去呉百二十里東皇太一祠屈原九歌有東皇太一按太一天之尊神祠在楚東以配東帝故云東皇淮南子云太㣲者太一之庭紫宫者太一之居也楚辭注曰昔楚南郢之邑沅湘之間其俗信鬼而好祝其祀必使巫覡作樂歌舞以娯神蠻荆陋俗詞既鄙俚而其隂陽人鬼之間又或不能無䙝慢淫荒之雜原既放逐見而感之故頗為更定其詞去其太甚岳陽風土記曰荆湖民俗嵗時㑹集或禱祠多擊鼓令男女踏歌謂之歌場疾病不事醫藥惟灼龜打瓦或以雞子占卜求祟所在使俚巫治之皆古楚俗也雲中君祠楚雲中君祠見屈原九歌謂雲神也歌曰浴蘭湯兮沐芳華采衣兮若英靈連蜷兮既留爛昭昭兮未央楚人名巫為靈子若曰神之子也言使靈巫先浴蘭湯沐香芷衣采衣如草木之英以自潔也湘君祠湘夫人祠九歌有湘君湘夫人皆楚祠也大司命祠少司命祠九歌有大司命祠少司命祠周禮大宗伯以槱燎祀司中司命星傳云三台上台曰司命又文昌宫苐四亦曰司命故有兩司命也東君祠楚辭注東君祠者日神也禮曰天子朝日於東門之外東君歌曰縆瑟兮交鼓簫鐘兮瑶簴鳴䶵兮吹竽思靈保兮賢翾飛兮翠曽展詩兮㑹舞應律兮合莭靈之來兮蔽日青雲衣兮白霓裳舉長矢兮射天狼􅋵余弧兮反淪降援北斗兮酌桂漿注青衣白裳日出東方入西方故用其方色以為飾也河伯祠見九歌河伯者舊説以為馮夷其言荒誕不可稽攷大率為黄河之神耳按楚昭王二十七年春呉伐陳楚昭王救之軍城父十月昭王病於軍中有赤雲如鳥夾日西飛昭王問周太史太史曰是害於楚王然可移於将相将相聞是言乃請自以身禱於神昭王曰将相孤之股肱也今移祸庸去是身乎弗聽卜而河為祟大夫請禱河昭王曰自吾先王受封望不過江漢而河非所獲皇也止不許沈馬祠陸璣要覽楚懐王於國東偏起沈馬祠歳沈白馬名饗楚邦河神欲祟祭祀拒秦師卒破其國天不祐之漢成帝時谷永距絶方士疏云楚懐王隆祭祀事鬼神欲以獲福卻秦師而兵挫地削身辱國危趙雜祀霍泰山祀史記趙襄子立智伯與韓魏分范中行故地智伯益驕請地於趙不與智伯遂率韓魏攻趙襄子懼乃奔保晋陽原過從後至於王澤見三人自帶以上可見自帶以下不可見與原過竹二節莫通曰為我以是遺趙毋卹原過既至以告襄子襄子齋三日親自剖竹有朱書曰趙毋卹余霍泰山山陽侯天使也三月丙戌余将使女反滅智氏女亦立我百邑余将賜女林胡之地至於後世且有伉王亦黑龍面而鳥噣鬢麋髭􅏋大膺大胷修下而馮左袵界乗奄有河宗至於休溷諸貉南伐晋别北滅黒姑襄子再拜受三神之令三國攻晋陽歳餘引汾水灌其城城不浸者三版襄主錯龜數策占兆以視利害何國可降使張孟談潜行反智伯之約私於韓魏韓魏與合謀三月丙戌遂滅智氏祠三神於百邑使原過主霍泰山祀括地志云三神祠今名原過祠在霍山側也按趙與秦同姓秦之先帝顓頊之苖裔孫曰女孫女修織𤣥鳥隕卵女修吞之生子大業大業取少典之子曰女華生大費與禹平土已成帝錫𤣥圭禹受曰非予能成亦大費為輔帝舜曰咨爾費賛禹功其賜爾皂斿爾后嗣将大出乃妻之姚姓之玉女大費拜受佐舜調馴鳥獸是為栢翳舜賜姓嬴氏大費生子二人一曰大亷實鳥俗氏二曰若木實費氏其𤣥孫曰費昌子孫或在中國或在夷狄費昌當夏桀之世去夏為湯御敗桀於鳴條大亷𤣥孫曰孟戯中衍鳥身人言帝大戊聞之遂使御大戊以下中衍之後世有功殷國故嬴多顯遂為諸侯其𤣥孫曰中潏在西戎保西垂生蜚亷蜚亷生惡來惡來有力蜚亷善走父子俱事殷周武王之伐紂也并殺惡來是時蜚亷為紂取石北方還無所報為壇霍太山而報得石椁銘曰帝令處父不與殷亂賜爾石棺以華氏死遂葬於霍太山蜚亷復有子曰季勝季勝生孟増孟増幸於周成王是為宅臯狼臯狼生衡父衡父生造父造父以善御幸於周繆王得驥􅌐驊駵騄耳之駟西廵樂而忘歸徐偃王作亂造父為繆王御長驅歸周以救亂繆王以趙城封造父造父由此為趙氏中衍鳥身人言蜚亷石棺天賜跡近鬼神不經聞見是故秦趙二國最重祭祀其所繇來者乆也公孫杵臼程嬰祠史記晋屠岸賈攻趙氏於下宫殺趙朔趙同趙括趙嬰齊皆滅其族趙朔妻成公姊有遺腹走公宫匿趙朔客曰公孫杵臼友程嬰二人謀立孤杵臼死之程嬰卒立趙武亦自殺趙武服齊衰三年為之祭邑春秋祠之世世勿絶正義曰今河東趙氏祠先人猶别舒一座祭二士矣魏祭祀郊魏惠王有拜郊䑓詳宫室七主之祭孟子説文梁襄王僣天王之號立七主之祭修英雄之聲號伯中國梁立七主不見他書按封禪書始皇有八神之祭一曰天主二曰地主三曰兵主四曰隂主五曰陽主六曰月主七曰日主八曰四時主梁之七主或亦取乎此也七國攷卷九
